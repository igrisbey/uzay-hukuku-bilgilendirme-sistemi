    { keywords: ["nukleer","guc","uzay","bm","ilkeler","1992"], q: "BM Uzayda Nükleer Güç Kaynakları İlkeleri (1992) nedir?", content: "1992 yılında BM Genel Kurulu'nun kabul ettiği bu ilkeler, uzay araçlarında nükleer güç kaynağı kullanımının koşullarını belirlemektedir. Buna göre nükleer reaktörler yalnızca düşük Dünya yörüngesinin ötesine ulaşmak veya gezegenler arası görevler için gerekliyse kullanılabilir. Nükleer güç kaynağı taşıyan araçlar yaklaşık 300 yıllık atım süresine karşılık gelen \"yeterince yüksek\" bir yörüngeye yerleştirilmelidir.", source: "UN Principles Relevant to the Use of Nuclear Power Sources in Outer Space, GA Res. 47/68 (1992)" },
    { keywords: ["turkiye","ost","taraf","1967","imza"], q: "Türkiye'nin OST'ye Katılımı nedir?", content: "Türkiye, 1967 tarihli Dış Uzay Antlaşması'nı 27 Mart 1968'de imzalamış ve 27 Mayıs 1968'de onaylamıştır. Bu antlaşmayı onaylayan ilk ülkeler arasında yer almaktadır. Sorumluluk Sözleşmesi'ni 1975'te, Tescil Sözleşmesi'ni ise 1977'de onaylamıştır. Ay Anlaşması'nı imzalamamıştır. 2020 yılında Artemis Anlaşmaları'nı imzalamış ve bu çerçeve içinde yer almayı tercih etmiştir.", source: "UNOOSA Treaty Database, T.C. Dışişleri Bakanlığı" },
    { keywords: ["tua","kanun","2018","kararname","yetki"], q: "TUA'nın Kuruluş Kararnamesi ve Yetkileri nedir?", content: "Türkiye Uzay Ajansı (TUA), 13 Aralık 2018 tarih ve 23 sayılı Cumhurbaşkanlığı Kararnamesi ile kurulmuştur. TUA; ulusal uzay politikasını hazırlamak, uzay faaliyetlerini koordine etmek, uluslararası antlaşmalar çerçevesinde ülkeyi temsil etmek ve uzay teknolojileri alanında AR-GE'yi desteklemekle görevlidir. Yapısal olarak Cumhurbaşkanlığı'na bağlı olup uzay faaliyetleri için ruhsat ve lisans verme yetkisine sahiptir.", source: "T.C. Resmî Gazete, 13.12.2018, Sayı 30625 (3. Mükerrer)" },
    { keywords: ["milli","uzay","programi","2033","hedef","ay"], q: "Türkiye Milli Uzay Programı 2021-2033 nedir?", content: "Cumhurbaşkanı tarafından Şubat 2021'de açıklanan Milli Uzay Programı 10 stratejik hedef belirlemiştir: Ay misyonu (2028'de insansız iniş, 2023-2033 periyodunda Türk astronot), milli uzay roketi, uydu platformu, uzay limanı, uzay teknolojileri ekosistemi ve uzay hukuku altyapısının geliştirilmesi bunların başında gelmektedir. Program, 2023'te Axiom-3 misyonuyla kısmen hayata geçirilmiştir.", source: "T.C. Cumhurbaşkanlığı, Milli Uzay Programı Belgesi (Şubat 2021)" },
    { keywords: ["alper","gezeravci","axiom3","iss","2024"], q: "Alper Gezeravcı'nın ISS Görevi nedir?", content: "Türkiye'nin ilk astronotu Alper Gezeravcı, 18 Ocak 2024'te SpaceX Dragon kapsülüyle Axiom-3 misyonu kapsamında ISS'e gönderilmiştir. 14 gün süren görevde bilimsel deneyler gerçekleştirmiş, 9 Şubat 2024'te Atlantik Okyanusu'na başarıyla inmiştir. Bu görev, TUA'nın Axiom Space ile imzaladığı işbirliği çerçevesinde yürütülmüştür. Gezeravcı'nın ISS'deki hukuki statüsü IGA ve Kurtarma Anlaşması kapsamında değerlendirilmektedir.", source: "TUA Resmî Açıklaması, NASA Axiom-3 Mission Report (2024)" },
    { keywords: ["imece","uydu","tübitak","gozlem","milimetre"], q: "İMECE Uydusu nedir?", content: "TÜBİTAK UZAY tarafından geliştirilen İMECE, Türkiye'nin ilk yerli yüksek çözünürlüklü gözlem uydusudur. 26 Nisan 2023'te Kazakistan'daki Baykonur Uzay Üssü'nden Soyuz roketi ile fırlatılmıştır. Metre altı piksel çözünürlüğe sahip olup Türkiye'nin kendi uzay gözetleme kapasitesini sağlaması açısından kritik öneme sahiptir. Uydu BM Tescil Sözleşmesi kapsamında Türkiye adına tescil edilmiştir.", source: "TÜBİTAK UZAY, TUA Resmî Kaynakları (2023)" },
    { keywords: ["uzay","kuvvetleri","abd","space","force","2019"], q: "ABD Uzay Kuvvetleri (USSF) nedir?", content: "ABD Uzay Kuvvetleri (United States Space Force), Aralık 2019'da imzalanan yetkilendirme yasasıyla kurulmuştur. 1947'den bu yana ABD'de kurulan ilk yeni askeri koldur. Görevi; ABD'nin uzay çıkarlarını korumak, uzay operasyonlarını yürütmek ve uzay varlıklarına yönelik tehditleri bertaraf etmektir. Bu gelişme, uzayın giderek artan ölçüde askeri bir rekabet alanına dönüştüğünün en somut göstergesidir.", source: "National Defense Authorization Act FY2020, USSF Official" },
    { keywords: ["cin","uzay","askeri","pla","stratejik"], q: "Çin'in Uzay Askeri Stratejisi nedir?", content: "Çin Halk Kurtuluş Ordusu (PLA), 2015 yılında Stratejik Destek Kuvvetleri bünyesinde bir Uzay Sistemi Departmanı kurmuştur. Çin'in \"informasyon baskınlığı\" doktrini, modern savaşta uydu haberleşmesi ve GPS sistemlerinin kritik önemini vurgulamakta; uydu sistemlerini körelterek rakibin komuta-kontrol ağını çökertmeyi hedeflemektedir. Çin'in 2007 ASAT testi ve süregelen inspektor uydu programı bu stratejinin pratik yansımalarıdır.", source: "PLA Strategic Support Force, CSIS Aerospace Security, Pentagon China Military Power Report (2023)" },
    { keywords: ["rus","cin","uzay","normatif","ppwt","onerisi"], q: "Rusya-Çin PPWT Antlaşma Taslağı nedir?", content: "Rusya ve Çin, 2008 ve 2014 yıllarında BM Silahsızlanma Konferansı'na \"Uzaydaki Silahların ve Uzay Nesnelerine Karşı Güç Kullanma veya Kullanma Tehdidinin Önlenmesi\" (PPWT) başlıklı antlaşma taslağı sunmuştur. ABD ve diğer Batı devletleri, taslağın kara tabanlı ASAT sistemlerini kapsamamasını ve doğrulama mekanizmalarının yetersizliğini gerekçe göstererek reddetmiştir. Bu görüş ayrılığı uzayda silahsızlanma müzakerelerinin önündeki en büyük engellerden biridir.", source: "CD/1839 (2008), CD/1985 (2014), UN Disarmament Affairs" },
    { keywords: ["uzay","mirasi","apollo","onesmallstep","koruma"], q: "Uzay Mirasının Korunması — One Small Step Yasası nedir?", content: "ABD'de 2020 yılında yürürlüğe giren \"One Small Step to Protect Human Heritage in Space Act\", NASA'nın tarihi iniş alanlarını Ay görev planlarında dikkate almasını ve bu alanları ziyaret etmek isteyen özel aktörlerden önlem almasını talep etme hakkını düzenlemiştir. Yasa bağlayıcı değil, tavsiye niteliğindedir. Uluslararası düzeyde ise UNESCO'nun \"Uzayda Somut Olmayan Kültürel Miras\" başlığı altındaki çalışmaları sürmektedir.", source: "One Small Step to Protect Human Heritage in Space Act (2020), UNESCO Space Heritage Initiative" },
    { keywords: ["gezegensel","savunma","asteroid","deflection","dart"], q: "Gezegensel Savunma Hukuku — DART Misyonu nedir?", content: "NASA'nın Double Asteroid Redirection Test (DART) misyonu Eylül 2022'de Dimorphos asteroidiyle başarıyla çarpışmış ve asteroitin yörüngesini değiştirmiştir. Bu tarihin ilk gezegensel savunma testi olan misyon, uluslararası hukuki sorular da doğurmuştur: herhangi bir devlet tek taraflı olarak bir asteroitin yörüngesini değiştirebilir mi? Böyle bir faaliyetin yasal dayanağı nedir? COPUOS bu soruları tartışmaya başlamıştır.", source: "NASA DART Mission (2022), COPUOS/STSC Planetary Defence WG, UN IAWN" },
    { keywords: ["iawn","pdco","un","asteroid","uyari"], q: "BM IAWN ve Gezegensel Savunma Koordinasyonu nedir?", content: "BM bünyesinde kurulan IAWN (International Asteroid Warning Network) tehlikeli yakın Dünya nesnelerini (NEO) izlemekte ve uyarı ağı işletmektedir. SMPAG (Space Mission Planning Advisory Group) ise olası bir çarpışma senaryosunda uluslararası müdahale planlarını koordine etmektedir. Her iki yapı da tavsiye niteliğinde olup bağlayıcı karar alma yetkisine sahip değildir. BM Genel Kurul kararlarıyla güçlendirilen bu yapıların yasal statüsünün pekiştirilmesi tartışılmaktadır.", source: "UN GA Resolution 68/75 (2013), IAWN Charter, SMPAG Terms of Reference" },
    { keywords: ["uzay","sigorta","piyasa","lloyd","underwriting"], q: "Uzay Sigortası Piyasası nedir?", content: "Uzay sigortası, 1965'te uydu hasarlarını kapsayan ilk poliçeyle doğmuş ve günümüzde özel bir uzmanlık alanı haline gelmiştir. Başlıca ürünler: fırlatma ve ilk yıl işletme sigortası, uzun vadeli işletme sigortası ve üçüncü şahıs sorumluluk sigortasıdır. Lloyd's of London bu pazarın önde gelen taraflarındandır. Sigorta poliçelerinde hangi devletin hukukunun uygulanacağı, tazminat tavanları ve \"toplam kayıp\" (constructive total loss) tanımı kritik hukuki meselelerdir.", source: "OECD Space Forum Report on Space Economy (2021), Lloyd's Space Risk" },
    { keywords: ["uzay","vergilendirme","oecd","dijital","gelir"], q: "Uzay Ekonomisinde Vergilendirme nedir?", content: "Uzayda elde edilen gelirlerin hangi devletin vergilendirme yetkisine girdiği, \"kaynak ilkesi\" (gelirin elde edildiği yer) ile \"ikametgah ilkesi\" (şirketin merkezinin bulunduğu yer) açısından karmaşık sorular doğurmaktadır. OECD'nin BEPS (Vergi Tabanının Aşındırılması ve Kâr Aktarımı) projesi uzay şirketlerini de kapsamına almaya çalışmakla birlikte uzay faaliyetlerine özgü vergi kuralları henüz oluşturulmamıştır.", source: "OECD BEPS Project, OECD Space Forum (2021)" },
    { keywords: ["uzay","ekonomisi","buyukluk","piyasa","milyar"], q: "Uzay Ekonomisi'nin Büyüklüğü nedir?", content: "OECD ve Space Foundation verilerine göre küresel uzay ekonomisi 2023 yılı itibarıyla 630 milyar dolar büyüklüğe ulaşmıştır. Bu rakamın %70'inden fazlasını ticari uydu hizmetleri, yer sistemleri ve uydu üretimi oluşturmaktadır. Ticari uzay sektörünün 2040'a kadar 1 trilyon doları aşacağı öngörülmektedir. Bu büyümenin hukuki çerçeveyi de köklü biçimde dönüştürmesi beklenmektedir.", source: "OECD The Space Economy in Figures (2022), Space Foundation Report (2024)" },
    { keywords: ["mega","konstelasyon","starlink","oneweb","trafik"], q: "Mega Uydu Konstelasyonları ve Hukuki Sorunlar nedir?", content: "SpaceX'in Starlink, Amazon'un Kuiper ve OneWeb gibi mega uydu konstelasyonları binlerce uyduyu alçak yörüngeye yerleştirmektedir. Bu durum dört hukuki sorunu gündeme taşımaktadır: (1) yörünge tıkanıklığı ve ITU slot koordinasyonu, (2) astronomik gözlemlerin engellenmesi (ışık kirliliği), (3) çarpışma riskinin artması ve uzay çöpü üretimi, (4) uydu internetinin sansür ve egemenlik konularıyla kesişmesi. Bu sorunların hiçbirine yönelik bağlayıcı bir uluslararası kural henüz oluşturulamamıştır.", source: "ITU Radio Regulations, IAU Dark and Quiet Skies Initiative (2021), FCC Orbital Debris Rule (2022)" },
    { keywords: ["uzay","hukuku","lacune","bosluk","yeni","alan"], q: "Uzay Hukukunun Yeni Gelişme Alanları nedir?", content: "Akademisyenler ve COPUOS tarafından tartışılan başlıca yeni hukuk meseleleri şunlardır: (1) özel aktörlerin doğrudan uluslararası hukuk yükümlülükleri, (2) kaynak çıkarımı için bağlayıcı bir uluslararası rejim, (3) uzay trafik yönetiminin yasal çerçevesi, (4) ticari uzay istasyonlarının statüsü, (5) yapay zeka tabanlı otonom sistemlerin kullanımı ve sorumluluğu, (6) uzay turizminde yolcu hakları. Bu alanlarda bağlayıcı düzenlemelerin oluşturulması siyasi iradesizlik nedeniyle gecikmeye devam etmektedir.", source: "IISL Colloquium Proceedings (2023), COPUOS Hukuki Alt Komite Raporları" },
    { keywords: ["uzay","hukuku","ozel","sektor","denetim","yukümluluk"], q: "Özel Sektörün Uluslararası Uzay Hukuku Kapsamındaki Durumu nedir?", content: "OST ve diğer uzay antlaşmaları yalnızca devletleri muhatap almakta; özel şirketler doğrudan antlaşma yükümlüsü değildir. Ancak OST Madde VI, devletlerin hem kendi ulusal faaliyetlerinden hem de o devletin vatandaşı veya tescil devleti olan özel şirketlerin faaliyetlerinden uluslararası sorumlu olduğunu açıkça hükme bağlamaktadır. Bu yapı, devletlerin iç hukuk araçlarıyla özel sektörü denetlemesini zorunlu kılmakta; denetimi zayıf devletlerde ise uluslararası hukuki boşluk doğurmaktadır.", source: "OST Madde VI (1967), IISL Position Paper on Private Actors (2015)" }
,
    { keywords: ["karman","sinir","hava","uzay","100km"], q: "Hava Sahası ile Uzay Arasındaki Sınır nedir?", content: "Hava sahası ile uzay arasındaki siniri tanimlayan baglayi ci bir antlasma hukmu yoktur. FAI 100 km Karman Hattini benimserken ABD bazi amaclar icin 80 km esigini kullanmaktadir. Bu belirsizlik hipersonik araclar ve uzay ucagi konseptleri acisindan hangi hukuki rejimin uygulanacagi sorusunu cevapsiz birakmaktadir.", source: "COPUOS Hukuki Alt Komite, FAI Sporting Code" },
    { keywords: ["chicago","konvansiyonu","hava","egemenlik","1944"], q: "Chicago Konvansiyonu ve Hava Egemenlik Ilkesi nedir?", content: "1944 tarihli Chicago Konvansiyonu devletlerin kendi topraklari uzerindeki hava sahasinda tam ve munhasir egemenlige sahip oldugunu hukme baglamistir. Uzay hukuku bu ilkeyi yorunge yuksekliginde durdurur; ancak hangi irtifadan itibaren egemenligin sona erdigi tanimlanmamaktadir. Roket firlatmalarinin baska devletlerin hava sahasindan gecmesinin gerektirdigi izin meselesi bu boslu ktan kaynaklanmaktadir.", source: "Chicago Convention on International Civil Aviation (1944), ICAO Doc 7300" },
    { keywords: ["bm","bes","antlasma","uzay","temel"], q: "BM nin Bes Uzay Antlasmasi nelerdir?", content: "BM cercevesinde muzakere edilen bes temel uzay antlasmasi sunlardir: (1) Dis Uzay Antlasmasi 1967, (2) Kurtarma Anlasmasi 1968, (3) Sorumluluk Sozlesmesi 1972, (4) Tescil Sozlesmesi 1975, (5) Ay Anlasmasi 1979. Bu bes belge uzay hukukunun anayasal cekirdegini olusturmaktadir. 1979 sonrasinda yeni bagla yici uzay antlasmasi muzakere edilmemistir.", source: "UNOOSA Five UN Treaties on Outer Space" },
    { keywords: ["uzaktan","algilama","prensipler","1986","bm"], q: "BM Uzaktan Algilama Ilkeleri nedir?", content: "BM Genel Kurulunun 1986 da kabul ettigi bu ilkeler uydularla yapilan Dunya gozlemini duzenlemektedir. Baglay ici degildir; tavsiye niteligindedir. Temel ilkeler arasinda gozlemlenen devletin onceden rizasinin gerekmediği ancak elde edilen verilere makul kosullarda erisim hakki tanin masi gerektigi yer almaktadir.", source: "UN GA Resolution 41/65 (1986), COPUOS" },
    { keywords: ["nukleer","test","yasak","1963","atmosfer"], q: "Kismi Nukleer Test Yasak Antlasmasi ve Uzay nedir?", content: "1963 tarihli PTBT atmosferde, sualtinda ve uzayda nukleer silah testlerini yasaklamaktadir. Bu antlasma OST nin askeri hukumleriyle birlikte uzaydaki nukleer faaliyetlerin temel hukuki sinirlarini belirlemektedir.", source: "Partial Test Ban Treaty (1963), UNTS Vol. 480" },
    { keywords: ["inmarsat","uydu","organizasyon","denizcilik","havaci"], q: "Uluslararasi Uydu Organizasyonlari nedir?", content: "1979 da kurulan INMARSAT denizcilik ve havacilik uydu haberlesm esini saglamaktadir. 1999 da ozellestirilen INMARSAT uluslararasi yukumluluklerini surdurmektedir. INTELSAT 1964, EUTELSAT ve INTERSPUTNIK uluslararasi anlasm alarla kurulan uydu operatorleridir. Bu kuruluslarin ozellesti rilmesi kamu hizmeti yukumluluk leri ile ticari cika rlar arasindaki dengeyi tartismal i hale getirmistir.", source: "INMARSAT Convention (1976), INTELSAT Agreement (1971)" },
    { keywords: ["gps","gnss","galileo","glonass","beidou","seyrüsefer"], q: "GNSS Sistemleri ve Hukuki Sorumluluk nedir?", content: "ABD nin GPS i, Rusya nin GLONASS u, AB nin Galileo su ve Cin in BeiDou su kuresel seyruse fer uydu sistemlerini olusturmaktadir. Bu sistemlerin yanlis sinyal yaymas i durumunda hangi devletin sorumlu oldugu belirsizdir. Sivil havacilik, denizcilik ve otonom araclar bu sinyallere bagimli oldugund an sistematik bir hata felaket boyutuna ulasabilir.", source: "ICAO GNSS Provisions, EU Galileo Regulation (EU) 2021/696" },
    { keywords: ["ticari","firlatma","hizmet","sozlesme","icc"], q: "Ticari Uzay Firlatma Hizmet Sozlesmeleri nedir?", content: "SpaceX, Arianespace ve Rocket Lab gibi sirketlerle yapilan ticari firlatma sozlesmeleri ihracat kontrol mevzuati, sigorta gereksinimleri ve firlatma basarisizligi tazminat i gibi karmasik hukuki konulari kapsamaktadir. Uluslararasi Ticaret Odasi ICC tahkim kurallari bu sekto rde yaygin uyusmazlik cozum mekanizmasi olarak kullanilmaktadir.", source: "ITAR (22 CFR 120-130), EAR (15 CFR 730-774), ICC Arbitration Rules" },
    { keywords: ["itar","ear","ihracat","kontrolu","teknoloji","lisans"], q: "ITAR ve EAR Uzay Teknolojileri Ihracat Kontrolu nedir?", content: "ABD nin ITAR ve EAR duzenleme leri uydu teknoloji lerini ve bilesenlerin i kapsamaktadir. Herhangi bir ABD kisi, kurumu veya ABD mensei li parca iceren urun yabanci tarafa aktaril madan once lisans alinmasi gerekmektedir. Bu kurallar uluslararasi uzay isbirligini onemli olcude kisitlamakta ve bilimsel verilerin akademik yayimini bile etkileyebilmektedir.", source: "Arms Export Control Act, Export Administration Regulations, State Dept. DDTC" },
    { keywords: ["suborbital","turizm","virgin","blue","origin","ucus"], q: "Suborbital Uzay Turizmi nedir?", content: "Virgin Galactic in SpaceShipTwo ve Blue Origin in New Shepard araclari 100 km Karman Hattini asan suborbital ucuslar gerceklesti rmektedir. FAA bu ucuslari ticari uzay firlatmas i kapsaminda lisanslamakt a ve yolculara uzay ucusu katilimcisi statusu tanima ktadir. 2021 de hem Bezos hem Branson in kisa suborbital ucuslar gercekles tirmesi uzay turizmini teoriden pratike tasimistr.", source: "FAA Commercial Space Operator Certificate, 51 U.S.C. SS 50905" },
    { keywords: ["esa","kurulusantlasmasi","1975","uye","katki"], q: "ESA Kuruluş Antlasmasi nedir?", content: "Avrupa Uzay Ajansi ESA 1975 tarihli kuruluş antla smasiyla BM veya AB den bagimsiz hukuklar arasi bir kuruluş olarak kurulmustu r. 22 uye devlet bulunmaktadir. Uye devletler GSYIH oranlarina gore zorunlu katki payi oderken istege bagli programlara secimlik katilim saglayabilirler.", source: "ESA Convention (1975), ESA Ministerial Council Documents" },
    { keywords: ["ab","uzay","programi","tuzuk","2021","copernicus"], q: "AB Uzay Programi Tuzugu nedir?", content: "2021 sayili AB Uzay Programi Tuzugu Galileo, Copernicus, EGNOS, SST ve GOVSATCOM programlarini tek catı altında toplamıştır. Tuzuk ayni zamanda Avrupa Birliği Uzay Programi Ajans ini EUSPA kurmuş tur. AB nin uzay guvenligi ve savunma boyutuna giderek artan ilgisini yansitmaktadir.", source: "EU Regulation 2021/696 on the Union Space Programme, EUSPA" },
    { keywords: ["copernicus","sentinel","cevre","iklim","acik","veri"], q: "Copernicus Programi ve Acik Veri Ilkesi nedir?", content: "ESA ve AB nin Copernicus programi Sentinel uydulariyla iklim degisikligi, afet yonetimi ve deniz gozlem i icin veri saglamaktadir. Program elde edilen verilerin herkesin ucretsiz erisim ine acik oldugunu ilke olarak benimsem istir. Bu politika Paris Anlasmasi raporlama mekanizmalariyla dogrudan baglantilidır.", source: "Copernicus Data Policy, EU Regulation 2021/696, Paris Agreement Art. 13" },
    { keywords: ["uzay","tekel","antitrust","rekabet","pazar"], q: "Uzay Kaynaklarinda Tekellesme ve Rekabet Hukuku nedir?", content: "Bir sirketin Ay in guney kutubu gibi stratejik kaynak zengini bir bolgeyi munhasir bicimde kontrol etmesi hem OST nin serbest erisim ilkesiyle hem de ulusal rekabet hukuku yla celisebilir. SpaceX in Starlink ile Falcon 9 arasindaki dikey entegrasyon rekabet hukuku tartismalarinin odagina girmeye baslamistir.", source: "OST Madde I, OECD Competition Policy Roundtable: Space (2023)" },
    { keywords: ["insan","haklari","uzay","ihlal","yetki","devlet"], q: "Uzaydaki Faaliyetlerde Insan Haklari Yukumlulukleri nedir?", content: "Uluslararasi insan haklari hukuku devletlerin yetki alani icindeki kisile re uygulanir. Uzaydaki bir devlet aracinda bulunan kisiler o aracin tescil devletinin yargi yetkisi altindadir. Dolayisiyla ilgili devletin insan haklari yukumlulukle ri uzay aracinda da gecerlidir: iskence yasagi, keyfi tutuklamaya karsi koruma ve saglik hakki tescil devletini baglamaktadir.", source: "ICCPR Madde 2, NASA Human Research Program, IISL 2022" },
    { keywords: ["astronot","saglik","radyasyon","sinir","doz","nasa"], q: "Astronot Radyasyon Doz Sinirlari nedir?", content: "NASA ve ESA astronotlar icin meslek omru boyunca tolere edilebilir radyasyon doz sinirlari belirlem istir. Bu sinirlar cinsiyete ve yasa gore farklilasmaktaydi; 2022 de NASA yeni cinsiyet nort limitler aciklamistir. Radyasyon sinirini aşan astronotun derin uzay gorevine atanamaması is hukuku ve ayrimcilik yasal ari acisindan tartismal idir.", source: "NASA Space Flight Human System Standard NASA-STD-3001, NASA 2022 Radiation Limits" },
    { keywords: ["iss","emeklilik","2030","ticari","istasyon","sonra"], q: "ISS Sonrasi Donem ve Ticari Uzay Istasyonlari nedir?", content: "NASA ISS nin 2030 a kadar cali smaya devam edecegini ve ardından Pasifik Okyanus una kontrollu bicimde dusuruleceg ini aciklamistir. Post-ISS donemde NASA Axiom Space, Starlab ve Orbital Reef gibi ticari istasyonlara kira odeyerek kullanmayi planlamaktadir. Bu ticari istasyonlarin tescil statusu ve yargi yetkisi henuz netlesmemistir.", source: "NASA LEO Economy Plan (2022), FAA Commercial Space Station Licensing" },
    { keywords: ["clearspace","astroscale","adr","enkaz","kaldirma","demo"], q: "Aktif Enkaz Kaldirma Demonstrasyon Gorevleri nedir?", content: "ESA nin ClearSpace-1 gorevi 2026 da Vega roket artiklarin i yakalayip atmosfere sokacaktir. Astroscale nin ADRAS-J gorevi Japonya nin kendi H-2A roket artiklarina yaklasmayi test etmektedir. Bu gorevler baska devletlerin enkazina mudahale edebilmek icin ikili anlasma sart mi sorusunu gundeme tasimiştir.", source: "ESA ClearSpace-1 SNC (2020), Astroscale ADRAS-J JAXA Contract (2023)" },
    { keywords: ["starlink","itu","koordinasyon","slot","oncelisirlatma"], q: "Starlink ve ITU Koordinasyon Sureci nedir?", content: "SpaceX in Starlink konstelasyon u icin ITU ya bini erce uydu icin frekans ve yorunge koordinasyon u basvurusunda bulunulmustur. ITU koordinasyon proseduru genellikle yillarca surmek tedir; ancak Starlink uyduları basvuru tamamlanmadan firlatilm istir. Bu once firlatup sonra koordine et yaklasimi FCC 2022 de kisitlayan kurallar getirmistir.", source: "ITU Radio Regulations Article 9, FCC Orbital Debris Mitigation Rules (2022)" },
    { keywords: ["isik","kirliligi","iau","darksky","astronomi","konstelasyon"], q: "Uydu Isik Kirliligi ve IAU Tutumu nedir?", content: "Uluslararasi Astronomi Birligi IAU mega konstelasyonlarin yer tabanli astronomik gozle mleri olumsuz etkiledigini belgeleyen kapsamli raporlar yayimlamistir. IAU un onerisi uyduların parlakliğinin 7. kadirden sonuk tutulmasidir. 2021 de BM Karanlik ve Sessiz Gokyuzu Toplantisi bu soruna uluslararasi bir cozum arayisini baslatmistir.", source: "IAU Dark and Quiet Skies for Science and Society (2021), UN COP26" },
    { keywords: ["iltica","siginma","uzay","modül","hukuk","multecilik"], q: "Uzayda Siyasi Iltica Talepleri nedir?", content: "Bir astronotun gorev sirasinda baska bir devletin modulune gecere k siyasi siginma talep etmesi teorik ama tartismali bir senaryodur. 1951 Multeci Sozlesmesinin uzayda uygulanip uygulanmayacagi belirsizdir. ISS IGA modul sahibi devletin yargi yetkisini duzenlese de multeci hukukunun uzayda etk ili bic imde uygulanabilecegi bir mekanizma ongormemektedir.", source: "Refugee Convention (1951), ISS IGA Art. 5, IISL Working Papers" },
    { keywords: ["mars","koloni","statü","tescil","bagimsizlik","bayrak"], q: "Mars Kolonilerinin Uluslararasi Hukuki Statusu nedir?", content: "Bir Mars kolonisi kuruldugunda hangi hukuki rejimin uygulanacagi buyuk belirsizlik icermektedir. Bayrak devleti ilkesi cercevesinde firlatici devletin hukukunun gecerli olacagi ilk secenek gibi gorulmektedir. Ancak koloninin zamanla bagimsizilasmasi ve BM uyeligi nasil basv urabilecegi tarihs el ornek sizalanlard ir.", source: "OST Madde VI-VIII, Montevideo Convention (1933) kiyaslama, IISL Symposium (2021)" },
    { keywords: ["iisl","uzay","hukuk","institut","akademi","kollokyum"], q: "Uluslararasi Uzay Hukuku Enstitusu nedir?", content: "IISL 1960 da kurulan uzay hukukunun en onemli akademik kuruluslarindan biridir. Her yil IAC de kollokyum duzenleme kte ve Annals of Air and Space Law dergisinde yayinlar cikarmaktadir. IISL ayni zamanda BM COPUOS a danismanl ik sunmakta ve Manfred Lachs Uzay Hukuku Moot Court Yarismas ini organize etmektedir.", source: "IISL Statute (1960), IAC Proceedings, Annals of Air and Space Law" },
    { keywords: ["manfred","lachs","moot","court","ogrenci","yarısma"], q: "Manfred Lachs Uzay Hukuku Moot Court Yarismas i nedir?", content: "Her yil IAC buyunyesinde duzenlen en Manfred Lachs Uzay Hukuku Yarismasi hukuk fak ultesi ogrencilerine varsayimsal bir uzay hukuku uyusmazligini Uluslararasi Adalet Divani formatinda simule etme imkani sunar. Uzay hukuku alaninda kariyer yapmak isteyen genc hukukcular icin onemli bir platform niteligindedir.", source: "IISL Manfred Lachs Moot Court Competition Rules, IAC" },
    { keywords: ["pca","tahkim","uzay","2011","opsiyonel","kural"], q: "PCA Uzay Faaliyetleri Tahkim Kurallari nedir?", content: "Lahey deki Daimi Tahkim Mahkemesi PCA 2011 de Uzay Faaliyetlerinden Kaynaklanan Uyusmazliklarin Tahkimine Iliskin Istege Bagli Kurallar i yururluge koymustur. Bu kurallar devlet-devlet, devlet-ozel ve ozel-ozel uyusmazliklari kapsamaktadir. Uzay hukukuna ozgu teknik konularda uzman hakem tayini duzenlemeleri icerir ve en kapsamli uzay uyusmazlik cozum mekanizmasi olma ozelligini korumaktadir.", source: "PCA Optional Rules for Arbitration of Disputes Relating to Outer Space Activities (2011)" },
    { keywords: ["uzay","sigorta","ucuncu","sahis","zorunlu","firlatma"], q: "Ucuncu Sahis Uzay Sigortasi Zorunlulugu nedir?", content: "Pek cok devlet ticari firlatma lisansi icin ucuncu sahislara verilecek zararlari kapsayan zorunlu sorumluluk sigortasi sart kosmaktadir. ABD de bu mik tar maximun muhtemel kayip MPL hesabina dayanmaktadir. Avustralya, Fransa, Japonya ve Ingiltere de benzer zorunlu sigorta sistemle rine sahiptir.", source: "FAA Financial Responsibility Requirements, UK Space Act 2018, French Space Operations Act" },
    { keywords: ["ingiliz","space","act","2018","lisans","ulusal"], q: "Ingiltere Uzay Endustrisi Yasasi 2018 nedir?", content: "2018 tarihli UK Space Industry Act Ingiltere yi ticari uzay firlatmasi icin bir merkeze donusturmeyi hedeflemektedir. Yasa firlatma tesisleri nin lisanslanmasi, operatorlerin yukumluluk leri ve ucuncu sahis sorumluluk limitlerini duzenlemektedir. SaxaVord ve Spaceport Cornwall gibi firlatma alanlar i lisans almistir.", source: "UK Space Industry Act 2018, CAA Space Licensing" },
    { keywords: ["uzay","hukuku","kariyer","avukat","uzmanlik"], q: "Uzay Hukuku Alaninda Kariyer Imkanlari nedir?", content: "Uzay hukuku su alt alanlarda uzmanl asma imkani sunmaktadir: uluslararasi uzay hukuku devlet kurumlari, ticari uzay hukuku sircetler ve sigort a, fikri mulkiyet, telekomun ikasyon hukuku ITU duzenleme leri, ihracat kontrolu ITAR-EAR, uzay politikasi danismanligi ve akademisyenlik. Dunya da bu alanda dogrudan lisansustu program sunan universite ler arasinda McGill, Leiden ve Mississippi sayilabilir.", source: "IISL Education Resources, McGill University Institute of Air and Space Law" },
    { keywords: ["uzay","firlatma","cevre","ozon","emisyon","kirlilik"], q: "Uzay Firlatmalarinin Cevre sel Etkileri nedir?", content: "Roket firtlatmalari stratosferi k ozon tabakasini olumsuz etkil eyebilecek is ve alumina par tikuller i yaymaktadir. Bu etkileri duzenleyen ozel bir uluslararasi antlasma henuz mevcut degildir. Montreal Protokolu roket yakiti emisyonlarini kapsam disi birakmistir. Firlatma sayisinin artmasiyla bu boslugun kapatilmasi gerekliligi bilim ve hukuk cevrelerinde gundeme gelmektedir.", source: "Montreal Protocol (1987), NOAA Stratospheric Research, ESA Space Debris Office" },
    { keywords: ["paris","anlasmasi","uzay","emisyon","karbon","sera"], q: "Paris Anlasmasi ve Uzay Sektoru Emisyonlari nedir?", content: "Paris Anlasmasi uzay sektorunu dogrudan hedef alan bir duzenleme icermemektedir. Firlatma kaynakli emisyonlar cogunlukla egemenlik disi kategorilerde degerlendirilerek ulusal envanterlerden muaf tutulmaktadir. Uzay sek torunu kapsayacak uluslararasi emisyon standartlarinin olusturulmasi sure rdurulebilir uzay ekonomisi tartismalarinin oncelikli gundem maddesidir.", source: "Paris Agreement (2015), ICAO CORSIA, ESA" },
    { keywords: ["uzay","hava","durumu","gunes","firtinasi","carrington"], q: "Uzay Hava Durumu ve Hukuki Cerceve nedir?", content: "1859 Carrington Olayı gibi buyuk gunes firtinalari uyduları, elektrik sebebelerini ve GPS sistemlerini cokertme potansiyeline sahiptir. OST Madde XI devletlerin uzay kosulları hakkında bilgi paylasim yukumlulugu ongormektedir. Dunya Meteoroloji Orgutu WMO uzay hava durumu izleme aglarini koordine etmektedir.", source: "WMO Space Weather Coordination, NOAA SWPC, OST Madde XI" },
    { keywords: ["wto","uzay","hizmet","gatt","gats","ticaret"], q: "Dunya Ticaret Orgutu ve Uzay Hizmetleri nedir?", content: "WTO nun Hizmet Ticareti Genel Anlasmasi GATS uydu araciligiyla verilen telekomunikasyon hizmetlerini kapsamaktadir. Uzay kaynaklarının madenciligi ve ticareti WTO cercevesinde dogrudan duzenlenmemistir. Gelecekte Mars tan getirilen minerallerin gumruk siniflamasi ve tarife uygulamasi uzay-WTO hukuku kesisiminin en tartismali alanlarin dan biri olacaktır.", source: "GATS (1994), WTO Telecom Reference Paper, OECD Space Economy" },
    { keywords: ["uzay","dogum","vatandas","jussanguinis","jussoli","cocuk"], q: "Uzayda Dogum ve Vatandaslik nedir?", content: "Uluslararasi antlasmalar uzayda dogum durumunu acikca duzenlememektedir. Genel kabul goren yorum ebeveynlerin vatandaslik hukukunun jus sanguinis uygulanacagi yonundedir. Uzay aracının tescil devletinin topraklarinda dogmus sayılıp sayilmayacagi ise tartismalıdır. ISS de dunya ya gelen bir cocuk varsayimsali akademik sorulardan biridir.", source: "OST Madde VIII, Vatandaslik Hukuku Temel Ilkeleri, IISL" },
    { keywords: ["uzay","norm","davranis","sorumlu","devlet","2022"], q: "Uzayda Sorumlu Davraniş Normlari nedir?", content: "BM Genel Kurulu 2022 de Uzayda Sorumlu Davranislar kararini kabul etmis ve devletleri bu alanda normlar gelistirmeye davet etmistir. UK, Avustralya, Kanada ve Japonya gibi devletler ulusal sorumlu uzay davranisi ilkelerini yayimlamistir. Bu normlar bagla yici olmamakla birlikte uzayda orf-adet hukuku olusumu acisindan onemlidir.", source: "UN GA Resolution 77/41 (2022), UK Responsible Space Behaviour Policy" },
    { keywords: ["guven","artirici","onlem","csbm","seffaflık","uzay"], q: "Uzayda Guven Artirici Onlemler nedir?", content: "Guven Artirici Onlemler CBM-CSBM devletler arasinda yanlis hesap riskini azaltmayi amaclar. Uzay alaninda onerilen onlemler arasinda onceden bildirim yukumlulukl eri, tehlikeli yaklasim manevralar inin duyurulmasi ve uzay operasyon merkezleri arasinda dogrudan iletisim hatlarinin kurulmasi sayilabilir. BM Hukumet Uzmanlari Grup lari GGE bu alanda cesitli raporlar yayimlamistir.", source: "UN GGE on Transparency and Confidence-Building Measures (2013), UN GGE PAROS" },
    { keywords: ["uzay","arkeoloji","miras","apollo","izleri","koruma"], q: "Uzay Arkeolojisi ve Kulturel Miras Korunmasi nedir?", content: "Uzay arkeolojisi uzaydaki insan faaliyetlerinin kalintı larini inceleyen ve korunmasini savunan disiplinlerarasi bir alandır. Apollo inis alanlari, Voyager sondaları ve ilk uydu parcalari bu kapsamda ele alinmaktadir. UNESCO nun 1972 Dunya Mirasi Sozlesmesinin uzay nesneler ine genisletilip genisletilme yecegi tartişılmaktadır.", source: "UNESCO World Heritage Convention (1972), For All Moonkind Organization, IISL" },
    { keywords: ["iso","ccsds","standart","protokol","uyumluluk","teknik"], q: "Uzay Sistemleri Uluslararasi Standartlari nedir?", content: "ISO nun TC 20/SC 14 komitesi uzay sistemlerine yonelik teknik standartlar gelistirmektedir. CCSDS uzay araclari ile yer istasyonlari arasindaki veri iletisim protokollerini belirlemektedir. Bu teknik standartlar bagla yici olmasa da buyuk uzay ajanslari arasinda pratik uyumlulugu saglamaktadir.", source: "ISO TC 20/SC 14, CCSDS 132.0-B-3 (2021)" },
    { keywords: ["yapay","zeka","otonom","uzay","sorumluluk","karar"], q: "Uzayda Otonom Yapay Zeka ve Hukuki Sorumluluk nedir?", content: "Giderek artan sayida uzay araci otonom karar verme sistemlerine sahiptir. Bir yapay zeka tamamen insan mudahalesi olmaksizin baska bir uyduya carparsa sorumluluk kime aittir sorusu onem kazanmaktadir. Mevcut uzay hukuku devlet sorumluluğunu esas aldigindan tescil devleti sorumlu tutulacaktir; ancak ic hukukta yazilim gelistiricisine rucu mekanizmalari henuz yeterince gelismemistir.", source: "OST Madde VI-VII, UNIDIR Lethal Autonomous Weapons 2022, EU AI Act 2024" },
    { keywords: ["makine","ogrenimi","uydu","gozlem","veri","telif"], q: "Uydu Verilerinde Makine Ogrenimi ve Veri Haklari nedir?", content: "Modern gozlem uyduları toplanan ham verileri yerinde islemek icin makine ogrenimi algoritmalar ına basvurmaktadir. Bu algoritmalarin urettigi ciktilarin telif ve patent statusu belirsizligini korumaktadir. AB nin Yapay Zeka Yasasi 2024 ve GDPR uydu tabanli yuksek riskli YZ uygulamalarini kapsam altina almaktadir.", source: "EU AI Act (2024), GDPR Recital 47, WIPO Conversation on IP and AI" },
    { keywords: ["ay","suyu","elektroliz","yakit","isru","madencilik"], q: "Ay Suyu Madenciligi ve Yakit Uretimi Hukuku nedir?", content: "Ay ın kutup bolgelerindeki su buzunun elektrolizle hidrojen ve oksijene ayrıştırılarak roket yakiti uretimi ISRU olarak adlandirilmaktadir. Bu faaliyet OST kapsaminda kaynak cikarimi mi yoksa sadece isleme midir sorusu tartismalıdır. ABD ve Artemis Anlasmalari bu faaliyetleri mesru saymaktadir. Cin ve Rusya ise Ay Anlasmasinin ortak miras cercevesini esas alarak bu yoruma itiraz etmektedir.", source: "Artemis Accords Section 10, NASA ISRU Program, OST Madde II tartısmaları" },
    { keywords: ["asteroid","deger","platin","ekonomi","nickel","kobalt"], q: "Asteroid Madenciliginin Ekonomik Degeri nedir?", content: "Bir M-tipi metalik asteroidin icerdigi demir, nikel, kobalt ve platin grubu metallerın degeri trilyon dolarlara ulasabilir. Ancak bu metallerin kisa surede piyasaya surulmesi fiyatlari cokertebilir. Mevcut uluslararasi hukukta asteroidlerdeki kaynaklarin cikarim ve satisini duzenleyen ozel bir kural yoktur.", source: "OECD Space Economy Report, Planetary Resources, OST boslukları" },
    { keywords: ["skylab","grev","1973","astronot","calisma","hak"], q: "Skylab 4 Greyi ve Uzay Calisma Haklari nedir?", content: "1973-74 Skylab 4 görevinde us astronotlari yorgunluk ve as iri calisma baskisına karsi bir gun iletisim keserek Dunya ile baglantıyi yavaslattılar. Bu olay uzay calisani haklari tartismalarinda tarihi emsal olarak gosteriilmektedir. Gunumuzde uzun sureli Ay ve Mars gorevleri icin is hukuku korumalari yeniden gundeme gelmektedir.", source: "Skylab 4 Incident (1973-74), NASA Human Research Program, ILO" },
    { keywords: ["helyum3","fuzyon","enerji","ay","stratejik","madde"], q: "Helyum-3 ve Nukleer Fuzyon Enerjisi Hukuku nedir?", content: "Ay yuzeyinde gunes ruzgari tarafindan biriktiril en helyum-3 izotopu teorik nukleer fuzyon reaktorlerinde kullanilabilir. Milyarlarca dolarlık potansiyel deger neden iyle stratejik madde olarak degerlendirilmektedir. Mevcut hukukta helyum-3 cikarimiı ni duzenleven ozel bir kural yoktur.", source: "NASA Moon Mineralogy Mapper, Ay Antlasmasi Madde 11, OECD Space Forum" },
    { keywords: ["sinyalizasyon","istihbarat","sigint","uydu","dinleme"], q: "Uydu Tabanli Sinyal Istihbarati SIGINT Hukuku nedir?", content: "Uyduların diger devletlerin haberlesme sinyallerini dinlemesi SIGINT uluslararasi hukukta tartismali bir alandir. OST uzayda barisci l kullanim ilkesini ongormekte ancak pasif sinyal istihbaratini acikca yasaklamamaktadir. Devletlerin buyuk cogunlugu SIGINT uyduları isletmektedir; bunlarin faaliyetleri hukuki boslu kta surmektedir.", source: "OST Madde I-IV, Vienna Convention on Diplomatic Relations (1961)" },
    { keywords: ["biyolojik","kimyasal","silah","bwc","cwc","uzay"], q: "Biyolojik ve Kimyasal Silahlar Uzayda nasıl Duzenlenir?", content: "OST Madde IV yalnizca kitle imha silahlarinin yorungeye yerlestirilmesini yasaklamaktadir. Biyolojik Silahlar Sozlesmesi BWC 1972 ve Kimyasal Silahlar Sozlesmesi CWC 1993 gelistirilmesi ve kullani lmasini yasaklamaktadir; bu yasak uzayda da gecerlidir. Ancak denetim mekanizmalari zayiftir.", source: "BWC (1972), CWC (1993), OST Madde IV" },
    { keywords: ["uydu","toplam","kayip","constructive","sigorta","anlasmaz"], q: "Yapisal Toplam Kayip Uzay Sigortasinda nedir?", content: "Bir uydu nun kurtarilmasi veya onarilmasi ekonomik acisindan mumkun olmadığında yapisal toplam kayip constructive total loss olarak nitelendirilir. Yorüngede sıkışan veya yanlış irtifaya yerlesilen bir uydu fiziksel olarak butun olabilir ancak islevini yerine getiremez. Sigorta policelerinde bu durumun tanimlanmasi ciddi anlaşmazlıklara zemin hazirlamaktadir.", source: "Space Insurance Market Practice, Lloyd s Space Policy Wording, PCA Arbitration" },
    { keywords: ["astrobiyoloji","yasam","bulgu","hukuk","etik","mars"], q: "Uzayda Yasam Bulgusunun Hukuki Sonuclari nedir?", content: "Mars ta veya Europa da mikrobiyal yasam tespit edilmesi durumunda mevcut uzay hukuku ciddi yetersizlikler gosterecektir. OST nin zararlı kirlenme hukmu bu varliklari dolayli olarak korusa da bunlarin nasil taniml anacagi belirsizdir. COSPAR in gezegensel koruma kategorileri bilimsel cercevey i saglas a da bagla yici hukuki guvenceler yoktur.", source: "OST Madde IX, COSPAR Planetary Protection Policy, NASA Astrobiology Program" },
    { keywords: ["bae","emirates","uzay","hope","mars","yasa"], q: "BAE Uzay Programi ve Hope Mars Misyonu Hukuku nedir?", content: "Birlesik Arap Emirlikleri 2014 te kurulan UAE Uzay Ajansi ile bolgenin en gelismis uzay programlarindan birine sahiptir. 2020 de firlat ilan ve 2021 de Mars yorungesine giren Hope sondasi herhangi bir Arap devletinin ilk gezegenl erarasi misyonu olmustur. BAE nin 2019 tarihli Federal Uzay Ajansi Kanunu ticari uzay faaliyetleri ve lisanslamay i duzenleme ktedir.", source: "UAE Federal Space Agency Decree-Law (2019), UAE Hope Mars Mission (2020)" },
    { keywords: ["hindistan","isro","uzay","yasa","chandrayaan","2023"], q: "Hindistan Uzay Faaliyetleri Yasasi nedir?", content: "Hindistan uzun suredir tartisilan Uzay Faaliyetleri Yasa Tasarisi uzerinde calismaktadir. Son taslak ozel sektorun firlatma ve uydu operasyonlarina katilimini kolaylastirnray i hedeflemektedir. 2023 te Chandrayaan-3 ile Ay in guney kutbuna basarili inis gerceklestiren ilk ulke olan Hindistan in uzay programi global oneme kavusmustur.", source: "ISRO Space Activities Bill Draft (2023), Chandrayaan-3 Mission (2023)" },
    { keywords: ["global","commons","ortak","alan","deniz","uzay","antarktika"], q: "Kuresel Ortak Alanlar Hukuku Karsilastirmasi nedir?", content: "Uluslararasi hukukta kuresel ortak alanlar acik denizler, uluslararasi hava sahasi, Antarktika ve uzayi kapsamaktadir. Her biri farkl i bir hukuki rejime tabidir. Antarktika da askeri faaliyetler tamamen yasaktir 1959 Antarktika Antlasmasi. Uzay hukuku bu rejimlerden hem ilham almis hem de ayris mistir; ortak miras kavramini en az benimseyen rejim uzay hukukudur.", source: "Antarctic Treaty (1959), UNCLOS Madde 136, OST karsilastirmali analiz" },
    { keywords: ["turkiye","uzay","hukuku","mevzuat","bosluk","ihtiyac"], q: "Turkiye de Uzay Hukuku Mevzuat Bosluklari nedir?", content: "Turkiye OST basla olmak uzere temel uzay antlasmalarına taraf olmakla birlikte ulusal uzay faaliyetlerini dogrudan duzenleyen kapsamli bir uzay kanununa henuz sahip degildir. TUA nın kuruluş kararnamesi idari cercevey i belirlemekte; ancak firlatma lisanslamasi, ucuncu sahis sorumluluk sigortasi ve ticari kaynak faaliyetlerine iliskin ozel mevzuat eksikligi surmektedir.", source: "TUA Kuruluş Kararnamesi (2018), Karsilastirmali Uzay Hukuku Analizi" },
    { keywords: ["turksat","6a","yerli","haberlesme","2024","firlatma"], q: "Turksat 6A Turkiye nin Ilk Yerli Haberlesme Uydusu nedir?", content: "Turksat 6A TURKSAT ve TUSAS tarafindan yerli imkanlarla uretilen Turkiye nin ilk milli haberlesm e uydusudur. 8 Temmuz 2024 te SpaceX Falcon 9 roketi ile Cape Canaveral dan firlatilmistir. Jeostatyon er yorungeye yerlesen uydu 42 dogu boylam pozisyonunda hizmet vermektedir.", source: "TUA / TURKSAT Resmi Aciklamasi (2024), SpaceX Falcon 9 Manifest" },
    { keywords: ["artemis","turkiye","imza","2020","taahhut","barisci"], q: "Turkiye nin Artemis Anlasmalari ni Imzalamasi nedir?", content: "Turkiye Artemis Anlasmalari ni 2020 yilinda imzalayan ilk devletler arasinda yer almaktadir. Bu imza Turkiye nin ABD liderligindeki uzay koalisyonu nda yer aldigini tescil etmistir. Anlasma lar cercevesinde Turkiye seffaflik, tarihi alan koruması ve birlikte calisal bilirlik ilkelerini taahhut etmistir.", source: "NASA Artemis Accords Signatories, TUA Resmi Kaynaklari (2020)" },
    { keywords: ["uzay","hukuku","gelecek","reform","yeni","anlasma"], q: "Uzay Hukukunun Gelecegi ve Reform Ihtiyaci nedir?", content: "1979 sonrasinda yeni bir baglayi ci uzay antlasmasi muzakere edilmemistir. Akademisyenler uc ana reform yolunu tartismaktadir: mevcut antlasmalarin yorumunun gelisti rilmesi, yeni ikili ve cogul anlasmalarin yapilmasi veya BM cercevesinde kapsaml i yeni bir antlasmanin müzakere edilmesi. Buyuk gucler arasindaki jeopolitik rekabetin uc uncu secenek i olasiliksiz kildigini one surmektedir.", source: "IISL Colloquium Proceedings (2023), COPUOS Hukuki Alt Komite Raporları" },
    { keywords: ["uzay","ekonomi","buyüme","2040","trilyon","sektor"], q: "Uzay Ekonomisinin Buyumesi ve Hukuki Sonuclari nedir?", content: "Morgan Stanley ve Bank of America tahminlerine gore kuresel uzay ekonomisi 2040 a kadar 1 trilyon dolari asacaktir. Ticari uydu hizmetleri, uzay turizmi, asteroid madenciligi ve Mars kolonizasyonu bu buyume nin baslic a kaynakl arı olacaktir. Bu gelisme mevcut hukuki cerceve nin kapasit esini asacak ve uzay hukuku reforma larını zorunlu kilacaktir.", source: "Morgan Stanley Space Economy Report (2020), Bank of America Space Report (2021)" },
    { keywords: ["sputnik","1957","uzay","baslangic","sovyet","tarih"], q: "Sputnik ve Uzay Hukukunun Doguşu nedir?", content: "Sovyetler Birliginin 4 Ekim 1957 de firlattigi Sputnik-1 ilk yapay uydu olarak uzay cag ini baslatmistir. Sputnik in diger devletlerin hava sahasından geçmesi ve hicbir devletin itiraz etmemesi uzayin serbest gecis ilkesinin orf-adet hukukuyla yerles tiginin ilk gostergesi sayılmaktadir. BM 1958 de COPUOS un oncusu olan Ad Hoc Komiteyi kurmus ve uzay hukukunun kodifikasyonu baslamistir.", source: "UN GA Resolution 1348 (XIII) (1958), UNOOSA History" }
,
    { keywords: ["karman","sinir","hava","uzay"], q: "Hava Sahası ile Uzay Arasındaki Hukuki Sınır nedir?", content: "Hava sahası ile uzay arasındaki sınırı tanımlayan bağlayıcı bir uluslararası hukuk belgesi mevcut değildir. FAI 100 km Karman Hattını pratik ölçüt olarak benimsemiş; ABD ise 80 km eşiğini bazı amaçlar için kullanmaktadır. Bu belirsizlik hipersonik araçlar, uzay uçağı konseptleri ve suborital taşıtların hangi hukuki rejime tabi olduğu sorusunu yanıtsız bırakmaktadır. COPUOS Hukuki Alt Komitesi bu konuyu onlarca yıldır gündeminde tutmakta ancak konsensüs sağlanamamaktadır. Pratik yansıması: roket fırlatmalarının yabancı hava sahasından geçişinde izin alınıp alınmayacağı güncelliğini korumaktadır.", source: "COPUOS Hukuki Alt Komite Yıllık Raporları (1970-2023), FAI Sporting Code Section 8, Von Kármán 1956, M. Lachs The Law of Outer Space (1972)" },
    { keywords: ["chicago","konvansiyonu","hava","egemenlik"], q: "Chicago Konvansiyonu ve Hava Egemenliği İlkesi nedir?", content: "4 Nisan 1944 tarihli Chicago Konvansiyonu Madde 1, devletlerin kendi toprakları üzerindeki hava sahasında tam ve münhasır egemenliğe sahip olduğunu hükme bağlamıştır. 193 taraf devletle uluslararası hava hukukunun temel taşını oluşturmaktadır. Kritik soru: bu tam egemenlik hangi irtifaya kadar uzanmaktadır? Roket fırlatmalarının başka devletlerin hava sahasından geçişinde izin gerekirken uzay araçlarında buna gerek olmaması, sınırın nerede başladığına bağlıdır. Uzay uçaklarının karma profili hibrit statü tartışmalarına zemin hazırlamaktadır.", source: "Chicago Convention on International Civil Aviation (1944), ICAO Doc 7300/9 Ed. 10, M. Milde International Air Law and ICAO (2008), COPUOS/LEGAL/2023" },
    { keywords: ["bm","bes","antlasma","uzay"], q: "BM'nin Beş Temel Uzay Antlaşması nelerdir?", content: "BM COPUOS müzakereleri sonucunda beş temel uzay antlaşması kabul edilmiştir: (1) Dış Uzay Antlaşması 1967 — 115 onay; (2) Kurtarma Anlaşması 1968 — 100 onay; (3) Sorumluluk Sözleşmesi 1972 — 98 onay; (4) Tescil Sözleşmesi 1975 — 70 onay; (5) Ay Anlaşması 1979 — yalnızca 18 onay. Bu beş belge uzay hukukunun anayasal çekirdeğini oluşturmaktadır. 1979 sonrasında yeni bağlayıcı uzay antlaşması müzakere edilmemiş; ikili anlaşmalar ve yumuşak hukuk belgeler öne çıkmıştır.", source: "UNOOSA Five UN Treaties on Outer Space 2023, UN A/RES/2222(XXI), 2345(XXII), 2777(XXVI), 3235(XXIX), 34/68" },
    { keywords: ["uzaktan","algilama","prensipler","1986"], q: "BM Uzaktan Algılama İlkeleri (1986) nedir?", content: "15 Aralık 1986 tarihli BM Genel Kurulu Kararı 41/65, bağlayıcı olmayan 15 ilkeden oluşmaktadır. Temel hüküm: gözlemlenen devletin önceden rıza vermesine gerek yoktur; bu açık gökyüzü prensibi tüm devletlerin uzay gözlemini meşru saymaktadır. Gözlemlenen devletin kendi topraklarına ilişkin birincil veriye makul koşullarda erişim hakkı da tanınmıştır. Ticari yüksek çözünürlüklü uydu görüntülerinin yaygınlaşması ve YZ destekli analizin artmasıyla bu ilkelerin güncellenmesi tartışmaları yoğunlaşmaktadır.", source: "UN GA Resolution 41/65 (15 Aralık 1986), COPUOS/LEGAL, B. Cheng Studies in International Space Law (1997), Frans von der Dunk Handbook of Space Law (2015)" },
    { keywords: ["ptbt","nukleer","test","1963"], q: "Kısmi Nükleer Test Yasak Antlaşması ve Uzay İlişkisi nedir?", content: "5 Ağustos 1963 tarihli PTBT, nükleer silah testlerini atmosferde, su altında ve uzayda açıkça yasaklamaktadır. 125 taraf devlete sahip bu antlaşma, 1962 Starfish Prime operasyonuna tepki olarak hazırlanmıştır. Starfish Prime yüksek irtifa patlamasıyla oluşan EMP Pasifik üzerindeki uyduları geçici olarak devre dışı bırakmış; uzay altyapısının nükleer tehdide karşı kırılganlığını somutlaştırmıştır. PTBT ve OST Madde IV birlikte uzaydaki nükleer faaliyetlerin temel hukuki sınırlarını belirlemektedir.", source: "Partial Test Ban Treaty UNTS Vol. 480 No. 6964 (1963), Starfish Prime EMP Analysis DTRA, SIPRI Yearbook" },
    { keywords: ["inmarsat","uydu","organizasyon","haberlesme"], q: "Uluslararası Uydu Organizasyonları ve Hukuki Statüleri nedir?", content: "Başlıca uluslararası uydu örgütleri: INTELSAT 1964 (küresel ilk konsorsiyum), INTERSPUTNIK 1971 (Sovyet bloku), INMARSAT 1976/1979 (denizcilik-havacılık), EUTELSAT 1977/1985 (Avrupa). Bu örgütler başlangıçta hükümetlerarası kuruluştu; 1990 ve 2000'lerde çoğu özelleştirildi. Ancak özelleştirme sonrasında antlaşmadan kaynaklanan kamu hizmeti yükümlülükleri devam etmiş; bu durum ticari çıkarlarla kamu yükümlülükleri arasında süregelen gerilim yaratmıştır.", source: "INTELSAT Agreement (1971), INMARSAT Convention and Operating Agreement (1976), EUTELSAT Convention (1982), Frans von der Dunk Handbook of Space Law (2015) Ch. 13" },
    { keywords: ["gnss","gps","galileo","sorumluluk"], q: "GNSS Sistemleri ve Hukuki Sorumluluk nedir?", content: "Dört büyük GNSS sistemi: ABD GPS (31 uydu), Rusya GLONASS, AB Galileo (yalnızca sivil) ve Çin BeiDou (2020 küresel kapsam). Bu sistemlerin kasıtlı veya teknik arıza nedeniyle yanlış sinyal yayması havacılık, denizcilik, otonom araçlar ve finansal altyapı açısından felaket boyutuna ulaşabilir. Mevcut hukukta sinyal hatasından kaynaklanan zararlar için sistemi işleten devletin sorumluluğu oldukça sınırlı tutulmaktadır. ICAO standartları sinyal bütünlüğü gereksinimlerini tanımlamış olsa da tazminat mekanizmaları eksiktir.", source: "ICAO GNSS Standards Annex 10, EU Galileo Regulation 2021/696, GPS Standard Positioning Service Performance Standard (2020), GLONASS ICD 2016" },
    { keywords: ["ticari","firlatma","sozlesme","icc"], q: "Ticari Uzay Fırlatma Sözleşmeleri ve Uyuşmazlık Çözümü nedir?", content: "SpaceX, Arianespace, Rocket Lab gibi şirketlerle yapılan ticari fırlatma sözleşmeleri; ihracat kontrol uyum şartları ITAR-EAR, fırlatma başarısızlığı tanımı, yük kaybı sigortası, karşılıklı feragatname cross-waiver hükümleri ve mücbir sebep tanımları gibi karmaşık unsurlar içermektedir. ICC tahkimi yaygın uyuşmazlık çözüm mekanizmasıdır. Gizlilik kaydı nedeniyle bu sözleşmeler nadiren kamuoyuna açıldığından emsal hukuku son derece sınırlıdır.", source: "ICC Arbitration Rules (2021), PCA Optional Rules for Space Disputes (2011), ITAR 22 CFR 120-130, EAR 15 CFR 730-774, Diederiks-Verschoor Kumar An Introduction to Space Law (2008)" },
    { keywords: ["itar","ear","ihracat","teknoloji"], q: "ITAR ve EAR — Uzay Teknolojilerinde İhracat Kontrolü nedir?", content: "ABD ITAR ve EAR düzenlemeleri uydu sistemlerini ve bileşenlerini kapsamaktadır. ITAR kapsamındaki uydu kalemleri USML listesinde, EAR kapsamındakiler CCL listesindedir. ABD menşeli parça içeren ürünün yabancı tarafa aktarılması lisans almayı gerektirmektedir. Bu kurallar uluslararası uzay işbirliğini ciddi biçimde kısıtlamakta; Türkiye dahil pek çok ülkenin ABD bileşenli uydu satın almasını güçleştirmektedir. 2014'te uyduların bir kısmı USML'den CCL'ye aktarılarak kurallar biraz gevşetilmiştir.", source: "Arms Export Control Act 22 U.S.C. 2778, Export Administration Regulations 15 CFR 730-774, ITAR 22 CFR 120-130, State Dept. DDTC Guidance, P. Hays K. Lal US Space Policy Unbound (2011)" },
    { keywords: ["suborbital","turizm","virgin","ucus"], q: "Suborital Uzay Turizmi — Hukuki Çerçeve nedir?", content: "SpaceShipOne 2004'te Ansari X Ödülü'nü kazanarak suborital ticari uçuşun miladını oluşturmuştur. Virgin Galactic SpaceShipTwo ve Blue Origin New Shepard 100 km Karman Hattını aşan uçuşlar gerçekleştirmektedir. ABD FAA 14 CFR Part 460 kapsamında yolcular uzay uçuşu katılımcısı tanımlanmış; uçuş öncesi aydınlatılmış onam zorunlu kılınmıştır. Operatörün ağır kusuru feragatnameyi geçersiz kılar. 2021'de hem Bezos hem Branson'ın uçuşları gerçekleşmesiyle pasaport, gümrük ve uzaydan getirilen nesnenin statüsü gibi pratik sorular gündeme taşınmıştır.", source: "FAA 14 CFR Part 460, Commercial Space Launch Competitiveness Act Sec. 50905 (2015), Blue Origin New Shepard Flight Operations, Virgin Galactic S-1 Filing SEC 2019" },
    { keywords: ["esa","kurulusu","1975","uye"], q: "ESA Kuruluş Antlaşması — Yapı ve Hukuki Statü nedir?", content: "Avrupa Uzay Ajansı, 30 Mayıs 1975'te Paris'te imzalanan Kuruluş Antlaşması ile BM ve AB'den bağımsız hükümetlerarası kuruluş olarak tesis edilmiştir. 2024 itibarıyla 22 tam üye devlet bulunmaktadır. Finansman: zorunlu katkı programı (bilim, uzay durumu) ve isteğe bağlı katkı programları (Ariane, Galileo, Copernicus). ESA'nın AB'den bağımsızlığı Norveç ve İsviçre gibi AB üyesi olmayan devletlerin tam üyeliğini mümkün kılmaktadır. ESA-AB ilişkisi 2004'te imzalanan çerçeve anlaşmayla yapılandırılmıştır.", source: "ESA Convention (1975 amended 2010), ESA BR-330 (2017), ESA-EU Framework Agreement (2004), ESA Annual Report 2023" },
    { keywords: ["ab","uzay","tuzuk","2021"], q: "AB Uzay Programı Tüzüğü 2021/696 nedir?", content: "AB Uzay Programı Tüzüğü tüm AB uzay programlarını tek çatı altında toplamıştır: Galileo küresel seyrüsefer, Copernicus Dünya gözlemi, EGNOS bölgesel iyileştirme, SST uzay gözetleme, GOVSATCOM hükümet iletişimi ve Horizon Europe araştırmaları. EUSPA ajansını kurmuştur. Tüzük AB'nin savunma ve güvenlik boyutunu uzay politikasına entegre etmekte; 2021-2027 çok yıllı mali çerçevesinde yaklaşık 15 milyar Euro bütçe ayrılmaktadır.", source: "EU Regulation 2021/696 (28 Nisan 2021), EU MFF 2021-2027, EUSPA Annual Report 2023" },
    { keywords: ["copernicus","sentinel","cevre","veri"], q: "Copernicus Programı ve Açık Veri Politikası nedir?", content: "Copernicus, ESA tarafından geliştirilen ve AB tarafından finanse edilen Sentinel uydu serisiyle iklim değişikliği izleme, afet yönetimi, deniz gözlemi ve arazi haritalama için veri sağlamaktadır. Elde edilen verilerin tam, ücretsiz ve açık şekilde herkesin erişimine sunulması ilke olarak benimsenmiştir. Bu politika Paris Anlaşması Madde 13 şeffaflık çerçevesiyle doğrudan bağlantılıdır. 2023 itibarıyla Copernicus günde 12 TB'den fazla veri üretmektedir.", source: "EU Regulation 2021/696, Copernicus Data Policy Commission Decision 2019/1533, Paris Agreement Art. 13, ESA Copernicus Overview 2023" },
    { keywords: ["uzay","tekel","rekabet","antitrust"], q: "Uzay Kaynaklarında Tekelleşme ve Rekabet Hukuku nedir?", content: "Uzay ekonomisinde tekelleşme riski üç düzeyde belirginleşmektedir: kaynak coğrafyası tekeli (güney kutbu gibi stratejik bölgeler üzerinde fiili münhasır kontrol), pazar tekeli (SpaceX Starlink-Falcon 9 dikey entegrasyonu FTC gündemine girmiştir) ve frekans-slot tekeli (koordinasyon öncesi fırlatma pratiği). OECD'nin 2023 uzay rekabet raporu bu endişeleri sistematik biçimde ele almıştır. Büyük güçlerin rekabet otoriteleri uzay ekonomisini henüz doğrudan kapsam altına almamıştır.", source: "OST Madde I, OECD Competition Policy Roundtable Space Economy (2023), FTC Annual Highlights, EC DG COMP" },
    { keywords: ["insan","haklari","uzay","yetki"], q: "Uzaydaki Faaliyetlerde İnsan Hakları Yükümlülükleri nedir?", content: "ICCPR Madde 2/1 taraf devletlerin yetki alanı içindeki bireylerin haklarını güvence altına almasını öngörmektedir. Uluslararası Adalet Divanı ve BM insan hakları organları yetki alanının fiili kontrol uygulanan her alanı kapsadığını teyit etmiştir. Bu yorum çerçevesinde uzaydaki bir devlet aracındaki kişiler tescil devletinin yargı ve kontrolü altındadır; işkence yasağı, keyfi gözaltıya karşı koruma ve sağlık hakkı gibi güvenceler geçerlidir. Uzun süreli Mars görevlerinde bu yükümlülüklerin nasıl uygulanacağı büyük belirsizlik içermektedir.", source: "ICCPR Madde 2/1 (1966), ICJ Legal Consequences of the Construction of a Wall (2004), UN Human Rights Committee General Comment No. 31, NASA Human Research Program HRP-47052" },
    { keywords: ["astronot","radyasyon","doz","sinir"], q: "Astronot Radyasyon Doz Sınırları ve İş Hukuku Boyutu nedir?", content: "NASA astronotlar için Mesleki Maruz Kalma Sınırlarını belirlemiştir. Tarihsel olarak cinsiyete ve yaşa göre farklılaşan bu sınırlar 2022'de cinsiyet-nötr biçimde yeniden düzenlenmiş; yaşam boyu yüzde 3 ölüm riski artışı limiti benimsenmiştir. Bu yeniden düzenleme kadın astronotların derin uzay görevlerine katılımını kısıtlayan sınırların ayrımcılık iddiasına yol açmasının ardından gerçekleşmiştir. Radyasyon limitini aşan astronotun görevlendirilememesi ABD iş hukukunda makul uyum tartışmalarıyla da kesişmektedir.", source: "NASA-STD-3001 Rev. B (2019), NASA Space Policy Directive-6, NASA 2022 Career Radiation Limit Update, 29 CFR Part 1910 OSHA, NCRP Report 132" },
    { keywords: ["iss","2030","sonrasi","ticari"], q: "ISS Sonrası Dönem ve Ticari Uzay İstasyonları nedir?", content: "NASA ISS'in 2030'a kadar çalışacağını ve ardından Point Nemo bölgesine kontrollü biçimde düşürüleceğini açıklamıştır. Post-ISS dönemde NASA özel istasyonlara kira ödeyerek müşteri konumuna geçmeyi planlamaktadır. Seçilen şirketler: Axiom Space 2026-2028 hedefi, Starlab Nanoracks-Voyager Space-Airbus ve Orbital Reef Blue Origin-Sierra Space. Bu istasyonların tescil statüsü, IGA benzeri çok taraflı çerçeve gereklilikleri ve yargı yetkisi henüz netleşmemiştir.", source: "NASA LEO Commercialization Strategy (2022), FAA Commercial Space Station Licensing Framework, Axiom Space Contract NNJ21HA01C, NASA CSP NextSTEP-2 Awards" },
    { keywords: ["clearspace","astroscale","adr","enkaz"], q: "Aktif Enkaz Kaldırma Operasyonları ve Hukuki Boyutu nedir?", content: "ESA'nın ClearSpace SA ile imzaladığı 86 milyon Euro değerindeki sözleşme kapsamında ClearSpace-1, 2026'da Vega roketinin VESPA adaptörünü yörüngeden kaldıracaktır. Bu tarihin ticari amaçlı ilk Aktif Enkaz Kaldırma operasyonu olacaktır. Astroscale ADRAS-J ise Japonya'nın kendi H-2A roket üst kademesini incelemektedir. Kritik hukuki sorun: OST Madde VIII uzay nesnelerinin tescil devletinin mülkiyetinde kaldığını öngörmektedir; bu nedenle başka devletin enkazının izinsiz kaldırılması egemenlik ihlali sayılabilir.", source: "ESA ClearSpace-1 Service Contract (2020), Astroscale ADRAS-J JAXA Programme, OST Madde VIII, IADC Space Debris Mitigation Guidelines, Frans von der Dunk Handbook of Space Law Ch. 22" },
    { keywords: ["starlink","itu","koordinasyon","slot"], q: "Starlink ve ITU Koordinasyon Sürecinin Hukuki Gerilimleri nedir?", content: "ITU Radyo Yönetmelikleri Madde 9 kapsamında koordinasyon tamamlanmadan önce diğer operatörlerle koordinasyon sürecinin başlatılması gerekmektedir. SpaceX binlerce uydu için onlarca koordinasyon başvurusu yapmış ancak tamamlanmadan fırlatmalar gerçekleştirmiştir. Bu önce fırlat sonra koordine et yaklaşımı ITU çerçevesini fiilen zorlamaktadır. FCC Aralık 2022'de uyduların görev sonrasında 5 yıl içinde atmosfere sokulmasını (önceki 25 yıl yerine) zorunlu kılmıştır. ITU'nun yaptırım araçları son derece sınırlıdır.", source: "ITU Radio Regulations Article 9 ve 22 (2020), FCC Orbital Debris Mitigation Rules FCC 22-74 (2022), ITU BR IFIC Database, L. Zhao Safeguarding Global Electromagnetic Environment (2014)" },
    { keywords: ["isik","kirliligi","iau","konstelasyon"], q: "Mega Konstelasyonlar ve IAU Işık Kirliliği Tutumu nedir?", content: "IAU 2019'da ilk kaygılarını paylaşmış; 2021'de BM'ye Karanlık ve Sessiz Gökyüzü Raporu'nu sunmuştur. IAU önerisine göre uyduların parlaklığı 7. görsel kadirden sönük tutulmalıdır. SpaceX VisorSat perdeleri ve Darksat kaplama gibi önlemler uygulamış ancak etkinlikleri sınırlı kalmıştır. Rubin Gözlemevi için uydu geçişleri ciddi veri bozulmasına neden olmaktadır. Bağlayıcı düzenleme yoktur; 2022 BM Genel Kurulu kararı norm oluşturma sürecini başlatmıştır.", source: "IAU CPS Dark and Quiet Skies Report (2021), UN CPS Working Group Reports, IAU Resolution B7 (2019), Vera C. Rubin Observatory Impact Assessment, SpaceX Darksat Technical Brief" },
    { keywords: ["iltica","siginma","uzay","modül"], q: "Uzayda Siyasi İltica Talepleri ve Hukuki Çerçeve nedir?", content: "Bir astronotun görev sırasında başka devletin modülüne geçerek iltica talep etmesi giderek daha gerçekçi bir senaryo haline gelmektedir. ISS IGA her modül üzerinde tescil devletinin yargı ve kontrol yetkisini düzenlemiştir; modüle geçiş teknik olarak başka yargı alanına girmeye benzer. 1951 Cenevre Sözleşmesi'nin uzaydaki kişilere uygulanıp uygulanmayacağı sorgulanmaktadır. Bağımsız ticari istasyonlar çoğaldıkça bu mesele akademik olmaktan çıkabilir.", source: "Refugee Convention (1951), ISS IGA Art. 5 ve 11 (1998), UNHCR Handbook and Guidelines, Frans von der Dunk Handbook of Space Law Ch. 8" },
    { keywords: ["mars","koloni","statü","hukuk"], q: "Mars Kolonilerinin Uluslararası Hukuki Statüsü nedir?", content: "Bir Mars kolonisi kurulduğunda hangi hukuki rejimin geçerli olacağı belirsizdir. İlk seçenek bayrak devleti ilkesi: tescil devletinin hukuku uygulanır ancak Mars'taki mesafe ve özerk yönetim gereklilikleriyle çelişir. OST'nin gök cisimleri ifadesi Mars'ı kapsamakla birlikte yerleşim yönetimini ayrıntılı düzenlememektedir. Uzun vadede Montevideo Sözleşmesi'nin devlet tanımı kriterleri teorik olarak tartışılmaktadır; ancak bu kriterlerin uzayda uygulanması hukuken belirsizdir.", source: "OST Madde VI-VIII (1967), Montevideo Convention (1933), IISL Symposium Proceedings (2021), M. Sundahl Uncharted Territory The Legal Framework for Mars Habitation (2000)" },
    { keywords: ["iisl","uzay","hukuk","kollokyum"], q: "Uluslararası Uzay Hukuku Enstitüsü nedir?", content: "1960'da kurulan IISL uzay hukukunun en köklü akademik kuruluşudur ve BM ECOSOC bünyesinde danışman statüsüne sahiptir. Yıllık IAC bünyesinde kollokyum düzenlemekte; Annals of Air and Space Law hakemli dergisini çıkarmaktadır. COPUOS'a sistematik katkı sunar ve devletlerin antlaşma yorumunu etkileyen pozisyon belgeleri yayımlar. Türkiye'den hukukçular IISL üyeliği yoluyla uluslararası uzay hukuku topluluğuyla bağ kurabilmektedir.", source: "IISL Statute (1960), IAC IISL Colloquium Proceedings (1990-2023), Annals of Air and Space Law AASL, IISL Position Paper on Commercial Activities (2015)" },
    { keywords: ["manfred","lachs","moot","yarısma"], q: "Manfred Lachs Uzay Hukuku Moot Court Yarışması nedir?", content: "IISL ve IAF tarafından ortaklaşa düzenlenen bu yarışma her yıl IAC bünyesinde gerçekleşmektedir. Uluslararası Adalet Divanı'nda görülecek varsayımsal bir uzay hukuku davasını simüle etmektedir; hakemler gerçek uluslararası hakimler ve uzay hukuku akademisyenlerinden oluşmaktadır. Bölgesel ön elemelerden geçen takımlar finalde karşılaşmaktadır. Uzay hukuku alanında kariyer başlangıcı için kritik platform niteliği taşımakta; kazanan takımlar uluslararası ajanslardan iş teklifleri alabilmektedir.", source: "IISL-IAF Manfred Lachs Moot Court Competition Rules (2023), IAC Competition History, IISL Reedited Compilation of Competition Problems" },
    { keywords: ["pca","tahkim","uzay","kural"], q: "PCA Uzay Faaliyetleri Tahkim Kuralları nedir?", content: "PCA'nın 2011 tarihli İsteğe Bağlı Uzay Tahkim Kuralları uzaya özgü teknik ve hukuki kompleksliği karşılamak üzere hazırlanmıştır. Temel özellikler: devlet-devlet, devlet-özel ve özel-özel uyuşmazlıkları kapsamakta; yörünge dinamiği ve uzay teknolojisi konularında teknik uzman görevlendirilebilmekte; gizlilik gereksinimlerini karşılayacak prosedürel esneklik sunulmaktadır. Mega konstelasyonlar ve uzay madenciliği davalarının artmasıyla daha fazla başvurulması beklenmektedir.", source: "PCA Optional Rules for Arbitration of Disputes Relating to Outer Space Activities (2011), PCA Case Repository, R. Muttoo Arbitration in Space Disputes IISL 2018" },
    { keywords: ["uzay","sigorta","zorunlu","firlatma"], q: "Üçüncü Şahıs Uzay Sigortası Zorunluluğu nedir?", content: "Birçok devlet ticari uzay fırlatma lisansı için zorunlu sorumluluk sigortası şart koşmaktadır. ABD'de FAA maksimum muhtemel kayıp metodolojisine göre sigorta miktarını hesaplar; genellikle 500 milyon ile birkaç milyar dolar arasındadır. Avustralya Uzay Yasası 2018, Fransa Uzay Operasyonları Yasası 2008, Japonya Uzay Faaliyetleri Yasası 2016 ve UK Space Industry Act 2018 benzer sistemlere sahiptir. Megakonstelasyon uydusunun büyük altyapıya çarpması senaryosunda sigorta piyasasının kapasitesi hâlâ tartışmalıdır.", source: "FAA Financial Responsibility Requirements 14 CFR Part 440, UK Space Industry Act 2018 Sec. 12-15, French Space Operations Act 2008, Australian Space Launches and Returns Act 2018" },
    { keywords: ["uk","space","act","2018"], q: "İngiltere Uzay Endüstrisi Yasası 2018 nedir?", content: "UK Space Industry Act 2018 Brexit sonrasında İngiltere'nin ulusal uzay kapasitesini güçlendirme stratejisinin yasal altyapısıdır. Fırlatma operatörü, uzay limanı ve yörünge operatörü lisanslarını tanımlamış; CAA ve Secretary of State'i lisanslama makamı olarak belirlemiştir. SaxaVord Uzay Limanı Shetland ve Spaceport Cornwall lisans almıştır. Üçüncü şahıs sorumluluk sigortası ve devlet altyapısına geri ödeme düzenlemeleri de yasaya dahil edilmiştir.", source: "UK Space Industry Act 2018 c.5, Space Industry Regulations 2021 SI 2021/792, CAA Space Licensing Guidance CAP 2252, UK Space Agency Strategy 2030" },
    { keywords: ["uzay","kariyer","avukat","uzmanlik"], q: "Uzay Hukuku Alanında Kariyer ve Uzmanlık İmkânları nedir?", content: "Uzay hukuku birden fazla disiplinin kesişiminde yer almaktadır. Kamu sektörü: ulusal uzay ajansları NASA, ESA, TUA; uluslararası örgütler UNOOSA, ITU; dışişleri bakanlıklarının uzay politikası birimleri. Özel sektör: uydu operatörleri, ticari fırlatma şirketleri, sigorta şirketleri ve danışmanlık firmaları. Akademi: McGill Üniversitesi IASL, Leiden Üniversitesi IIASL, Mississippi Üniversitesi Ulusal Uzay Hukuku Merkezi. Türkiye'de ODTÜ ve İstanbul Üniversitesi'nde konuya ilişkin lisansüstü program ve araştırma projeleri gelişmektedir.", source: "IISL Education Resources, McGill IASL LLM Programme, Leiden Adv. LLM Air and Space Law, National Center for Remote Sensing Air and Space Law at Univ. of Mississippi" },
    { keywords: ["uzay","cevre","ozon","firlatma"], q: "Uzay Fırlatmalarının Çevresel Etkileri ve Uluslararası Hukuk nedir?", content: "Roket fırlatmaları stratosferik ozon tabakasını olumsuz etkileyebilecek is ve alumina partikülleri yaymaktadır. 2022 UCL çalışması bazı yeniden kullanılabilir roketlerin önemli ozon tahribatı yarattığını ortaya koymuştur. Montreal Protokolü 1987 roket emisyonlarını kapsam dışı bırakmıştır. Fırlatma sayısının 2020'deki 115'ten 2023'te 220'ye çıkmasıyla bu boşluğun kapatılması gerekliliği hem bilim hem hukuk çevrelerinde aciliyete kavuşmuştur.", source: "Montreal Protocol (1987), Dallas et al. Stratospheric Ozone Depletion (2014), UCL Study on Reusable Rockets and Ozone (2022), ESA Space Debris Office" },
    { keywords: ["paris","uzay","emisyon","karbon"], q: "Paris Anlaşması ve Uzay Sektörü Emisyonlarının Düzenlenmesi nedir?", content: "Paris Anlaşması 2015 uzay fırlatmalarından kaynaklanan emisyonları doğrudan hedef almamaktadır. Fırlatma emisyonları UNFCCC ulusal envanterlerinde belirsiz kalmakta; büyük fırlatma devletlerinin raporlaması tutarsız olmaktadır. Bu boşluğun giderilmesi için ICAO'nun havacılık için geliştirdiği CORSIA benzeri bir uzay sektörü emisyon mekanizması önerilmekte ancak siyasi uzlaşı henüz sağlanamamaktadır.", source: "Paris Agreement Art. 4 ve 13 (2015), ICAO CORSIA Annex 16 Vol IV, UNFCCC GHG Inventory Guidelines, Larson et al. Carbon Dioxide Emissions from Rocket Launches (2022)" },
    { keywords: ["uzay","hava","durumu","gunes"], q: "Uzay Hava Durumu ve Uluslararası Hukuki Çerçeve nedir?", content: "Uzay hava durumu güneş rüzgarları, manyetik fırtınalar ve kozmik ışın artışlarını kapsamaktadır. 1859 Carrington boyutunda bir güneş fırtınası uydu filolarını, GPS'i ve elektrik şebekelerini eş zamanlı çökertebilir; Lloyd's tahminine göre 2 trilyon dolar ekonomik zarar söz konusu olabilir. OST Madde XI devletlerin tehlikeli güneş olaylarını BM ile paylaşmasını öngörmektedir. WMO ve NOAA SWPC koordineli erken uyarı sistemleri işletmektedir. Güneş fırtınasının yol açtığı uydu hasarları için özel sorumluluk hükmü mevcut antlaşmalarda yer almamaktadır.", source: "WMO Space Weather Coordination, NOAA SWPC Alerts, OST Madde XI, Lloyd s 360 Space Weather Report (2013), National Science and Technology Council Space Weather Action Plan (2019)" },
    { keywords: ["wto","uzay","hizmet","gats"], q: "Dünya Ticaret Örgütü ve Uzay Hizmetleri nedir?", content: "GATS 1994 uydu aracılığıyla verilen telekomünikasyon hizmetlerini telekomünikasyon sektörü kapsamında ele almaktadır. GATS En Çok Kayrılan Ülke ve Ulusal Muamele ilkeleri uydu hizmetlerinde geçerlidir. Ancak uzay madenciliği ve gök cisimlerinden getirilen ham maddelerin ticareti WTO'nun mal ve hizmet kategorilerine tam oturmamaktadır. Bu ürünler için gümrük sınıflandırması, tarife oranları ve ihracat kısıtlamalarına ilişkin özel bir WTO kararı henüz mevcut değildir.", source: "GATS (1994) Annex on Telecommunications, WTO Basic Telecom Reference Paper (1997), OECD Space Economy in Figures (2022), Frans von der Dunk Commercial Space Tourism and Applicable Framework" },
    { keywords: ["uzay","dogum","vatandaslik","jussanguinis"], q: "Uzayda Doğum ve Vatandaşlık Hukuku nedir?", content: "Uluslararası antlaşmalar uzayda gerçekleşen doğum durumunu açıkça düzenlememektedir. İki temel ilke tartışılmaktadır: jus sanguinis ebeveynlerin vatandaşlığı ve jus soli doğum yeri devletinin vatandaşlığı. OST Madde VIII uzay aracı üzerindeki yargı ve kontrolün tescil devletine ait olduğunu öngörmektedir; bu çerçevede jus soli uygulanabilir. Çifte vatandaşlık ihtimali de göz ardı edilemez. ISS'de doğum gerçekleşmemiş olduğundan hiçbir emsal karar mevcut değildir.", source: "OST Madde VIII, Tescil Sözleşmesi Madde II-IV, IISL Position Papers, Frans von der Dunk Handbook of Space Law (2015)" },
    { keywords: ["uzay","norm","davranis","2022"], q: "Uzayda Sorumlu Davranış Normları ve BM Süreci nedir?", content: "BM Genel Kurulu'nun 7 Aralık 2022 tarihli 77/41 sayılı kararı devletleri sorumlu davranışlar üzerine görüş bildirmeye ve norm geliştirmeye davet etmiştir. Bu karar ABD'nin 2022'de direkt çıkışlı ASAT testlerine moratoriyum ilan etmesinin ardından geniş destek bulmuştur. İngiltere, Avustralya, Kanada ve Japonya ulusal sorumlu uzay davranışı kılavuzları yayımlamıştır. Bu normlar bağlayıcı olmasa da örf-adet hukukunun opinio juris unsurunun oluşmasına katkıda bulunmaktadır.", source: "UN GA Resolution 77/41 (7 Aralik 2022), UK Responsible Space Behaviour Policy Paper, Australian Space Policy (2023), US ASAT Moratorium Statement (April 2022)" },
    { keywords: ["guven","artirici","onlem","csbm"], q: "Uzayda Güven Artırıcı Önlemler ve BM Süreci nedir?", content: "Güven Artırıcı Önlemler CBM-CSBM devletler arasında yanlış hesap ve kaza riskini azaltmayı amaçlar. BM Hükümet Uzmanları Grubu 2013'te Uzayda Şeffaflık ve Güven Artırıcı Önlemler üzerine kapsamlı rapor yayımlamıştır (A/68/189). Önerilen önlemler: fırlatma öncesi bildirim, tehlikeli yaklaşım manevralarının duyurulması, askeri uzay varlıklarının bildirimi ve operasyon merkezleri arasında doğrudan iletişim hatları. Bu önlemlerin hiçbirini zorunlu kılan bağlayıcı antlaşma yoktur; uyum gönüllülük esasına dayanmaktadır.", source: "UN GGE on Transparency and CBMs in Outer Space A/68/189 (2013), COPUOS Outer Space Security Working Paper, SIPRI Yearbook 2023 Ch. 11" },
    { keywords: ["uzay","arkeoloji","miras","koruma"], q: "Uzay Arkeolojisi ve Kültürel Miras Koruması nedir?", content: "Uzay arkeolojisi uzaydaki insan faaliyetinin kalıntılarını inceleyen ve koruma savunuculuğu yapan disiplinlerarası bir alandır. Hukuki temel belirsizdir: UNESCO 1972 Dünya Mirası Sözleşmesi yalnızca Dünya üzerindeki alanları kapsamaktadır. ABD'nin 2020 tarihli One Small Step Act NASA'ya Apollo iniş alanlarını gelecek görevlerde dikkate alma talimatı vermiştir; ancak yasa bağlayıcı değil tavsiye niteliğindedir. For All Moonkind sivil toplum kuruluşu Ay miras alanları için uluslararası antlaşma taslağı hazırlayarak BM'ye sunmuştur.", source: "UNESCO World Heritage Convention (1972), One Small Step to Protect Human Heritage in Space Act (2020), For All Moonkind Model Protocol, Beth O'Leary Space Age Archaeology (2009)" },
    { keywords: ["iso","ccsds","standart","protokol"], q: "Uzay Sistemleri Uluslararası Teknik Standartları nedir?", content: "ISO TC 20/SC 14 komitesi uzay araçları tasarımı, test, kalifikasyon ve güvenlik konularında 200'den fazla standart geliştirmiştir. CCSDS NASA, ESA, JAXA, ISRO gibi büyük ajansların üye olduğu teknik forum olup veri iletişim protokollerini uluslararası düzeyde standartlaştırmaktadır. Bu standartlar acil kurtarma operasyonlarında uyumluluk için hayati önem taşımaktadır: teknik protokoller uyumsuz olsaydı Soyuz-ISS kenetlenme operasyonları gerçekleşemezdi.", source: "ISO TC 20/SC 14 Catalogue, CCSDS 132.0-B-3 Telemetry (2021), CCSDS 401.0-B Space Link Protocols, ESA-NASA Interface Control Documents" },
    { keywords: ["yapay","zeka","otonom","uzay"], q: "Uzayda Otonom Yapay Zeka Sistemleri ve Sorumluluk nedir?", content: "Modern uzay araçlarının giderek artan otonom karar verme yetenekleri anlamlı insan kontrolü kavramını kritik bir hukuki meseleye dönüştürmektedir. OST ve Sorumluluk Sözleşmesi altında zarar yaratan uzay nesnesinin tescil devleti hukuken sorumludur; ancak yanlış kararı veren algoritmanın geliştiricisine rücu mekanizmaları yetersiz kalmaktadır. AB'nin 2024 tarihli Yapay Zeka Yasası yüksek riskli YZ uygulamalarına sıkı şeffaflık yükümlülükleri getirirken UNIDIR'ın raporları uzayda otonom sistemlerin savaş hukuku kapsamındaki boyutunu ele almaktadır.", source: "OST Madde VI-VII, EU AI Act (2024/1689), UNIDIR Autonomous Weapons Series (2022), J. Marchetti Autonomous Systems in Outer Space IISL 2021" },
    { keywords: ["makine","ogrenimi","uydu","veri"], q: "Uydu Verilerinde Makine Öğrenmesi ve Veri Hakları nedir?", content: "Modern gözlem uyduları ham verileri yerinde işlemek için makine öğrenmesi algoritmalarına başvurmaktadır. Bu algoritmaların ürettiği türev ürünlerin telif ve patent statüsü belirsizliğini korumaktadır: pek çok ülkede ham veri yaratıcılık unsuru taşımadığından telif korumasından yararlanamamaktadır. AB Yapay Zeka Yasası 2024 yüksek riskli YZ uygulamaları için kayıt ve şeffaflık yükümlülükleri getirirken GDPR Madde 22 otomatik kararlardan etkilenen bireylere itiraz hakkı tanımaktadır.", source: "EU AI Act (2024/1689), GDPR Madde 22 ve Recital 47, WIPO Conversation on IP and AI (2023), European Space Agency Data Policy (2023)" },
    { keywords: ["ay","suyu","yakit","isru"], q: "Ay Suyu Madenciliği ve ISRU Hukuki Tartışmaları nedir?", content: "NASA'nın LCROSS misyonuyla doğrulanan Ay güney kutbundaki kalıcı gölge kraterlerde önemli miktarda su buzu bulunmaktadır. Bu suyun elektrolizle hidrojen ve oksijene dönüştürülmesi In-Situ Resource Utilization ISRU kapsamındadır. Hukuki tartışma OST Madde II etrafında yoğunlaşmaktadır: ABD ve Artemis Anlaşmaları bu faaliyetleri meşru saymakta; Çin ve Rusya ise Ay Anlaşması'nın ortak miras çerçevesini esas alarak itiraz etmektedir. 2020 ABD Yürütme Emri kaynakların çıkarılabileceğini açıkça teyit etmiştir.", source: "Executive Order on Encouraging International Support for the Recovery and Use of Space Resources (2020), Artemis Accords Section 10, NASA LCROSS Mission Results (2009), Slyuta et al. Lunar Polar Ice (2012)" },
    { keywords: ["asteroid","deger","ekonomi","hukuk"], q: "Asteroid Madenciliğinin Ekonomik Potansiyeli ve Hukuki Boşluklar nedir?", content: "M-tipi metalik bir asteroidin içerdiği demir-nikel, kobalt ve platin grubu metallerin yeryüzü fiyatları üzerinden hesaplanan değeri trilyonlarca dolara ulaşabilmektedir. 2016'da kapanan Planetary Resources ve 2019'da kapanan Deep Space Industries bu alandaki ilk özel girişimlerdi. Mevcut uluslararası hukukta asteroidi rezerve etme, münhasır arama hakkı tesis etme veya çıkarılan kaynağı satma kuralları hiçbir bağlayıcı belgede düzenlenmemiştir. Bu yasal boşluk hem yatırım güvenliği hem de devletler arası çatışma riski açısından acil norm geliştirmeyi zorunlu kılmaktadır.", source: "OECD Space Economy in Figures (2022), Deep Space Industries Technical Report, Planetary Resources Business Plan, IISL Position Paper on Space Resources (2015), Lewis Mining the Sky (1996)" },
    { keywords: ["skylab","grev","calisma","hak"], q: "Skylab 4 Grevi ve Uzay Çalışma Hakları nedir?", content: "Aralık 1973-Ocak 1974 Skylab 4 görevinde astronotlar Gerald Carr, Edward Gibson ve William Pogue aşırı çalışma programına karşı bir günlüğüne Dünya ile iletişimi yavaşlatmışlardır. NASA olayın yönetim hatalarını örtbas etmek için dramatize edildiğini savunmuştur. Bu tarihsel emsal uzun süreli uzay görevlerinde çalışan hakları, dinlenme süreleri ve psikolojik destek yükümlülüklerinin hukuki çerçevesi tartışmalarında düzenli olarak atıfta bulunulmaktadır.", source: "NASA SP-400 Skylab Our First Space Station (1977), Charles Bhatt Skylab Mutiny (2000), NASA Human Research Program HRP-47052" },
    { keywords: ["helyum3","fuzyon","enerjisi","ay"], q: "Helyum-3 ve Nükleer Füzyon Enerjisi Hukuku nedir?", content: "Güneş rüzgarı tarafından Ay yüzeyinde biriktirilen helyum-3 izotopu Dünya'nın rezervlerinden astronomik ölçüde fazla miktarda bulunmaktadır. Teorik hesaplara göre 25 ton helyum-3 ile 1 yıllık ABD elektrik enerjisi üretilebilir. Füzyon reaktörü teknolojisi hâlâ geliştirme aşamasındadır. Hukuki boyutu: helyum-3 stratejik değeri nedeniyle Büyük Güçlerin Ay kaynakları rekabetinde merkezi nesne konumuna gelme potansiyelindedir. Mevcut hukukta bu kaynağa özel düzenleme bulunmamakta; Ay Anlaşması'nın ortak miras çerçevesi ise başlıca taraflarca reddedilmiştir.", source: "NASA Moon Mineralogy Mapper Data, Kulcinski Santarius Lunar Helium-3 Fusion (2001), Ay Antlasmasi Madde 11 (1979), OECD Space Forum" },
    { keywords: ["sigint","istihbarat","uydu","dinleme"], q: "Uydu Tabanlı Sinyal İstihbaratı ve Uluslararası Hukuk nedir?", content: "Uyduların diğer devletlerin elektromanyetik sinyallerini dinlemesi SIGINT olarak adlandırılmaktadır. ABD NSA, İngiliz GCHQ, Rus FSB ve Çin PLA bu uyduları işletmektedir. OST uzayın serbest kullanımını esas aldığından pasif sinyal dinlemeyi açıkça yasaklamamakta; bu faaliyetler teknik olarak OST ihlali sayılmamaktadır. Ancak 1961 Viyana Diplomatik İlişkiler Sözleşmesi diplomatik haberleşmenin gizliliğini korumaktadır. Snowden ifşaatları 2013 bu hukuki belirsizliği kamuoyunun gündemine taşımıştır.", source: "OST Madde I, Vienna Convention on Diplomatic Relations (1961), Snowden Documents Analysis, UNIDIR Space Security Index 2023" },
    { keywords: ["bwc","cwc","uzay","silah"], q: "Biyolojik ve Kimyasal Silah Sözleşmeleri ile Uzay İlişkisi nedir?", content: "Biyolojik Silahlar Sözleşmesi BWC 1972 ve Kimyasal Silahlar Sözleşmesi CWC 1993 geliştirme, üretim ve kullanımı küresel ölçekte yasaklamakta; bu yasak uzayda da coğrafi sınır tanımaksızın geçerlidir. OST Madde IV KİS'in yörüngeye yerleştirilmesini yasaklamaktadır. Pratik sorun: uzay mikrogravite ortamında belirli patojenler daha hızlı mutasyona uğrayabilmekte; bu uzayda yürütülen biyolojik araştırmaların çift kullanımlı olabileceğini gündeme getirmektedir. BWC'de doğrulama mekanizması yoktur.", source: "BWC Final Document (1972), CWC Convention (1993), OST Madde IV, NTI BWC Compliance Report (2023), UN Office for Disarmament Affairs" },
    { keywords: ["uzay","sigorta","ctloss","anlasmaz"], q: "Yapısal Toplam Kayıp Uzay Sigortasında nedir?", content: "Constructive Total Loss kavramı İngiliz deniz sigortası hukukundan türetilmiş olup uzay sigortası poliçelerine adaptasyonu yorumlama sorunlarına yol açmaktadır. Uzayda kurtarma maliyetini hesaplamak son derece güçtür: yörüngede yakıtsız kalan uyduya müdahale teknik olarak mümkün olsa da milyarlarca dolar tutabilir. Poliçe dili genellikle ekonomik açıdan geri kazanım mümkün değilse CTL hükmü içermektedir; bu sınırların tahkimde büyük anlaşmazlıklara neden olmaktadır.", source: "Marine Insurance Act 1906 UK, PCA Optional Rules (2011), Von der Dunk Tronchetti Handbook of Space Law Ch. 17, Lloyd s Space Insurance Market Reports" },
    { keywords: ["astrobiyoloji","yasam","bulgu","etik"], q: "Uzayda Yaşam Bulgusunun Hukuki ve Etik Sonuçları nedir?", content: "Mars, Avrupa Jüpiter uydusu veya Encelada'da yaşam izleri tespit edilmesi mevcut uzay hukuku açısından derin bir kriz yaratabilir. OST Madde IX'un zararlı kirlenme yasağı bu varlıkları dolaylı olarak korumaktadır; ancak bulgu durumunda COSPAR gezegensel koruma kategorileri çok daha katı biçimde uygulanmak zorunda kalacaktır. Bu varlıkların haklarından söz eden herhangi bir uluslararası hukuk belgesi mevcut değildir. BM Genel Kurulu'nda önerilen Uzayda Yaşamın Hukuki Statüsü tartışması emekleme aşamasındadır.", source: "OST Madde IX, COSPAR Planetary Protection Policy Category IV-V, NASA Astrobiology Strategy 2015, C. McKay Does Mars Have Rights (1990), IISL Symposium (2023)" },
