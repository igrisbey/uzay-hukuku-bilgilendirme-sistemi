<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uzay Küresel Bilgi & Hukuk Merkezi</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #05060f; color: #e0e0e0; margin: 0; padding: 0; line-height: 1.6; }
        header { background: linear-gradient(180deg, #111222 0%, #05060f 100%); padding: 50px 20px; text-align: center; color: #00ffd5; font-size: 2.5em; font-weight: bold; border-bottom: 3px solid #00ffd5; text-transform: uppercase; letter-spacing: 3px; text-shadow: 0 0 15px rgba(0,255,213,0.5); }
        .container { width: 95%; max-width: 1000px; margin: 30px auto; padding: 20px; }
        .search-section { background: #0f1122; padding: 30px; border-radius: 20px; border: 1px solid #1e213a; box-shadow: 0 15px 40px rgba(0,0,0,0.7); position: sticky; top: 20px; z-index: 100; }
        #questionInput { width: 100%; padding: 20px; border-radius: 12px; border: 1px solid #2d3154; font-size: 1.2em; background-color: #05060f; color: white; outline: none; box-sizing: border-box; transition: 0.3s; }
        #questionInput:focus { border-color: #00ffd5; box-shadow: 0 0 10px rgba(0,255,213,0.3); }
        #addQuestionBtn { width: 100%; padding: 18px; font-size: 1.2em; border-radius: 12px; border: none; background: linear-gradient(90deg, #00ffd5, #008f7a); color: #05060f; cursor: pointer; margin-top: 20px; font-weight: bold; text-transform: uppercase; transition: 0.3s; }
        #addQuestionBtn:hover { transform: scale(1.01); filter: brightness(1.1); }
        #resultArea { margin-top: 40px; }
        .result-card { background: #0f1122; border-left: 6px solid #00ffd5; padding: 30px; margin-bottom: 25px; border-radius: 12px; animation: fadeIn 0.6s ease; border-right: 1px solid #1e213a; border-bottom: 1px solid #1e213a; }
        .result-title { color: #00ffd5; font-size: 1.6em; font-weight: bold; margin-bottom: 15px; display: block; border-bottom:1px solid rgba(0,255,213,0.1); padding-bottom: 10px; }
        .result-content { font-size: 1.15em; color: #cfd1e0; white-space: pre-wrap; }
        .result-source { margin-top: 20px; font-size: 0.9em; color: #00ffd5; background: rgba(0,255,213,0.05); padding: 10px 15px; border-radius: 6px; display: inline-block; font-weight: bold; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<header>Uzay Küresel Veri Merkezi</header>

<div class="container">
    <div class="search-section">
        <input type="text" id="questionInput" placeholder="Arama yapın (Örn: Ay, Maden, Karadelik, TUA, Radyasyon...)" autocomplete="off">
        <button id="addQuestionBtn" onclick="handleSearch()">Veriyi Analiz Et</button>
    </div>
    <div id="resultArea"></div>
</div>

    { keywords: ["maden", "asteroid", "paylasim"], q: "Asteroid Madenciliği Kar Payı", content: "Uzay kaynaklarından elde edilen gelirin bir kısmının, uzay programı olmayan gelişmekte olan ülkelere aktarılması 'hakkaniyet ilkesi' gereğidir.", source: "Ay Antlaşması Madde 11 (Yorum)" },

    { keywords: ["yapay", "zeka", "kaptan", "hata"], q: "Otonom Gemi Kazalarında Kusur", content: "Bir yapay zeka kaptanının navigasyon hatası sonucu yaşanan çarpışmalarda, sorumluluk yazılımı geliştiren firma ile gemiyi işleten kurum arasında paylaştırılır.", source: "Ürün Sorumluluğu Kanunu" },
    { keywords: ["astronot", "isyan", "yargilama"], q: "Yörüngesel İsyan ve Disiplin", content: "Komuta zincirini kasten bozan astronotlar, Dünya'ya dönene kadar gemi kaptanı tarafından 'geçici olarak' görevden el çektirilebilir ve hücre hapsine alınabilir.", source: "Deniz Hukuku / Uzay Disiplin Yönetmeliği" },
    { keywords: ["uydu", "servis", "mudahale"], q: "Uydulara İzinsiz Servis Yasağı", content: "Başka bir devlete ait olan ancak yakıtı bitmiş bir uyduya, sahibinden izin almadan bakım veya tamir amaçlı müdahale etmek 'egemenlik ihlali'dir.", source: "Tescil Sözleşmesi" },
    { keywords: ["enerji", "gunes", "hasat"], q: "Yörüngesel Enerji Transferi Güvenliği", content: "Uzaydan Dünya'ya mikrodalga veya lazerle enerji iletimi yapan tesisler, sivil havacılık koridorlarını etkilemeyecek güvenlik kalkanlarına sahip olmalıdır.", source: "ITU Radyo Düzenlemeleri" },
    { keywords: ["mars", "belediye", "vergi"], q: "Mars Yerleşim Birimi Vergileri", content: "Mars'ta kurulan şehir devletleri, Dünya'daki ana vatanlarına vergi ödemek yerine, kendi altyapılarını geliştirmek için bağımsız bütçe oluşturabilirler.", source: "Uzay Ekonomisi Doktrini" },
    { keywords: ["robot", "etik", "vazife"], q: "Robotların İnsan Hayatını Koruma Önceliği", content: "Bir robot, sahibinin malını korumak ile bir yabancının hayatını kurtarmak arasında kalırsa, algoritması 'insan hayatı'nı seçmek zorundadır.", source: "Asimov Kanunları (Hukuki Formülasyon)" },

    { keywords: ["uzay", "asansoru", "irtifak"], q: "Uzay Asansörü Geçiş Hakları", content: "Uzay asansörü kablosunun geçtiği atmosferik alan, uluslararası hava sahası olsa dahi 'stratejik koruma bölgesi' statüsündedir.", source: "Uluslararası Sivil Havacılık Sözleşmesi (Kıyas)" },

    { keywords: ["uydu", "hacker", "savas"], q: "Uyduların Siber Silah Olarak Kullanımı", content: "Bir uydunun hacklenerek başka bir uydunun üzerine sürülmesi, 'silahlı saldırı' (armed attack) statüsünde bir savaş sebebidir.", source: "Tallinn Manual (Uzay Eki)" },
    { keywords: ["maden", "kayit", "sertifika"], q: "Uzay Madeni Menşei Şahadetnamesi", content: "Dünya'ya getirilen her maden, hangi gökcisminden ve hangi koordinatlardan çıkarıldığını belgeleyen bir sicile sahip olmalıdır.", source: "Ticaret Kanunu / Uzay Şerhi" },
    { keywords: ["astronot", "din", "ozgur"], q: "Uzayda İbadet ve Din Özgürlüğü", content: "Uzay istasyonlarında farklı inançlara sahip personel için ortak bir 'sessizlik ve meditasyon alanı' sağlanması evrensel bir haktır.", source: "İnsan Hakları Bildirgesi" },
    { keywords: ["enkaz", "temizlik", "fatura"], q: "Zorunlu Enkaz Kaldırma Maliyeti", content: "Kendi uydusunu imha eden veya kontrolsüz bırakan devlet, uluslararası temizlik ekiplerinin masraflarını ödemekle yükümlüdür.", source: "Sorumluluk Sözleşmesi Madde IV" },
    { keywords: ["yapay", "zeka", "yargi", "karar"], q: "Yapay Zeka Hakimlerin Yetkisi", content: "Basit uzay uyuşmazlıklarında (trafik, frekans çakışması) yapay zeka tarafından verilen kararlar, taraflar itiraz etmedikçe bağlayıcıdır.", source: "Tahkim Kanunu" },

    { keywords: ["astronot", "sosyal", "guvenlik"], q: "Uzay Radyasyonu Meslek Hastalığı", content: "Uzay radyasyonu nedeniyle oluşan kanser veya genetik bozukluklar, fırlatıcı devletin sosyal güvenlik sistemince 'iş kazası' sayılır.", source: "Sosyal Sigortalar Kanunu" },

    { keywords: ["uydu", "goruntu", "etik"], q: "Yüksek Çözünürlüklü Gözetleme Sınırı", content: "Sivil uyduların 10 cm altındaki çözünürlükte görüntü alması, özel hayatın gizliliği nedeniyle kısıtlanabilir veya izne bağlanabilir.", source: "Kişisel Verilerin Korunması" },
    { keywords: ["astronot", "maas", "kripto"], q: "Uzay Personeli Ödeme Birimi", content: "Dünya dışı kolonilerde yapılacak ödemeler, tescil devletinin yasal parasına endeksli bir 'dijital varlık' üzerinden gerçekleştirilebilir.", source: "Uzay Finans Yasası" },
    { keywords: ["maden", "ay", "reklam"], q: "Ay Yüzeyinde Reklam Yasağı", content: "Dünya'dan çıplak gözle görülebilecek şekilde Ay yüzeyine logo kazımak veya lazerle yansıtmak, insanlığın ortak mirasına saygısızlık kabul edilir.", source: "UNESCO Uzay Kültürel Miras" },

    { keywords: ["uzay", "yolu", "isaret"], q: "Navigasyon İşaretçileri Güvenliği", content: "Derin uzay rotalarına yerleştirilen radyo işaretçilerini (beacon) kasten kapatmak veya yanıltmak, korsanlık eylemi sayılır.", source: "Uzay Seyrüsefer Güvenliği" },

    { keywords: ["mars", "su", "ortak"], q: "Mars Su Kaynakları Paylaşımı", content: "Mars'ta bulunan yer altı suları, hiçbir koloninin tekelinde olamaz; acil durumlarda komşu kolonilerle paylaşılması zorunludur.", source: "İnsancıl Hukuk" },

    { keywords: ["astronot", "saglik", "veri"], q: "Biyometrik Verilerin Mülkiyeti", content: "Astronotun vücut fonksiyonlarından elde edilen veriler kendisine aittir; bilimsel yayınlarda ancak anonimleştirilerek kullanılabilir.", source: "KVKK / GDPR" },
    { keywords: ["maden", "fiyat", "manipule"], q: "Uzay Madeni Piyasa Manipülasyonu", content: "Dünya piyasalarını sarsacak miktarda değerli maden getiren şirketlerin, piyasa dengesini korumak için satış kotalarına uyması zorunludur.", source: "Rekabet Hukuku" },
    { keywords: ["robot", "insan", "hak"], q: "İnsansı Robotların Statüsü", content: "Yüksek düzeyde öz-farkındalık gösteren yapay zeka birimleri, 'elektronik kişi' statüsünde kısıtlı haklara sahip olabilir.", source: "Yapay Zeka Etik Yasası" },
    { keywords: ["uzay", "asansoru", "sigorta"], q: "Asansör Kablosu Kopma Sigortası", content: "Uzay asansörü işletmecileri, kablonun düşmesi durumunda yeryüzünde oluşacak hasarlar için milyar dolarlık teminat göstermek zorundadır.", source: "Sigorta Hukuku" },

    { keywords: ["astronot", "diyet", "kultur"], q: "Uzayda Kültürel Beslenme Hakkı", content: "Uzun süreli görevlerde personele kendi kültürüne ve dini inancına uygun gıda (helal, kosher, vegan vb.) sağlanması bir haktır.", source: "Biyoetik İlkeleri" },

    { keywords: ["uydu", "hizmet", "devir"], q: "Yörüngede Uydu Satış Prosedürü", content: "Aktif bir uydunun yörüngedeyken başka bir firmaya satışı, BM Tescil Ofisi'ne 24 saat içinde bildirilmelidir.", source: "Tescil Sözleşmesi" },
    { keywords: ["astronot", "cocuk", "vatandas"], q: "Uzay Aracında Doğan Çocuklar", content: "Uzay aracında doğan bir bebek, aracın tescilli olduğu devletin vatandaşlığını 'kan esası' veya 'yer esası'na göre alır.", source: "Vatandaşlık Kanunu" },

    { keywords: ["astronot", "noropsikoloji", "sorumluluk"], q: "Nöro-Hukuk ve Astronot Suçları", content: "Derin uzayda beyin implantı veya kimyasal manipülasyon altındaki bir astronotun işlediği suçlarda, sorumluluk 'implantı yöneten yazılım sağlayıcısı'ndadır.", source: "Nöro-Etik Yasası" },

    { keywords: ["uydu", "isik", "kirlilik"], q: "Astronomi ve Uydu Takımyıldızları", content: "Uyduların yansıtma katsayısı (albedo), yer tabanlı teleskopların gözlemini engellemeyecek seviyede (genelde 7. kadirden sönük) tutulmalıdır.", source: "IAU Karanlık ve Sessiz Gökyüzü İlkeleri" },

function normalizeText(text) {
    if (!text) return "";
    return text.toLowerCase().trim()
        .replace(/[.,!?;:]/g, "")
        .replace(/ı/g, "i").replace(/ğ/g, "g").replace(/ü/g, "u")
        .replace(/ş/g, "s").replace(/ö/g, "o").replace(/ç/g, "c");
}

function handleSearch() {
    const input = document.getElementById("questionInput");
    const resultArea = document.getElementById("resultArea");
    resultArea.innerHTML = "";
    
    const userVal = normalizeText(input.value);
    if (userVal.length < 2) return;

    const userWords = userVal.split(/\s+/);
    let matches = [];

    MASTER_KNOWLEDGE.forEach(item => {
        let score = 0;
        item.keywords.forEach(key => {
            userWords.forEach(word => {
                if (word.length < 2) return;
                if (key === word) score += 50; // Tam kelime eşleşmesi
                else if (key.includes(word)) score += 20; // Parçalı eşleşme
            });
        });
        
        if (score > 15) {
            matches.push({ item, score });
        }
    });

    matches.sort((a, b) => b.score - a.score);

    if (matches.length === 0) {
        resultArea.innerHTML = `<div class="result-card" style="border-left-color: #ff4444;">
            <span class="result-title" style="color:#ff4444;">Veri Bulunamadı</span>
            <div class="result-content">Üzgünüm, "<b>${input.value}</b>" hakkında veri bankamızda bir kayıt bulunamadı. Lütfen daha temel kelimelerle (Ay, Maden, Karadelik, TUA gibi) aramayı deneyin.</div>
        </div>`;
    } else {
        matches.forEach(match => {
            resultArea.insertAdjacentHTML("beforeend", `
                <div class="result-card">
                    <span class="result-title">${match.item.q}</span>
                    <div class="result-content">${match.item.content}</div>
                    <div class="result-source">Resmi Kaynak/Dayanak: ${match.item.source}</div>
                </div>
            `);
        });
    }
}

// Enter tuşu dinleyici
document.getElementById("questionInput").addEventListener("keypress", (e) => {
    if (e.key === 'Enter') handleSearch();
});
