<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uzay Küresel Bilgi & Hukuk Merkezi</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #05060f; color: #e0e0e0; line-height: 1.6; min-height: 100vh; }
        header { background: linear-gradient(180deg, #111222 0%, #05060f 100%); padding: 46px 20px; text-align: center; color: #00ffd5; font-size: 2em; font-weight: bold; border-bottom: 3px solid #00ffd5; text-transform: uppercase; letter-spacing: 3px; text-shadow: 0 0 15px rgba(0,255,213,0.5); }
        .container { width: 95%; max-width: 900px; margin: 30px auto; padding: 0 10px 60px; }
        .search-box { background: #0f1122; padding: 28px 30px; border-radius: 18px; border: 1px solid #1e213a; box-shadow: 0 15px 40px rgba(0,0,0,0.6); position: sticky; top: 16px; z-index: 100; }
        #questionInput { width: 100%; padding: 16px 20px; border-radius: 12px; border: 1px solid #2d3154; font-size: 1.1em; background: #05060f; color: #e0e0e0; outline: none; transition: border-color 0.3s, box-shadow 0.3s; }
        #questionInput:focus { border-color: #00ffd5; box-shadow: 0 0 12px rgba(0,255,213,0.25); }
        #searchBtn { width: 100%; padding: 14px; font-size: 1.05em; border-radius: 12px; border: none; background: linear-gradient(90deg, #00ffd5, #008f7a); color: #05060f; cursor: pointer; margin-top: 14px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; transition: 0.25s; }
        #searchBtn:hover { filter: brightness(1.1); transform: scale(1.01); }
        .hint { color: #3a4060; font-size: 0.82em; text-align: center; margin-top: 10px; }
        #resultArea { margin-top: 36px; }

        /* Öneri kartları */
        .suggest-header { color: #7a8ac0; font-size: 0.95em; margin-bottom: 14px; padding: 0 2px; }
        .suggest-header span { color: #00ffd5; }
        .suggest-grid { display: flex; flex-direction: column; gap: 10px; }
        .suggest-card { background: #0d1020; border: 1px solid #1e2240; border-left: 4px solid #00ffd5; border-radius: 10px; padding: 14px 18px; cursor: pointer; transition: background 0.2s, border-left-color 0.2s, transform 0.15s; display: flex; align-items: center; justify-content: space-between; }
        .suggest-card:hover { background: #121530; border-left-color: #00ffd5; transform: translateX(3px); }
        .suggest-card.dim { border-left-color: #1e5050; }
        .suggest-card.dim:hover { border-left-color: #00ffd5; }
        .suggest-q { font-size: 1em; color: #c0d0e0; font-weight: 500; }
        .suggest-meta { font-size: 0.78em; color: #3a5060; white-space: nowrap; margin-left: 12px; }
        .suggest-arrow { color: #00ffd5; font-size: 1.1em; margin-left: 10px; opacity: 0.6; }

        /* Cevap kartı */
        .answer-card { background: #0f1122; border-left: 6px solid #00ffd5; padding: 28px 30px; border-radius: 14px; animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); border: 1px solid #1e213a; border-left: 6px solid #00ffd5; }
        .answer-title { color: #00ffd5; font-size: 1.5em; font-weight: bold; margin-bottom: 14px; padding-bottom: 12px; border-bottom: 1px solid rgba(0,255,213,0.12); }
        .answer-content { font-size: 1.1em; color: #cfd1e0; line-height: 1.75; white-space: pre-wrap; }
        .answer-source { margin-top: 18px; font-size: 0.85em; color: #00ffd5; background: rgba(0,255,213,0.06); padding: 8px 14px; border-radius: 8px; display: inline-block; font-weight: 600; }
        .back-btn { display: inline-flex; align-items: center; gap: 6px; margin-top: 20px; background: none; border: 1px solid #1e2240; color: #7a8ac0; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 0.9em; transition: 0.2s; }
        .back-btn:hover { color: #00ffd5; border-color: #00ffd5; }

        /* Bulunamadı */
        .not-found { background: #100808; border: 1px solid #2a1010; border-left: 6px solid #ff4444; border-radius: 14px; padding: 28px 30px; }
        .not-found-title { color: #ff6666; font-size: 1.3em; font-weight: bold; margin-bottom: 10px; }
        .not-found-text { color: #a08080; font-size: 1em; }
        .not-found-tips { margin-top: 14px; color: #705050; font-size: 0.88em; line-height: 1.8; }

        @keyframes popIn { from { opacity: 0; transform: translateY(12px) scale(0.97); } to { opacity: 1; transform: none; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* ── Sekme navigasyonu ── */
        .tab-nav { display: flex; gap: 0; margin-bottom: 28px; border-bottom: 2px solid #1e213a; }
        .tab-btn { flex: 1; padding: 13px 10px; background: none; border: none; color: #4a5580; font-size: 0.95em; font-weight: 600; cursor: pointer; letter-spacing: 0.5px; border-bottom: 3px solid transparent; margin-bottom: -2px; transition: color 0.2s, border-color 0.2s; text-transform: uppercase; }
        .tab-btn:hover { color: #9ab0c0; }
        .tab-btn.active { color: #00ffd5; border-bottom-color: #00ffd5; }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; animation: fadeIn 0.3s ease; }

        /* ── Politik Öneri kartları ── */
        .pol-section-title { color: #00ffd5; font-size: 0.78em; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin: 32px 0 12px; padding-bottom: 6px; border-bottom: 1px solid rgba(0,255,213,0.12); }
        .pol-section-title:first-child { margin-top: 0; }
        .pol-card { background: #0d1020; border: 1px solid #1e2240; border-left: 4px solid #00ffd5; border-radius: 12px; padding: 20px 22px; margin-bottom: 14px; transition: background 0.2s, transform 0.15s; cursor: pointer; }
        .pol-card:hover { background: #121530; transform: translateX(3px); }
        .pol-card.open { background: #0f1525; border-left-color: #00ffd5; }
        .pol-card-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
        .pol-card-label { font-size: 0.72em; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 3px 9px; border-radius: 20px; white-space: nowrap; }
        .pol-card-label.tag-silah { background: rgba(255,80,80,0.12); color: #ff8080; border: 1px solid rgba(255,80,80,0.2); }
        .pol-card-label.tag-trafik { background: rgba(80,160,255,0.12); color: #80c0ff; border: 1px solid rgba(80,160,255,0.2); }
        .pol-card-label.tag-antlasma { background: rgba(255,200,80,0.12); color: #ffc860; border: 1px solid rgba(255,200,80,0.2); }
        .pol-card-label.tag-kaynak { background: rgba(80,255,160,0.12); color: #60ffb0; border: 1px solid rgba(80,255,160,0.2); }
        .pol-card-label.tag-genel { background: rgba(160,100,255,0.12); color: #c080ff; border: 1px solid rgba(160,100,255,0.2); }
        .pol-card-title { font-size: 1.05em; color: #c8d8e8; font-weight: 600; flex: 1; }
        .pol-card-arrow { color: #00ffd5; font-size: 1.1em; opacity: 0.5; transition: transform 0.2s, opacity 0.2s; }
        .pol-card.open .pol-card-arrow { transform: rotate(90deg); opacity: 1; }
        .pol-card-body { display: none; margin-top: 16px; padding-top: 14px; border-top: 1px solid rgba(0,255,213,0.08); }
        .pol-card.open .pol-card-body { display: block; animation: fadeIn 0.25s ease; }
        .pol-card-desc { font-size: 1em; color: #b0c0d0; line-height: 1.75; }
        .pol-card-meta { margin-top: 14px; display: flex; flex-wrap: wrap; gap: 8px; }
        .pol-meta-badge { font-size: 0.78em; background: rgba(0,255,213,0.05); border: 1px solid rgba(0,255,213,0.12); color: #00ffd5; padding: 4px 10px; border-radius: 6px; }
        .pol-card-source { margin-top: 12px; font-size: 0.82em; color: #3a5060; }
        .pol-filter-bar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 22px; }
        .pol-filter-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid #1e2240; background: none; color: #4a5580; font-size: 0.82em; cursor: pointer; transition: 0.2s; font-weight: 600; }
        .pol-filter-btn:hover { border-color: #00ffd5; color: #00ffd5; }
        .pol-filter-btn.active { background: rgba(0,255,213,0.1); border-color: #00ffd5; color: #00ffd5; }
    </style>
</head>
<body>
<header>Uzay Küresel Veri Merkezi</header>
<div class="container">

    <!-- Sekme Navigasyonu -->
    <div class="tab-nav">
        <button class="tab-btn active" onclick="switchTab('arama')">🔍 Veri Arama</button>
        <button class="tab-btn" onclick="switchTab('oneri')">🛰️ Politik Öneriler</button>
    </div>

    <!-- Sekme 1: Arama -->
    <div class="tab-panel active" id="tab-arama">
        <div class="search-box">
            <input type="text" id="questionInput" placeholder="Ne öğrenmek istiyorsunuz? (örn: TUA nedir, Ay'da mülkiyet, astronot hakları...)" autocomplete="off">
            <button id="searchBtn" onclick="handleSearch()">Ara</button>
            <div class="hint">1050+ kayıt · Güvenilir kaynaklar · Sayfalı sonuçlar · Enter ile arayın</div>
        </div>
        <div id="resultArea"></div>
    </div>

    <!-- Sekme 2: Politik Öneriler -->
    <div class="tab-panel" id="tab-oneri">
        <div class="pol-filter-bar">
            <button class="pol-filter-btn active" onclick="polFilter('tumu', this)">Tümü</button>
            <button class="pol-filter-btn" onclick="polFilter('silah', this)">🔴 Silahsızlanma</button>
            <button class="pol-filter-btn" onclick="polFilter('trafik', this)">🔵 Uzay Trafiği</button>
            <button class="pol-filter-btn" onclick="polFilter('antlasma', this)">🟡 Bağlayıcı Antlaşma</button>
            <button class="pol-filter-btn" onclick="polFilter('kaynak', this)">🟢 Kaynak Paylaşımı</button>
            <button class="pol-filter-btn" onclick="polFilter('genel', this)">🟣 Genel Sorunlar</button>
        </div>
        <div id="polCards"></div>
    </div>

</div>
<script>
const MASTER_KNOWLEDGE = [
    { keywords: ["eslem", "mal", "kim"], q: "Eslem Kimdir?", content: "Eslem hakkında veri bankamızda özel bir tanım bulunmaktadır.", source: "HKK" },
    { keywords: ["maden", "asteroid", "paylasim"], q: "Asteroid Madenciliği Kar Payı nedir?", content: "Uzay kaynaklarından elde edilen gelirin bir kısmının, gelişmekte olan ülkelere aktarılması hakkaniyet ilkesidir.", source: "Ay Antlaşması Madde 11" },
    { keywords: ["su", "buz", "ay", "mulkiyet"], q: "Ay Kutup Suyu Kullanım Hakları nedir?", content: "Ay'ın güney kutbundaki su buzu rezervleri, ticari meta olamaz; sadece yaşam desteği için kullanılabilir.", source: "Uzay Kaynakları Yönetim Rehberi" },
    { keywords: ["terraforming", "mulkiyet", "degisim"], q: "Terraforming ve Gezegensel Haklar nedir?", content: "Bir gezegenin atmosferini yaşanabilir hale getiren devlet veya şirket, o gezegen üzerinde 'yönetim hakkı' iddia edebilir ancak bu durum diğer devletlerin erişim hakkını engelleyemez.", source: "Gezegensel Dönüşüm Etik Bildirgesi" },
    { keywords: ["karantina", "bulas", "prosedur"], q: "Yıldızlararası Karantina İhlali nedir?", content: "Bilinmeyen bir patojen taşıma riski olan araçların Dünya yörüngesine girişi, tüm mürettebat temiz raporu alana kadar askeri güçle engellenebilir.", source: "Uluslararası Sağlık Tüzüğü (Uzay Eki)" },
    { keywords: ["sigorta", "kargo", "kayip"], q: "Derin Uzay Kargo Sigortası nedir?", content: "Işık hızı gecikmesi nedeniyle haberleşilemeyen bölgelerde kaybolan kargolar, 6 aylık sessizlik süresinden sonra 'toplam kayıp' (total loss) sayılır.", source: "Uzay Sigortacılığı Standartları" },
    { keywords: ["arkeoloji", "yabanci", "eser"], q: "Yabancı Teknoloji Mülkiyeti nedir?", content: "Dünya dışı akıllı varlıklara ait bulunan işlevsel teknolojiler, bulan devletin değil, tüm insanlığın ortak bilimsel denetimine tabi tutulmalıdır.", source: "SETI Post-Detection Kararları" },
    { keywords: ["norohukuk", "astronot", "mudahale"], q: "Uzayda Zihin Kontrolü ve Rıza nedir?", content: "Uzun süreli izolasyon sırasında astronotlara uygulanan zorunlu psikolojik telkinler veya nörolojik müdahaleler, 'vücut dokunulmazlığı' ihlali sayılabilir.", source: "Biyoetik ve İnsan Hakları" },
    { keywords: ["maden", "asteroid", "paylasim"], q: "Asteroid Madenciliği Kar Payı nedir?", content: "Uzay kaynaklarından elde edilen gelirin bir kısmının, uzay programı olmayan gelişmekte olan ülkelere aktarılması 'hakkaniyet ilkesi' gereğidir.", source: "Ay Antlaşması Madde 11 (Yorum)" },
    { keywords: ["su", "buz", "ay", "mulkiyet"], q: "Ay Kutup Suyu Kullanım Hakları nedir?", content: "Ay'ın güney kutbundaki su buzu rezervleri, ticari meta olamaz; sadece yaşam desteği ve bilimsel araştırma için 'ihtiyaç oranında' kullanılabilir.", source: "Uzay Kaynakları Yönetim Rehberi" },
    { keywords: ["yapay", "zeka", "kaptan", "hata"], q: "Otonom Gemi Kazalarında Kusur nedir?", content: "Bir yapay zeka kaptanının navigasyon hatası sonucu yaşanan çarpışmalarda, sorumluluk yazılımı geliştiren firma ile gemiyi işleten kurum arasında paylaştırılır.", source: "Ürün Sorumluluğu Kanunu" },
    { keywords: ["astronot", "isyan", "yargilama"], q: "Yörüngesel İsyan ve Disiplin nedir?", content: "Komuta zincirini kasten bozan astronotlar, Dünya'ya dönene kadar gemi kaptanı tarafından 'geçici olarak' görevden el çektirilebilir ve hücre hapsine alınabilir.", source: "Deniz Hukuku / Uzay Disiplin Yönetmeliği" },
    { keywords: ["uydu", "servis", "mudahale"], q: "Uydulara İzinsiz Servis Yasağı nedir?", content: "Başka bir devlete ait olan ancak yakıtı bitmiş bir uyduya, sahibinden izin almadan bakım veya tamir amaçlı müdahale etmek 'egemenlik ihlali'dir.", source: "Tescil Sözleşmesi" },
    { keywords: ["enerji", "gunes", "hasat"], q: "Yörüngesel Enerji Transferi Güvenliği nedir?", content: "Uzaydan Dünya'ya mikrodalga veya lazerle enerji iletimi yapan tesisler, sivil havacılık koridorlarını etkilemeyecek güvenlik kalkanlarına sahip olmalıdır.", source: "ITU Radyo Düzenlemeleri" },
    { keywords: ["mars", "belediye", "vergi"], q: "Mars Yerleşim Birimi Vergileri nedir?", content: "Mars'ta kurulan şehir devletleri, Dünya'daki ana vatanlarına vergi ödemek yerine, kendi altyapılarını geliştirmek için bağımsız bütçe oluşturabilirler.", source: "Uzay Ekonomisi Doktrini" },
    { keywords: ["robot", "etik", "vazife"], q: "Robotların İnsan Hayatını Koruma Önceliği nedir?", content: "Bir robot, sahibinin malını korumak ile bir yabancının hayatını kurtarmak arasında kalırsa, algoritması 'insan hayatı'nı seçmek zorundadır.", source: "Asimov Kanunları (Hukuki Formülasyon)" },
    { keywords: ["kriyojenik", "miras", "hak"], q: "Dondurulmuş Astronotların Medeni Hakları nedir?", content: "Kriyojenik uykudaki bir birey hukuken 'yaşıyor' kabul edilir; ancak mal varlığı üzerindeki tasarruf yetkisi vasi tayin edilen kişiye geçer.", source: "Medeni Kanun / Özel Maddeler" },
    { keywords: ["uzay", "asansoru", "irtifak"], q: "Uzay Asansörü Geçiş Hakları nedir?", content: "Uzay asansörü kablosunun geçtiği atmosferik alan, uluslararası hava sahası olsa dahi 'stratejik koruma bölgesi' statüsündedir.", source: "Uluslararası Sivil Havacılık Sözleşmesi (Kıyas)" },
    { keywords: ["astronot", "evlilik", "iptal"], q: "Uzayda Boşanma ve Nafaka nedir?", content: "Uzay görevindeyken alınan boşanma kararları, davanın açıldığı yerleşik olunan devletin aile mahkemeleri tarafından karara bağlanır.", source: "Aile Hukuku" },
    { keywords: ["uydu", "hacker", "savas"], q: "Uyduların Siber Silah Olarak Kullanımı nedir?", content: "Bir uydunun hacklenerek başka bir uydunun üzerine sürülmesi, 'silahlı saldırı' (armed attack) statüsünde bir savaş sebebidir.", source: "Tallinn Manual (Uzay Eki)" },
    { keywords: ["maden", "kayit", "sertifika"], q: "Uzay Madeni Menşei Şahadetnamesi nedir?", content: "Dünya'ya getirilen her maden, hangi gökcisminden ve hangi koordinatlardan çıkarıldığını belgeleyen bir sicile sahip olmalıdır.", source: "Ticaret Kanunu / Uzay Şerhi" },
    { keywords: ["astronot", "din", "ozgur"], q: "Uzayda İbadet ve Din Özgürlüğü nedir?", content: "Uzay istasyonlarında farklı inançlara sahip personel için ortak bir 'sessizlik ve meditasyon alanı' sağlanması evrensel bir haktır.", source: "İnsan Hakları Bildirgesi" },
    { keywords: ["enkaz", "temizlik", "fatura"], q: "Zorunlu Enkaz Kaldırma Maliyeti nedir?", content: "Kendi uydusunu imha eden veya kontrolsüz bırakan devlet, uluslararası temizlik ekiplerinin masraflarını ödemekle yükümlüdür.", source: "Sorumluluk Sözleşmesi Madde IV" },
    { keywords: ["yapay", "zeka", "yargi", "karar"], q: "Yapay Zeka Hakimlerin Yetkisi nedir?", content: "Basit uzay uyuşmazlıklarında (trafik, frekans çakışması) yapay zeka tarafından verilen kararlar, taraflar itiraz etmedikçe bağlayıcıdır.", source: "Tahkim Kanunu" },
    { keywords: ["mars", "toprak", "tarim"], q: "Mars Toprağı Islah Hakları nedir?", content: "Mars toprağını tarıma elverişli hale getiren koloni, o toprağın 'kullanım önceliği'ne (usufruct) süresiz olarak sahip olur.", source: "Eşya Hukuku" },
    { keywords: ["astronot", "sosyal", "guvenlik"], q: "Uzay Radyasyonu Meslek Hastalığı nedir?", content: "Uzay radyasyonu nedeniyle oluşan kanser veya genetik bozukluklar, fırlatıcı devletin sosyal güvenlik sistemince 'iş kazası' sayılır.", source: "Sosyal Sigortalar Kanunu" },
    { keywords: ["ufo", "temas", "gizlilik"], q: "Birinci Temas Gizlilik Sözleşmesi nedir?", content: "Dünya dışı bir medeniyetle temas kuran astronotlar, BM Güvenlik Konseyi onayı gelene kadar bu bilgiyi 'devlet sırrı' olarak saklamakla yükümlüdür.", source: "SETI Protokolü" },
    { keywords: ["uydu", "goruntu", "etik"], q: "Yüksek Çözünürlüklü Gözetleme Sınırı nedir?", content: "Sivil uyduların 10 cm altındaki çözünürlükte görüntü alması, özel hayatın gizliliği nedeniyle kısıtlanabilir veya izne bağlanabilir.", source: "Kişisel Verilerin Korunması" },
    { keywords: ["astronot", "maas", "kripto"], q: "Uzay Personeli Ödeme Birimi nedir?", content: "Dünya dışı kolonilerde yapılacak ödemeler, tescil devletinin yasal parasına endeksli bir 'dijital varlık' üzerinden gerçekleştirilebilir.", source: "Uzay Finans Yasası" },
    { keywords: ["maden", "ay", "reklam"], q: "Ay Yüzeyinde Reklam Yasağı nedir?", content: "Dünya'dan çıplak gözle görülebilecek şekilde Ay yüzeyine logo kazımak veya lazerle yansıtmak, insanlığın ortak mirasına saygısızlık kabul edilir.", source: "UNESCO Uzay Kültürel Miras" },
    { keywords: ["astronot", "yetenek", "istifa"], q: "Kritik Görevde İstifa Hakkı nedir?", content: "Bir astronot, geminin güvenliğini tehlikeye atmadığı sürece istifa edebilir ancak 'ihbar süresi'ni Dünya'ya dönüşe kadar tamamlamak zorundadır.", source: "İş Kanunu" },
    { keywords: ["robot", "suc", "yazilim"], q: "Otonom Robotun Kasten Zarar Vermesi nedir?", content: "Bir robotun kasıtlı olarak bir insana zarar vermesi durumunda, yazılımı manipüle eden kişi 'asli fail' olarak yargılanır.", source: "Ceza Kanunu" },
    { keywords: ["uzay", "yolu", "isaret"], q: "Navigasyon İşaretçileri Güvenliği nedir?", content: "Derin uzay rotalarına yerleştirilen radyo işaretçilerini (beacon) kasten kapatmak veya yanıltmak, korsanlık eylemi sayılır.", source: "Uzay Seyrüsefer Güvenliği" },
    { keywords: ["astronot", "vasiyet", "dijital"], q: "Uzayda Dijital Vasiyetname nedir?", content: "Ölüm riski yüksek görevlerde, astronotun video kaydıyla bıraktığı vasiyet, tescil devletinde noter huzurunda yapılmış gibi geçerlidir.", source: "Medeni Kanun" },
    { keywords: ["mars", "su", "ortak"], q: "Mars Su Kaynakları Paylaşımı nedir?", content: "Mars'ta bulunan yer altı suları, hiçbir koloninin tekelinde olamaz; acil durumlarda komşu kolonilerle paylaşılması zorunludur.", source: "İnsancıl Hukuk" },

    { keywords: ["yasak", "deney", "insan"], q: "Uzayda Genetik Deneyler nedir?", content: "Uzay radyasyonunun insan embriyosu üzerindeki etkilerini inceleyen deneyler, Dünya'daki biyotıp etiği yasalarına ve Helsinki Bildirgesi'ne tabidir.", source: "UNESCO Biyoetik İlkeleri" },
    { keywords: ["internet", "starlink", "erisim"], q: "Uydu İnterneti ve Sansür nedir?", content: "Bir devlet, kendi semalarında hizmet veren uydu internet sağlayıcılarından yerel içerik yasalarına uymasını talep edebilir; uymayan uyduların sinyalini engelleyebilir.", source: "Ulusal Egemenlik Yasaları" },
    { keywords: ["askeri", "üs", "ay"], q: "Ay'da Askeri Yasak nedir?", content: "Ay ve diğer gök cisimleri üzerinde askeri üs kurmak, tesis inşa etmek veya silah denemesi yapmak tamamen yasaktır.", source: "Dış Uzay Antlaşması Madde IV" },
    { keywords: ["maden", "paylasim", "gelir"], q: "Ay Madenlerinin Gelir Paylaşımı nedir?", content: "Ay Antlaşması'na göre (az sayıda ülke imzalamıştır), uzay kaynaklarından elde edilen karların gelişmekte olan ülkelerle paylaşılması öngörülür.", source: "Ay Antlaşması (1979) Madde XI" },
    { keywords: ["guvenlik", "bolge", "operasyon"], q: "Uzayda Güvenli Bölgeler nedir?", content: "Artemis Anlaşmaları kapsamında, diğer ülkelerin faaliyetlerine müdahale etmemek adına belirli operasyonel alanlar 'güvenlik bölgesi' ilan edilebilir.", source: "Artemis Accords Madde XI" },
    { keywords: ["istila", "uzayli", "temas"], q: "Dünya Dışı Yaşamla Temas nedir?", content: "Olası bir temas durumunda, BM nezdinde 'Post-Detection' protokolleri devreye girer; hiçbir devlet tek başına cevap verme hakkına sahip değildir.", source: "SETI Protokolleri / BM Dış Uzay İşleri Ofisi" },
    { keywords: ["hava", "trafik", "yonetimi"], q: "Uzay Trafik Yönetimi (STM) nedir?", content: "Alçak Dünya yörüngesindeki çarpışmaları önlemek için oluşturulan STM kuralları, uyduların manevra önceliğini 'yol hakkı' esasına göre belirlemeye çalışır.", source: "STM Teknik Standartları" },
    { keywords: ["avukat", "baro", "yargi"], q: "Uzay Hukukçusu Yetkisi nedir?", content: "Uzaydaki uyuşmazlıklar için Lahey'deki Daimi Tahkim Mahkemesi bünyesinde 'Uzay Faaliyetlerine İlişkin İsteğe Bağlı Tahkim Kuralları' mevcuttur.", source: "PCA Uzay Kuralları (2011)" },
    { keywords: ["su", "buz", "kaynak"], q: "Ay'daki Su Kaynakları nedir?", content: "Ay kutuplarındaki buz kütleleri 'ilk gelen alır' prensibine göre değil, bilimsel araştırma serbestisi ve sürdürülebilir kullanım ilkelerine göre yönetilmelidir.", source: "BM Uzay Kararları" },
    { keywords: ["ihracat", "teknoloji", "fuze"], q: "Füze Teknolojisi Kontrolü nedir?", content: "Uzay teknolojisi çift kullanımlı (askeri/sivil) olduğu için, roket motoru transferleri sıkı ihracat kontrollerine ve yaptırımlara tabidir.", source: "MTCR (Füze Teknolojisi Kontrol Rejimi)" },
    { keywords: ["firlatma", "iptal", "tazminat"], q: "Fırlatma İptal Hakları nedir?", content: "Hava muhalefeti veya teknik arıza nedeniyle iptal edilen ticari fırlatmalarda, sözleşmede 'mücbir sebep' maddesi yoksa operatör geri ödeme yapmayabilir.", source: "Ticari Uzay Sözleşmeleri" },
    { keywords: ["karantina", "salgin", "virus"], q: "Uzay Karantinası nedir?", content: "Dünya'ya dönen astronotlar veya örnekler, potansiyel biyolojik tehlikelere karşı zorunlu karantinaya alınabilir (Örn: Apollo 11 sonrası).", source: "NASA Sağlık Protokolleri" },
    { keywords: ["hizmet", "servis", "uydu"], q: "Yörüngede Servis Hukuku nedir?", content: "Bir uydunun ömrünü uzatmak için yakıt ikmali yapan araçlar, 'müdahale edilen uydunun' devletinden önceden izin almalıdır.", source: "CONFERS Standartları" },
    { keywords: ["is", "kazasi", "tazminat"], q: "Uzayda İş Kazası nedir?", content: "Uzayda bir astronotun veya işçinin yaralanması durumunda, istihdam sözleşmesinin tabi olduğu ülke kanunları ve uluslararası tazminat hükümleri uygulanır.", source: "ILO / İş Kanunu" },
    { keywords: ["enerji", "gunes", "mikrodalga"], q: "Uzay Tabanlı Güneş Enerjisi nedir?", content: "Uzaydan Dünya'ya enerji aktarımı için kullanılan mikrodalga ışınları, havacılık ve insan sağlığı güvenliği standartlarına uymak zorundadır.", source: "ITU Radyo Düzenlemeleri" },
    { keywords: ["arazi", "tapu", "satis"], q: "Ay'dan Arsa Satışı nedir?", content: "İnternet üzerinden satılan 'Ay tapuları' hukuki geçersizliğe sahiptir; çünkü hiçbir devlet veya birey Ay üzerinde mülkiyet iddia edemez.", source: "Dış Uzay Antlaşması Madde II" },
    { keywords: ["korsan", "ele gecirme", "gemi"], q: "Uzay Korsanlığı nedir?", content: "Bir uzay aracının şiddet kullanılarak ele geçirilmesi, deniz hukukundaki 'piracy' (korsanlık) tanımına kıyasen uluslararası bir suç kabul edilir.", source: "BM Deniz Hukuku Sözleşmesi (Kıyas)" },
    { keywords: ["nukleer", "reaktor", "pdp"], q: "Nükleer Güç Kaynakları nedir?", content: "Uzay araçlarında nükleer reaktör kullanımı, olası bir düşüş anındaki radyoaktif serpintiyi önlemek için katı güvenlik tasarım kurallarına tabidir.", source: "BM Uzayda Nükleer Güç Kaynakları İlkeleri" },
    { keywords: ["gozlem", "teleskop", "engel"], q: "Işık Kirliliği Yasakları nedir?", content: "Büyük uydu takımyıldızlarının astronomik gözlemleri engellemesi, 'bilimsel araştırma serbestisi' hakkının ihlali olarak dava konusu edilebilir.", source: "Dış Uzay Antlaşması Madde I" },
    { keywords: ["sinir", "karman", "irtifa"], q: "Uzay Nerede Başlar?", content: "Hukuki olarak kesin bir sınır olmasa da, genellikle deniz seviyesinden 100 km yüksekteki 'Karman Hattı' uzayın başlangıcı kabul edilir.", source: "FAI Standartları" },
    { keywords: ["multeci", "iltica", "istasyon"], q: "Uzayda Siyasi İltica nedir?", content: "Bir astronotun başka bir ülkeye ait modüle geçerek sığınma talep etmesi durumunda, diplomatik sığınma hukuku kuralları tartışmalı hale gelir.", source: "Diplomatik İlişkiler Sözleşmesi (Kıyas)" },
    { keywords: ["bayrak", "sembol", "dikme"], q: "Bayrak Dikme Hükmü nedir?", content: "Bir gök cismine bayrak dikmek, deniz hukukundaki keşif geleneği olsa da, uzayda 'egemenlik hakkı' veya 'toprak edinme' hakkı doğurmaz.", source: "Dış Uzay Antlaşması Madde II" },
    { keywords: ["maden", "vergi", "cennet"], q: "Uzay Madenciliği Vergi Cennetleri nedir?", content: "Bazı ülkeler (Örn: Lüksemburg), uzay madenciliği şirketlerini çekmek için özel düşük vergi ve mülkiyet koruma yasaları çıkarmıştır.", source: "Lüksemburg Uzay Kaynakları Yasası" },
    { keywords: ["iss", "ticaret", "film"], q: "ISS'de Ticari Faaliyetler nedir?", content: "Uzay istasyonunda film çekmek veya ürün tanıtımı yapmak, istasyonun ortağı olan devletlerin ticari kullanım izinlerine tabidir.", source: "NASA Ticari Kullanım Rehberi" },
    { keywords: ["veri", "gizlilik", "uydu"], q: "Uydudan Kişisel Veri Takibi nedir?", content: "Yüksek çözünürlüklü uydu görüntüleriyle bireylerin takibi, kişisel verilerin korunması ve özel hayatın gizliliği yasalarını ihlal edebilir.", source: "KVKK / GDPR" },
    { keywords: ["hava", "sancak", "devlet"], q: "Hava Sahası İhlali nedir?", content: "Bir roketin fırlatılış veya dönüş esnasında başka bir ülkenin hava sahasından izinsiz geçmesi 'egemenlik ihlali' sayılır.", source: "Chicago Konvansiyonu" },
    { keywords: ["kurtarma", "fatura", "masraf"], q: "Kurtarma Operasyonu Masrafı nedir?", content: "Bir devlet, tehlike altındaki yabancı astronotları kurtarmak için yaptığı masrafları fırlatan devletten talep etme hakkına sahip değildir.", source: "Kurtarma Anlaşması" },
    { keywords: ["deney", "hayvan", "etik"], q: "Uzayda Hayvan Deneyleri nedir?", content: "Uzayda kullanılan denek hayvanlar, Dünya'daki laboratuvar hayvanları koruma yasalarına ve etik kurul onaylarına tabidir.", source: "Animal Welfare Act" },
    { keywords: ["donus", "inis", "izinsiz"], q: "Acil İniş ve Gümrük nedir?", content: "Acil durum nedeniyle yabancı bir ülkeye inen uzay aracı ve mürettebatı, gümrük ve pasaport işlemlerinden muaf tutularak derhal iade edilmelidir.", source: "Kurtarma Anlaşması Madde V" },
    { keywords: ["enerji", "lazer", "silah"], q: "Yörüngesel Lazer Sistemleri nedir?", content: "İletişim amaçlı lazerlerin silah olarak kullanılması (uyduları kör etmek gibi), 'zararlı müdahale' ve 'kuvvet kullanma' yasağına girer.", source: "BM Şartı Madde 2(4)" },
    { keywords: ["isbirligi", "zorunluluk", "bilgi"], q: "Tehlike Bildirim Yükümlülüğü nedir?", content: "Bir devlet, uzayda keşfettiği ve astronotların hayatını veya sağlığını tehdit edebilecek her türlü fenomeni (radyasyon, meteor vb.) derhal bildirmelidir.", source: "Dış Uzay Antlaşması Madde V" },
    { keywords: ["insan", "haklari", "uzay"], q: "Uzayda İnsan Hakları nedir?", content: "Dünya üzerindeki tüm temel insan hakları (yaşam, işkence yasağı vb.), milliyetine bakılmaksızın uzaydaki tüm insanlar için de geçerlidir.", source: "İnsan Hakları Evrensel Beyannamesi" },
    { keywords: ["nerede", "baslar", "karman"], q: "Uzay tam olarak nerede başlar?", content: "Deniz seviyesinden 100 km yukarıdaki 'Karman Hattı' uluslararası kabul gören uzay sınırıdır." },
    { keywords: ["gokyuzu", "mavi", "siyah"], q: "Gökyüzü neden mavidir ama uzay siyahtır?", content: "Atmosfer güneş ışığını dağıtır (mavi ışık daha çok saçılır). Uzayda atmosfer olmadığı için ışık dağılmaz ve her yer karanlıktır." },
    { keywords: ["dunya", "nasil", "gorunur"], q: "Uzaydan Dünya nasıl görünür?", content: "Mavi bir bilye gibi! Okyanuslar mavi, bulutlar beyaz, karalar yeşil ve kahverengi tonlarında seçilir." },
    { keywords: ["atmosfer", "bittiginde"], q: "Atmosfer bittiğinde ne olur?", content: "Hava basıncı sıfıra iner, oksijen biter ve güneşin zararlı radyasyonuna karşı koruma kalkanı kalkar." },
    { keywords: ["yercekimi", "varmidir"], q: "Uzayda yerçekimi var mıdır?", content: "Evet, yerçekimi her yerdedir. Astronotların uçmasının sebebi yerçekimi yokluğu değil, Dünya etrafında sürekli düşme (serbest düşüş) halidir." },
    { keywords: ["ay", "neden", "doner"], q: "Ay neden Dünya'nın etrafında döner?", content: "Dünya'nın kütleçekimi Ay'ı kendine çeker, Ay'ın hızı ise kaçmasını sağlar; bu denge yörüngeyi oluşturur." },
    { keywords: ["ayda", "hava", "yoktur"], q: "Ay'da neden hava yoktur?", content: "Ay'ın kütlesi küçüktür; gaz atomlarını yüzeyinde tutacak kadar güçlü bir yerçekimi alanı yoktur." },
    { keywords: ["ayak", "izi", "silinmez"], q: "Ay'a gidildiğinde neden ayak izleri silinmez?", content: "Ay'da rüzgar, su veya atmosferik olaylar yoktur. İzleri süpürecek bir etken olmadığı için milyonlarca yıl kalabilirler." },
    { keywords: ["ay", "ayni", "yuz"], q: "Dünyadan neden hep Ay'ın aynı yüzünü görürüz?", content: "Kütleçekim kilidi nedeniyle Ay, kendi etrafında dönme süresiyle Dünya etrafında dönme süresini aynı sürede (27 gün) tamamlar." },
    { keywords: ["uydular", "dusmez"], q: "Yapay uydular neden Dünya'ya düşmez?", content: "Dünya'nın çekiminden kaçacak kadar yüksek bir hızda (saatte ~28.000 km) yatay olarak ilerledikleri için düşüşleri yer küreye ulaşmaz." },
    { keywords: ["cin", "seddi"], q: "Uzaydan bakıldığında Çin Seddi görünür mü?", content: "Hayır. Çıplak gözle görülmesi imkansızdır; genellikle otobanlar veya büyük şehir ışıkları daha kolay fark edilir." },
    { keywords: ["uzay", "boslugu"], q: "Uzay boşluğu ne demektir?", content: "Maddenin (atomların) neredeyse hiç bulunmadığı, aşırı düşük yoğunluklu alandır." },
    { keywords: ["ses", "duyulur"], q: "Uzayda ses duyulur mu?", content: "Hayır. Ses dalgaları yayılmak için bir ortama (hava, su vb.) ihtiyaç duyar. Uzay vakumdur." },
    { keywords: ["ruzgar", "esmez"], q: "Uzayda neden rüzgar esmez?", content: "Rüzgar hava basıncı farkıyla oluşur. Uzayda hava olmadığı için rüzgar da oluşamaz." },
    { keywords: ["insan", "korumasiz"], q: "Bir insan uzay boşluğuna korumasız çıkarsa ne olur?", content: "Vücuttaki oksijen hızla tükenir, 15 saniyede bilinç kapanır. Kan kaynamaz ama vücut şişer ve donar." },
    { keywords: ["gunes", "nedir"], q: "Güneş nedir?", content: "Güneş, sistemimizin merkezindeki orta büyüklükte bir 'Sarı Cüce' yıldızdır." },
    { keywords: ["gunes", "sicaklik"], q: "Güneş ne kadar sıcaktır?", content: "Yüzeyi 5.500°C iken, nükleer reaksiyonların olduğu çekirdeği yaklaşık 15 milyon derecedir." },
    { keywords: ["gunes", "oksijen", "yanma"], q: "Güneş neden yanıyor? (Oksijensiz nasıl?) nedir?", content: "Güneş aslında yanmaz; nükleer füzyon yapar. Hidrojen atomlarını birleştirip helyuma dönüştürerek devasa enerji saçar." },
    { keywords: ["gunes", "sonecek"], q: "Güneş bir gün sönecek mi?", content: "Evet, 5 milyar yıl sonra hidrojen bittiğinde önce kızıl dev olacak, sonra bir beyaz cüce olarak sönecektir." },
    { keywords: ["yildizlar", "parlar"], q: "Yıldızlar neden geceleri parlar?", content: "İçlerindeki nükleer füzyon ışık üretir ve Dünya atmosferi bu ışığı kırarak yıldızların göz kırpıyor gibi görünmesine neden olur." },
    { keywords: ["yildiz", "renkleri"], q: "Yıldızlar neden farklı renklerdedir?", content: "Sıcaklığa bağlıdır. En sıcaklar mavi-beyaz, orta sıcaklar sarı (Güneş), en soğuklar ise kırmızıdır." },
    { keywords: ["kayan", "yildiz"], q: "Kayan yıldız aslında nedir?", content: "Yıldız değildir; atmosfere girip yanan küçük meteor veya kaya parçalarıdır." },
    { keywords: ["en", "buyuk", "yildiz"], q: "Güneş sistemindeki en büyük yıldız hangisidir?", content: "Güneş sisteminde tek bir yıldız vardır: Güneş. Evrenin bilinen en büyüklerinden biri ise UY Scuti'dir." },
    { keywords: ["takimyildizi"], q: "Takımyıldızı ne demektir?", content: "Gökyüzünde birbirine yakın görünen ve bir şekle benzetilen yıldız gruplarıdır." },
    { keywords: ["kutup", "yildizi"], q: "Kutup Yıldızı neden yer değiştirmez?", content: "Dünya'nın dönüş ekseniyle tam olarak aynı hizada (Kuzey kutbunun üstünde) olduğu için sabit görünür." },
    { keywords: ["yildiz", "omru"], q: "Bir yıldızın ömrü ne kadardır?", content: "Kütlesine bağlıdır. Dev yıldızlar milyonlarca yıl, küçükler ise trilyonlarca yıl yaşayabilir." },
    { keywords: ["supernova"], q: "Süpernova nedir?", content: "Büyük bir yıldızın ömrü bittiğinde gerçekleşen muazzam ve parlak patlamadır." },
    { keywords: ["notron", "yildizi"], q: "Nötron yıldızı nedir?", content: "Süpernova sonrası kalan, atomların sıkıştığı, bir kaşığı milyarlarca ton gelen aşırı yoğun yıldız kalıntısıdır." },
    { keywords: ["tutulmasi", "gunes"], q: "Güneş tutulması nasıl gerçekleşir?", content: "Ay'ın, Dünya ile Güneş arasına girip Güneş'in ışığını engellemesiyle gerçekleşir." },
    { keywords: ["ay", "tutulmasi"], q: "Ay tutulması nedir?", content: "Dünya'nın, Güneş ile Ay arasına girip kendi gölgesini Ay'ın üzerine düşürmesidir." },
    { keywords: ["kac", "gezegen"], q: "Güneş sisteminde kaç gezegen vardır?", content: "8 ana gezegen vardır: Merkür, Venüs, Dünya, Mars, Jüpiter, Satürn, Uranüs, Neptün." },
    { keywords: ["pluton", "gezegen"], q: "Plüton neden artık gezegen sayılmıyor?", content: "2006'da IAU tarafından yörüngesindeki diğer nesneleri temizleyemediği için 'cüce gezegen' sınıfına alındı." },
    { keywords: ["en", "sicak", "gezegen"], q: "En sıcak gezegen hangisidir?", content: "Venüs'tür (460°C). Kalın atmosferi ısıyı hapseden bir sera etkisi yaratır." },
    { keywords: ["halkali", "gezegen"], q: "Hangi gezegenin etrafında halkalar vardır?", content: "Satürn en belirginidir; ama Jüpiter, Uranüs ve Neptün'ün de ince halkaları vardır." },
    { keywords: ["mars", "kizil"], q: "Mars neden 'Kızıl Gezegen' olarak anılır?", content: "Toprağındaki demir oksit (pas) tozlarının her yeri kaplamasından dolayı kızıl görünür." },
    { keywords: ["jupiter", "buyuk"], q: "Jüpiter neden bu kadar büyüktür?", content: "Sistemdeki diğer tüm gezegenlerin toplamından 2.5 kat daha fazla kütleye sahiptir." },
    { keywords: ["gaz", "devi"], q: "Gaz devi ne demektir?", content: "Katı bir yüzeyi olmayan, çoğunlukla hidrojen ve helyumdan oluşan devasa gezegenlerdir." },
    { keywords: ["mars", "su"], q: "Mars'ta su var mı?", content: "Evet, kutuplarda buz halde ve toprak altında sıvı halde su varlığına dair güçlü kanıtlar mevcuttur." },
    { keywords: ["venus", "sicak"], q: "Venüs neden Merkür'den daha sıcaktır?", content: "Merkür güneşe yakın olsa da atmosferi yoktur. Venüs'ün kalın atmosferi ısıyı fırın gibi hapseder." },
    { keywords: ["saturn", "halkalari"], q: "Satürn'ün halkaları neden yapılmıştır?", content: "Yüzde 99'u su buzu olan milyarlarca küçük ve büyük parçadan oluşur." },
    { keywords: ["uranus", "yan", "yatmis"], q: "Uranüs neden yan yatmış gibi döner?", content: "Milyarlarca yıl önce Dünya boyutunda bir gök cisminin çarpmasıyla ekseni 98 derece devrilmiştir." },
    { keywords: ["neptun", "firtina"], q: "Neptün'de neden çok şiddetli fırtınalar kopar?", content: "Güneş'ten gelen az ısıya rağmen iç ısısı yüksektir; bu sıcaklık farkı ses hızını aşan rüzgarlar yaratır." },
    { keywords: ["merkur", "yasam"], q: "Merkür'de neden yaşam olamaz?", content: "Atmosferi yoktur, gündüz 430 derece olan sıcaklık gece -180 dereceye düşer." },
    { keywords: ["gezegen", "isimleri"], q: "Gezegenlerin isimleri nereden gelir?", content: "Çoğunlukla Antik Roma ve Yunan mitolojisindeki tanrıların isimlerinden gelir." },
    { keywords: ["cuce", "gezegen"], q: "Cüce gezegen nedir?", content: "Gezegen olamayacak kadar küçük, asteroit olamayacak kadar büyük ve yuvarlak cisimlerdir (Örn: Plüton)." },
    { keywords: ["yuksek", "dag"], q: "Güneş sistemindeki en yüksek dağ nerededir?", content: "Mars'tadır. Olympus Mons volkanı Everest'ten 3 kat daha yüksektir (25 km)." },
    { keywords: ["gun", "yildan", "uzun"], q: "Bir gezegende bir gün, bir yıldan uzun olabilir mi?", content: "Evet! Venüs kendi etrafında o kadar yavaş döner ki bir günü, bir yılından (Güneş turu) daha uzundur." },

    { keywords: ["suc", "ceza", "hapis", "cinayet"], q: "Uzayda İşlenen Suçlar nedir?", content: "Uzayda bir suç işlendiğinde, 'Tescil Devleti' ilkesi geçerlidir. Yani suç, hangi ülkenin tescil ettiği araçta işlendiyse o ülkenin mahkemeleri yetkilidir.", source: "BM Dış Uzay Antlaşması Madde VIII" },
    { keywords: ["siber", "saldiri", "hack", "sinyal"], q: "Uzayda Siber Savaş Hukuku nedir?", content: "Bir devletin uydusuna yapılan siber saldırı, uluslararası hukukta 'kuvvet kullanma' veya 'silahlı saldırı' olarak değerlendirilebilir ve meşru müdafaa hakkı doğurabilir.", source: "Tallinn Manual 2.0" },
    { keywords: ["turist", "yolcu", "bilet", "iade"], q: "Uzay Turisti Hakları nedir?", content: "Uzay turistleri teknik olarak 'astronot' değil, 'uzay uçuşu katılımcısı'dır. Bu nedenle astronotlara sağlanan dokunulmazlıklardan tam yararlanamazlar.", source: "FAA Ticari Uzay Yönetmeliği" },
    { keywords: ["evlilik", "nikah", "dogum", "bebek"], q: "Uzayda Evlilik ve Doğum nedir?", content: "Henüz resmi bir prosedür olmasa da, uzay aracının bayrağını taşıdığı devletin yasaları geçerli olur. Örneğin bir Türk gemisinde doğan bebek, Türk kütüğüne kaydedilir.", source: "Medeni Kanun / Bayrak Devleti İlkesi" },
    { keywords: ["miras", "vasiyet", "olum"], q: "Uzayda Miras Hukuku nedir?", content: "Uzayda ölen bir kişinin mal varlığı, vatandaşı olduğu ülkenin veraset yasalarına göre paylaştırılır.", source: "Uluslararası Özel Hukuk" },
    { keywords: ["maden", "paylasim", "kar", "yuzde"], q: "Uzay Kaynaklarının Paylaşımı nedir?", content: "Gelişmekte olan ülkeler, uzay madenciliğinden elde edilen gelirlerin tüm insanlığa dağıtılmasını savunurken, gelişmiş ülkeler 'çıkaranındır' ilkesini destekler.", source: "BM Ay Anlaşması Tartışmaları" },
    { keywords: ["mars", "vali", "yonetim", "demokrasi"], q: "Mars Kolonisinin Yönetimi nedir?", content: "İlk koloniler muhtemelen askeri disiplin veya şirket kurallarıyla yönetilecek olsa da, uzun vadede 'Mars Anayasası' gibi bağımsız yapılar öngörülmektedir.", source: "Space Policy Review" },
    { keywords: ["reklam", "marka", "logo", "yildiz"], q: "Uzayda Reklam Yasağı nedir?", content: "Yörüngeye devasa ışıklı reklam panoları yerleştirmek, gökyüzünün doğal yapısını bozduğu gerekçesiyle birçok ülke tarafından etik dışı ve yasak kabul edilir.", source: "Astronomi Koruma İlkeleri" },
    { keywords: ["casus", "izleme", "fotograf", "gizlilik"], q: "Casus Uydular ve Casusluk nedir?", content: "Bir ülkenin üzerinden geçen uydunun fotoğraf çekmesi 'uzayın serbestliği' ilkesi gereği yasaklanamaz, ancak bu verilerin askeri amaçla kullanımı gerginlik sebebidir.", source: "Open Skies Treaty" },
    { keywords: ["internet", "sansur", "uydu", "erisim"], q: "Uzay İnterneti ve Sansür nedir?", content: "Starlink gibi sistemlerin, bir ülkenin yerel internet yasaklarını (firewall) delmesi durumunda hangi ülkenin hukukunun geçerli olacağı büyük bir tartışma konusudur.", source: "Siber Hukuk" },
    { keywords: ["enkaz", "temizlik", "vergi", "cop"], q: "Uzay Çöpü Temizleme Vergisi nedir?", content: "Gelecekte fırlatılan her uydu için, ömrü bittiğinde temizlenmesi adına bir 'depozito' veya 'temizlik fonu' ödenmesi planlanmaktadır.", source: "ESA Space Debris Office" },
    { keywords: ["hayvan", "haklari", "deney"], q: "Uzayda Hayvan Hakları nedir?", content: "Uzaya gönderilen hayvanlar, Dünya'daki laboratuvar hayvanları koruma yasalarına tabidir; gereksiz acı çektirilmeleri yasaktır.", source: "Animal Welfare Act" },
    { keywords: ["korsan", "gemi", "el", "koyma"], q: "Uzay Korsanlığı (Space Piracy) nedir?", content: "Başka bir devletin uzay aracına zorla girmek veya el koymak, deniz korsanlığına benzer şekilde 'insanlığa karşı suç' sayılabilir.", source: "BM Deniz Hukuku Kıyaslaması" },
    { keywords: ["bayrak", "dikme", "sembol"], q: "Bayrak Dikmek Egemenlik Sağlar mı?", content: "Hayır. Ay'a veya bir asteroide bayrak dikmek sadece semboliktir; o bölgenin o ülkeye ait olduğu anlamına gelmez.", source: "OST Madde II" },
    { keywords: ["sinyal", "karistirma", "jamming"], q: "Sinyal Karıştırma Suçu nedir?", content: "Uyduların GPS veya haberleşme sinyallerini kasten karıştırmak, uluslararası sivil havacılık ve uzay güvenliğini ihlal eden ağır bir suçtur.", source: "ITU Regülasyonları" },
    { keywords: ["sigorta", "police", "hasar"], q: "Uzay Sigortası Zorunluluğu nedir?", content: "Birçok devlet, özel şirketlerin fırlatma yapabilmesi için milyar dolarlık üçüncü şahıs mali mesuliyet sigortası yaptırmasını zorunlu kılar.", source: "Ticari Uzay Yasaları" },
    { keywords: ["patent", "icat", "bulus"], q: "Uzayda Yapılan İcatların Patenti nedir?", content: "Yerçekimsiz ortamda geliştirilen bir ilaç veya teknolojinin patent hakkı, deneyi yapan kuruma ve aracın tescilli olduğu devlete aittir.", source: "WIPO Uzay Fikri Mülkiyet" },
    { keywords: ["kurtarma", "fatura", "masraf"], q: "Kurtarma Operasyonu Ücreti nedir?", content: "Zor durumdaki astronotları kurtarmak insani bir görevdir ve kural olarak kurtarılan devletten ücret talep edilmez.", source: "Rescue Agreement" },
    { keywords: ["isik", "kirliligi", "gozlem"], q: "Gökbilimcilerin Hakları nedir?", content: "Büyük uydu takımyıldızlarının (Starlink vb.) astronomik gözlemleri engellemesi, bilimsel araştırma özgürlüğünün ihlali olarak dava konusu olabilir.", source: "IAU Dark Skies Initiative" },
    { keywords: ["karantina", "dunya", "koruma"], q: "Geri Dönüş Karantinası nedir?", content: "Başka gezegenlerden dönen astronotların veya örneklerin, Dünya ekosistemine zarar vermemesi için yasal olarak karantinada tutulması zorunludur.", source: "NASA Planetary Protection" },
    { keywords: ["is", "hukuku", "maas", "tazminat"], q: "Uzayda İş Hukuku nedir?", content: "Uzayda çalışan bir personelin çalışma saatleri, maaşı ve kaza tazminatı, iş sözleşmesinin yapıldığı ülkenin yasalarına tabidir.", source: "Uluslararası İş Hukuku" },
    { keywords: ["cevre", "etki", "ozon"], q: "Fırlatmaların Çevresel Etkisi nedir?", content: "Roket yakıtlarının atmosferin üst katmanlarına verdiği zararlar, ulusal çevre ajansları (EPA vb.) tarafından denetlenmeye başlanmıştır.", source: "Environmental Law" },
    { keywords: ["arkeoloji", "tarih", "koruma"], q: "Uzay Arkeolojisi nedir?", content: "Ay'daki ilk ayak izleri, iniş takımları ve terkedilmiş araçlar 'kültürel miras' statüsünde korunmalıdır.", source: "UNESCO Uzay Mirası Çalışmaları" },
    { keywords: ["goktasi", "yonu", "degistirme"], q: "Asteroit Saptırma Sorumluluğu nedir?", content: "Bir tehlikeyi önlemek için bir asteroidin yönü değiştirilirken yanlışlıkla başka bir ülkeye çarpmasına sebep olunursa, müdahale eden devlet sorumlu olabilir.", source: "DART Görevi Hukuki Analizi" },
    { keywords: ["askeri", "üs", "ayda"], q: "Ay'da Askeri Üs Yasağı nedir?", content: "Ay üzerinde askeri tesis kurmak, silah denemesi yapmak veya askeri manevra gerçekleştirmek tamamen yasaktır.", source: "OST Madde IV" },
    { keywords: ["isbirligi", "zorunlu", "bilgi"], q: "Bilgi Paylaşım Zorunluluğu nedir?", content: "Devletler, uzayda keşfettikleri ve diğer devletlerin güvenliğini veya sağlığını etkileyebilecek doğa olaylarını (örn. güneş patlaması) bildirmekle yükümlüdür.", source: "OST Madde XI" },
    { keywords: ["ozel", "mülk", "spacex", "blue"], q: "Özel Araçlara Müdahale nedir?", content: "Bir devlet, kendi vatandaşına ait olmayan özel bir uzay aracına (SpaceX gibi) izinsiz müdahale edemez; bu, gemiye izinsiz çıkmakla eşdeğerdir.", source: "Uluslararası Hukuk" },
    { keywords: ["enerji", "gunes", "transfer"], q: "Uzaydan Enerji Transferi Hukuku nedir?", content: "Uzaydaki dev güneş panellerinden Dünya'ya mikrodalga ile enerji gönderilmesinin frekans yönetimi ve güvenlik denetimi.", source: "ITU / Enerji Hukuku" },
    { keywords: ["dunya", "disi", "mesaj", "protokol"], q: "İlk Temas Protokolü nedir?", content: "Uzaylı bir sinyal alındığında, hiçbir devlet tek başına cevap veremez; bu durum BM Genel Sekreterliği aracılığıyla tüm dünyayla paylaşılmalıdır.", source: "SETI Post-Detection Hub" },
    { keywords: ["haksiz", "rekabet", "tekel"], q: "Uzayda Tekelleşme nedir?", content: "Yörünge pozisyonlarının veya kaynak zengini bölgelerin tek bir şirket veya devlet tarafından kapatılması, haksız rekabet davalarına konu olabilir.", source: "Rekabet Hukuku" },
    { keywords: ["telekom", "tv", "yayin"], q: "Yasadışı Yayıncılık nedir?", content: "Bir uydudan bir ülkenin izni olmadan o ülkeye propaganda veya yasadışı yayın yapılması, telekomünikasyon yasalarının ihlalidir.", source: "ITU Sözleşmesi" },
    { keywords: ["ufo", "uap", "gizlilik"], q: "UFO Verilerinin Paylaşımı nedir?", content: "Tanımlanamayan uçan nesnelerle ilgili askeri verilerin sivil havacılık güvenliği açısından paylaşılmasına dair yeni yasal düzenlemeler.", source: "ABD UAP Yasası" },
    { keywords: ["yapi", "malzeme", "standart"], q: "Uzay İnşaat Standartları nedir?", content: "Ay veya Mars'ta yapılacak yapıların, uluslararası güvenlik ve basınç standartlarına uygun olma zorunluluğu.", source: "ISO Uzay Standartları" },
    { keywords: ["kar", "payi", "insanlik"], q: "İnsanlığın Ortak Mirası Fonu nedir?", content: "Uzaydan elde edilen karların bir kısmının, uzaya gidemeyen ülkelere teknolojik yardım olarak aktarılması önerisi.", source: "Gelişmekte Olan Ülkeler Deklarasyonu" },
    { keywords: ["uzay", "yolu", "gecis", "hakki"], q: "Zararsız Geçiş Hakkı nedir?", content: "Bir uzay aracının, başka bir ülkenin hava sahasından uzaya çıkmak için geçici olarak geçmesi (Innocent Passage) konusu.", source: "Hava ve Uzay Hukuku Kesişimi" },
    { keywords: ["kriz", "acil durun", "kaza"], q: "Acil Durum Yardımlaşması nedir?", content: "Uzayda arızalanan bir araca, en yakın mesafedeki diğer ülke aracının yardım etmesi etik ve hukuki bir beklentidir.", source: "COPUOS Rehber İlkeler" },
    { keywords: ["uzay", "avukati", "kariyer"], q: "Uzay Avukatlığı nedir?", content: "Uzay hukuku davalarına bakmak üzere uzmanlaşmış hukukçuların yetkilendirilmesi ve baro süreçleri.", source: "Hukuk Eğitimi" },
    { keywords: ["vergi", "cenneti", "yorünge"], q: "Yörünge Vergi Cennetleri nedir?", content: "Şirketlerin merkezlerini 'uzay tesciline' taşıyarak vergiden kaçınma çabalarına karşı uluslararası önlemler.", source: "OECD Tax Policy" },
    { keywords: ["nukleer", "atik", "uzay"], q: "Nükleer Atıkların Uzaya Atılması nedir?", content: "Dünya'daki nükleer atıkların uzaya gönderilmesi, kaza riskinin büyüklüğü nedeniyle uluslararası anlaşmalarla fiilen yasaklanmıştır.", source: "IAEA Güvenlik Standartları" },
    { keywords: ["asansor", "uzay asansörü", "sinir"], q: "Uzay Asansörü ve Egemenlik nedir?", content: "Dünya'dan uzaya uzanan sabit bir yapının geçtiği her irtifadaki egemenlik hakları.", source: "Teorik Hukuk Çalışmaları" },
    { keywords: ["yapay", "zeka", "otonom", "karar"], q: "Otonom Uzay Araçlarının Hukuku nedir?", content: "Bir yapay zekanın uzayda verdiği hatalı karardan (çarpışma vb.) kimin sorumlu tutulacağı (Yazılımcı mı, Sahibi mi?).", source: "AI Law / Space" },
    { keywords: ["kurtarma", "kurallar", "iss"], q: "ISS Tahliye Kuralları nedir?", content: "İstasyonda bir tehlike anında kimin hangi araçla tahliye edileceğine dair öncelik protokolleri.", source: "ISS Crew Operations" },
    { keywords: ["deniz", "platformu", "firlatma"], q: "Denizden Fırlatma Hukuku nedir?", content: "Uluslararası sulardaki bir platformdan yapılan fırlatmalarda hangi ülkenin yasalarının geçerli olacağı.", source: "Sea Launch Protocols" },
    { keywords: ["uzay", "polisi", "denetim"], q: "Uluslararası Uzay Polisi Teorisi nedir?", content: "Anlaşmaların ihlalini denetlemek için BM bünyesinde kurulması önerilen tarafsız denetim gücü.", source: "Uluslararası İlişkiler" },
    { keywords: ["meteoroloji", "uydu", "veri","hava durumu"], q: "Hava Durumu Verilerinin Paylaşımı nedir?", content: "Meteoroloji uydularından gelen verilerin, afet yönetimi için ücretsiz paylaşılması zorunluluğu.", source: "WMO Sözleşmesi" },
    { keywords: ["isik", "yelkeni", "hasar"], q: "Işık Yelkenlerinin Çarpışma Riski nedir?", content: "Çok ince ve geniş olan ışık yelkenlerinin yörünge trafiğinde yarattığı risklerin hukuki yönetimi.", source: "Yeni Nesil İtki Hukuku" },
    { keywords: ["biyolojik", "silah", "uzayda"], q: "Uzayda Biyolojik Deneyler nedir?", content: "Tehlikeli virüs veya bakterilerin uzayda mutasyon riskine karşı yürütülen deneylerin sıkı denetimi.", source: "Biyolojik Silahlar Sözleşmesi" },
    { keywords: ["gezegen", "savunma", "astroid"], q: "Gezegen Savunma Yasası nedir?", content: "Dünya'ya yaklaşan bir göktaşına karşı nükleer silah kullanılması gerekirse, bunun mevcut silah yasaklarından muaf tutulması.", source: "Planetary Defense Protocols" },
    { keywords: ["uzay", "mahkemesi"], q: "Uzay İhtilafları Mahkemesi nedir?", content: "Uzay kazaları ve ticari anlaşmazlıklar için Lahey'deki Daimi Tahkim Mahkemesi'nin (PCA) yetkilendirilmesi.", source: "PCA Optional Rules" },
    { keywords: ["mars", "bayragi", "temsil"], q: "Mars'ın Temsili nedir?", content: "Mars'ta kurulacak yerleşimlerin BM'de 'gözlemci statüsü' alıp alamayacağı üzerine teorik tartışmalar.", source: "Political Science" },
    { keywords: ["uzayın mülkiyeti", "egemenlik yasası", "uluslararası hukuk"], q: "Outer Space Treaty (1967), UNOOSA nedir?", content: "Uzay, hiçbir devletin egemenliği altında değildir ve tüm insanlığın ortak kullanım alanı olarak kabul edilir. Bu ilke sayesinde ülkelerin uzayı bölüşmesi veya sahiplenmesi engellenmiştir. Bu yaklaşım, deniz hukukundaki “uluslararası alan” kavramına benzer.", source: "Outer Space Treaty Madde II" },
    { keywords: ["uzay hukuku tanımı", "uluslar arası uzay düzeni", "uzay faaliyetleri"], q: "Uzay hukuku nedir?", content: "Uzay hukuku, uzayın keşfi, kullanımı ve bu süreçte ortaya çıkan hukuki ilişkileri düzenleyen uluslararası hukuk dalıdır. Bu alan; devletlerin faaliyetleri, özel şirketlerin uzay operasyonları, uydu sistemleri, astronot hakları ve uzay kaynaklarının kullanımı gibi çok geniş bir çerçeveyi kapsar. Temel amacı, uzayın barışçıl kullanımını sağlamak ve devletler arasında çatışmayı önlemektir.", source: "Outer Space Treaty (1967), UNOOSA" },
    { keywords: ["Ay mülkiyeti", "gezegen sahipliği", "egemenlik yasağı"], q: "Ay ve gezegenler sahiplenilebilir mi?", content: "Hayır. Devletler Ay veya başka gök cisimleri üzerinde mülkiyet iddia edemez. Özel şirketler için de bu durum net değildir ancak genel eğilim, doğrudan sahiplenmenin yasak olduğu yönündedir.", source: "Outer Space Treaty Madde II" },
    { keywords: ["ost","madde1","insanlik","yarar"], q: "OST Madde I — İnsanlığın Yararı İlkesi nedir?", content: "Dış Uzay Antlaşması Madde I, uzay keşfi ve kullanımının ayırım gözetmeksizin tüm ülkelerin yararına ve çıkarına yürütülmesi gerektiğini öngörür. Uzay, tüm insanlığın eylem alanıdır (province of all mankind). Bu ilke, gelişmekte olan ülkelerin uzay teknolojilerinden yararlanma hakkının temelini oluşturur.", source: "OST Madde I (1967), UNOOSA" },
    { keywords: ["ost","madde3","uluslararasi","hukuk","uygulanma"], q: "OST Madde III — Uluslararası Hukukun Uzayda Uygulanması nedir?", content: "Madde III, devletlerin uzay faaliyetlerini BM Şartı dahil uluslararası hukuka uygun yürütmesini zorunlu kılar. Bu hüküm, uzayın \"hukukun üstünlüğü\" ilkesinin dışında bir alan olmadığını açıkça teyit eder. Uluslararası Divan kararları ve örf-adet uluslararası hukuku da uzayda geçerlidir.", source: "OST Madde III (1967), ICJ Statüsü" },
    { keywords: ["ost","madde5","astronot","elci","kurtarma"], q: "OST Madde V — Astronotların Elçi Statüsü nedir?", content: "Madde V astronotları \"insanlığın elçileri\" (envoys of mankind) olarak tanımlar. Bir devlet, başka devletin astronotunun tehlikede olduğunu öğrenirse ona her türlü yardımı yapmak zorundadır. Astronotların başka devlet topraklarına veya açık denize acil iniş yapması durumunda derhal ve güvenle iade edilmeleri gerekir.", source: "OST Madde V (1967), Kurtarma Anlaşması (1968)" },
    { keywords: ["ost","madde8","tescil","yargi","kontrol"], q: "OST Madde VIII — Tescil Devletinin Yargı Yetkisi nedir?", content: "Uzay nesnesinin tescilini yapan devlet, o nesne ve üzerindeki personel üzerinde yargı ve kontrol yetkisini korur. Bu yetki uzay nesnesi başka bir devletin mülkiyetine geçse bile tescil devletinde kalmaya devam eder. Aynı zamanda uzay nesnesinin yol açtığı zararlarda birincil sorumlu da tescil devletidir.", source: "OST Madde VIII (1967)" },
    { keywords: ["ost","madde9","danisma","zararlı","mudahale"], q: "OST Madde IX — Danışma Yükümlülüğü nedir?", content: "Bir devlet başka bir devletin uzay faaliyetlerine zararlı müdahale yaratacağına inandığı bir faaliyet yürütmek isterse, o devletle uluslararası danışma sürecini başlatmak zorundadır. Aynı şekilde herhangi bir devlet, bir faaliyetin kendi uzay faaliyetlerine zarar verdiğini düşünüyorsa danışma talep etme hakkına sahiptir. Mekanizma yaptırımsız olduğu için pratikte çok az kullanılmıştır.", source: "OST Madde IX (1967), COPUOS" },
    { keywords: ["ost","madde11","bilgi","paylasimi","aciklama"], q: "OST Madde XI — Uzay Faaliyetlerinin Kamuoyuna Duyurulması nedir?", content: "Taraf devletler, uzaydaki faaliyetlerinin niteliği, seyri, yerleri ve sonuçları hakkında mümkün olduğu ölçüde kamuoyunu ve BM Genel Sekreteri'ni bilgilendirmekle yükümlüdür. Bu şeffaflık yükümlülüğü, özellikle Ay kaynaklarına yönelik ticari faaliyetlerde uygulama kapsamı bakımından tartışma konusu olmaktadır.", source: "OST Madde XI (1967)" },
    { keywords: ["sorumluluk","1972","kusursuz","mutlak","yer"], q: "Sorumluluk Sözleşmesi — Yeryüzü Zararlarında Mutlak Sorumluluk nedir?", content: "1972 tarihli Uzay Nesnelerinin Yol Açtığı Zararlar İçin Uluslararası Sorumluluk Sözleşmesi, bir uzay nesnesinin Dünya yüzeyine veya uçuş halindeki bir hava aracına zarar vermesi durumunda fırlatan devletin kusursuz (mutlak) sorumluluğunu öngörür. Buna göre herhangi bir ihmal veya kusur kanıtlanmasına gerek yoktur; zararın varlığı yeterlidir. Bu ilkenin fiilen uygulandığı tek örnek 1978 yılında Kanada'ya düşen Sovyet nükleer uydusudur (Kosmos 954).", source: "Sorumluluk Sözleşmesi Madde II (1972), UNTS Vol. 961" },
    { keywords: ["kosmos954","nukleer","tazminat","kanada","sovyet"], q: "Kosmos 954 Davası ve Tazminat nedir?", content: "1978 yılında Sovyetler Birliği'ne ait Kosmos 954 nükleer güçlü uydusu Kuzey Kanada'ya düşmüş ve radyoaktif serpinti yaratmıştır. Kanada, Sorumluluk Sözleşmesi kapsamında 6 milyon Kanada doları tazminat talep etmiş; Sovyetler 3 milyon dolar ödeyerek uzlaşmıştır. Bu dava, Sözleşme'nin uzlaşmayla sonuçlanan tek örneği olup kusursuz sorumluluk ilkesinin pratikte nasıl işlediğini göstermektedir.", source: "Kanada-SSCB Uzlaşması (1981), Sorumluluk Sözleşmesi" },
    { keywords: ["sorumluluk","uzayda","carpısma","kusur","iki"], q: "Sorumluluk Sözleşmesi — Uzaydaki Çarpışmalarda Kusur Sorumluluğu nedir?", content: "Sözleşmenin III. Maddesi, iki uzay nesnesi arasındaki çarpışmada (her iki nesne de yeryüzünde olmadığında) fırlatan devletin yalnızca kusuru oranında sorumlu olduğunu öngörür. Bu durum mutlak sorumluluktan farklı olup ispat yükü tazminat talep eden devlettedir. 2009 Iridium-Kosmos çarpışması bu kuralın uygulanabileceği en önemli pratik örnek olmakla birlikte devletler arasında resmi bir dava açılmamıştır.", source: "Sorumluluk Sözleşmesi Madde III (1972)" },
    { keywords: ["kurtarma","1968","anlaşma","inisiyatif","iade"], q: "Kurtarma Anlaşması (1968) nedir?", content: "1968 tarihli Astronotların Kurtarılması, Astronotların İadesi ve Uzaya Fırlatılan Nesnelerin İadesi Anlaşması, OST Madde V'i somutlaştırır. Bir devlet astronotun kurtarılmasına ihtiyaç duyduğunu haber alırsa derhal arama-kurtarma operasyonu başlatmak zorundadır. Kurtarma masrafları kurtarılan devletten talep edilemez. Ayrıca başka bir devletin topraklarında inen uzay nesnesi, talep üzerine fırlatan devlete iade edilmelidir.", source: "Rescue Agreement (1968), UNTS Vol. 672" },
    { keywords: ["tescil","1975","bm","unoosa","nesne"], q: "Tescil Sözleşmesi (1975) nedir?", content: "1975 tarihli Uzaya Fırlatılan Nesnelerin Tesciline İlişkin Sözleşme, devletlerin fırlattıkları uzay nesnelerini BM Genel Sekreterliği'ne kayıt ettirmesini zorunlu kılar. Tescil bilgileri UNOOSA'nın (BM Dış Uzay İşleri Ofisi) çevrimiçi sicilinde kamuya açıktır. Sözleşme, 2021 itibarıyla 70'ten fazla devlet tarafından onaylanmıştır. Özel şirketlerin uyduları da bulunduğu devlet üzerinden tescil edilmek zorundadır.", source: "Registration Convention (1975), UNOOSA Online Index" },
    { keywords: ["ay","anlasmasi","1979","ortak","miras","madde11"], q: "Ay Anlaşması Madde 11 — Ortak Miras Rejimi nedir?", content: "Ay Anlaşması'nın 11. Maddesi Ay'ı ve doğal kaynaklarını \"insanlığın ortak mirası\" (common heritage of mankind) olarak tanımlar. Bu çerçevede kaynakların sömürülmesine başlanmadan önce tüm insanlığın çıkarlarını güvence altına alacak uluslararası bir rejimin oluşturulması öngörülmektedir. Ne var ki ABD, Rusya ve Çin başta olmak üzere büyük uzay güçlerinin hiçbiri anlaşmayı onaylamamış; bu durum rejimi işlevsiz kılmıştır.", source: "Moon Agreement Madde 11 (1979), UNOOSA" },
    { keywords: ["ay","anlasmasi","taraf","imza","kac"], q: "Ay Anlaşması'nı kaç ülke imzalamıştır?", content: "2024 itibarıyla Ay Anlaşması yalnızca 18 devlet tarafından onaylanmıştır. Bu devletlerin tamamı insanlı uzay programına sahip olmayan veya küçük uzay programlarına sahip ülkelerdir. Avustralya anlaşmayı imzalamış olmakla birlikte 2020'de imzaladığı Artemis Anlaşmaları ile Ay Anlaşması'nın \"ortak miras\" yorumundan uzaklaşmıştır.", source: "UNOOSA Treaty Database (2024)" },
    { keywords: ["artemis","anlasmalar","ilkeler","sektor","ozel"], q: "Artemis Anlaşmaları — Temel İlkeler nedir?", content: "2020 yılında NASA öncülüğünde imzalanmaya başlanan Artemis Anlaşmaları bağlayıcı bir antlaşma değil, ikili taahhüt beyanları niteliğindedir. Sekiz temel ilkesi vardır: barışçıl amaçlar, şeffaflık, birlikte çalışabilirlik, acil durum yardımı, uzay nesnelerinin kaydı, bilimsel verilerin yayımlanması, tarihi alanların korunması ve güvenlik bölgeleri. 2024 itibarıyla 45'ten fazla devlet imzalamıştır.", source: "NASA Artemis Accords (2020), Section 10-11" },
    { keywords: ["artemis","guvenlik","bolge","exclusion","alan"], q: "Artemis Anlaşmaları — Güvenlik Bölgeleri nedir?", content: "Anlaşmaların 11. Bölümü, operasyonların güvenliğini sağlamak amacıyla diğer aktörlerin faaliyetlerinden makul ölçüde uzak durulmasını öngören \"güvenlik bölgeleri\" (safety zones) kavramını getirmiştir. Bu kavram, OST'nin egemenlik yasağıyla çelişip çelişmediği bakımından uluslararası hukuk akademisyenleri arasında derin tartışma yaratmaktadır. Eleştirmenler, güvenlik bölgelerinin fiilen münhasır kullanım alanı oluşturduğunu ileri sürmektedir.", source: "Artemis Accords Section 11 (2020), IISL Opinion" },
    { keywords: ["artemis","tarihsel","alan","koruma","apollo"], q: "Artemis Anlaşmaları — Tarihi Alanların Korunması nedir?", content: "Anlaşmaların 9. Bölümü imzacı devletleri uzaydaki insan faaliyetlerinin tarihi izlerini korumaya davet etmektedir. Apollo iniş alanları, Voyager sondaları ve Ay'daki ilk araçlar gibi tarihsel değer taşıyan nesnelerin korunması bağlamında değerlendirilmektedir. Bu yükümlülüğün uygulamada nasıl hayata geçirileceği henüz tanımlanmamıştır.", source: "Artemis Accords Section 9 (2020)" },
    { keywords: ["copuos","yasal","teknik","alt","komite"], q: "COPUOS Alt Komiteleri nedir?", content: "BM Dış Uzayın Barışçıl Kullanımı Komitesi (COPUOS) iki alt komiteden oluşur: Bilimsel ve Teknik Alt Komite (uzay çöpü, uzay hava durumu, gezegensel savunma gibi konular) ve Hukuki Alt Komite (antlaşma yorumları, yeni hukuki çerçeveler, kaynakların kullanımı gibi konular). Her yıl Viyana'da toplanan COPUOS kararları bağlayıcı olmayıp tavsiye niteliği taşır.", source: "COPUOS Rules of Procedure, UNOOSA" },
    { keywords: ["unoosa","gorev","viyana","ofis"], q: "UNOOSA — BM Dış Uzay İşleri Ofisi nedir?", content: "Viyana'da bulunan UNOOSA (United Nations Office for Outer Space Affairs), COPUOS sekretaryasını yürütür, uzay antlaşmalarının uygulanmasını izler ve uzay teknolojilerinin kalkınma amaçlı kullanımı için kapasite geliştirme programları yönetir. UNOOSA aynı zamanda tüm tescil edilmiş uzay nesnelerinin kamuya açık veri tabanını tutar.", source: "UNOOSA Mandate, GA Resolution 1348 (XIII)" },
    { keywords: ["itu","radyo","yorunge","slot","jeostasyoner"], q: "ITU — Jeostasyoner Yörünge Slotları ve Frekans Tahsisi nedir?", content: "Uluslararası Telekomünikasyon Birliği (ITU), jeostasyoner yörüngede (GEO) her ülkenin kullanabileceği slot ve radyo frekanslarını yönetir. Slotlar \"ilk gelen alır\" değil, koordinasyon prosedürüne göre tahsis edilir. Tahsis edilen slotun yedi yıl içinde kullanılmaması \"Kullan ya da Kaybet\" kuralı gereği iptal edilebilir. Bu kaynak sınırlılığı özellikle gelişmekte olan ülkeler açısından önemli bir hakkaniyet meselesi doğurmaktadır.", source: "ITU Radio Regulations Article 22, Resolution 86" },
    { keywords: ["itu","kullan","kaybet","slot","iptal"], q: "ITU \"Kullan ya da Kaybet\" Kuralı nedir?", content: "ITU'nun \"bring into use\" (kullanıma alma) zorunluluğu çerçevesinde, bir devlet tahsis edilen radyo frekansı ve yörünge slotunu yedi yıl içinde gerçek ve sürekli bir yayın veya hizmetle kullanıma almak zorundadır. Kullanılmayan slotlar sicilden silinerek yeniden koordinasyona açılır. Bu kural \"kâğıt uydu\" (paper satellite) sorunuyla mücadele etmek amacıyla getirilmiştir.", source: "ITU Radio Regulations No. 11.44 (2016 rev.)" },
    { keywords: ["uzay","copu","iadc","kilavuz","azaltma"], q: "IADC Uzay Çöpü Azaltma Kılavuzu nedir?", content: "Dünya Uzay Ajansları Arası Koordinasyon Komitesi (IADC) 2002 yılında uzay çöpünü azaltmaya yönelik teknik kılavuz yayımlamıştır. Bu kılavuz: görev sonrasında alçak Dünya yörüngesindeki (LEO) nesnelerin 25 yıl içinde atmosfere girmesini, jeostasyoner nesnelerin ise mezarlık yörüngesine taşınmasını önermektedir. BM COPUOS 2007'de bu kılavuzu benimsemiş ancak bağlayıcılık kazandıramamıştır.", source: "IADC Space Debris Mitigation Guidelines (2002, rev. 2007), UN A/62/20" },
    { keywords: ["uzay","copu","rakam","istatistik","kac"], q: "Uzaydaki enkaz miktarı ne kadardır?", content: "ESA'nın 2024 yılı raporuna göre yaklaşık 35.000'den fazla 10 cm'den büyük nesne izlenmekte, 1 cm'den büyük tahminî nesne sayısı ise 1 milyonu aşmaktadır. Parçacık sayısının milyar düzeyinde olduğu tahmin edilmektedir. En yoğun enkaz kuşakları 400-600 km ve 900-1000 km yükseklerindedir. Kessler Sendromu adı verilen domino etkisi riski nedeniyle LEO'nun uzun vadeli sürdürülebilirliği ciddi biçimde tehdit altındadır.", source: "ESA Space Debris Environment Report (2024)" },
    { keywords: ["kessler","sendromu","domino","leorisik"], q: "Kessler Sendromu nedir?", content: "1978'de NASA bilim insanı Donald Kessler tarafından tanımlanan senaryo, alçak Dünya yörüngesindeki enkaz yoğunluğunun belirli bir eşiği aştığında çarpışmaların yeni enkaz yarataçağını ve bu döngünün kontrol edilemez hale gelebileceğini öngörmektedir. Bu durumda LEO onlarca yıl boyunca uzay faaliyetleri için kullanılamaz hale gelebilir. Sorun, uzay çöpü konusundaki uluslararası hukuki düzenlemelerin ivedilik kazanmasının başlıca gerekçesidir.", source: "Kessler & Cour-Palais, J. Geophysical Research (1978), ESA" },
    { keywords: ["aktif","enkaz","kaldirma","adr","hukuk"], q: "Aktif Enkaz Kaldırma (ADR) Hukuki Durumu nedir?", content: "Başka bir devlete ait işlevsiz uydunun izin alınmadan yörüngeden kaldırılması, OST Madde VIII uyarınca tescil devletinin mülkiyet ve kontrol haklarını ihlal edecektir. Bu nedenle ADR operasyonları için önceden ikili anlaşma veya açık izin alınması gerekmektedir. ESA'nın ClearSpace-1 (2026) ve Astroscale gibi özel şirketlerin ADRAS-J gibi projeleri bu hukuki çerçeveyi test edecek niteliktedir.", source: "OST Madde VIII, ESA ClearSpace-1 Programme (2024)" },
    { keywords: ["abd","commercial","space","launch","1984","cslca"], q: "ABD Ticari Uzay Fırlatma Yasası (1984) nedir?", content: "1984 tarihli Commercial Space Launch Act, ABD'de özel sektörün ticari fırlatma yapabilmesinin önünü açmıştır. Yasa, Federal Havacılık İdaresi'ni (FAA) bu faaliyetleri lisanslamakla yetkili kılmıştır. 1988, 2004, 2010 ve 2015 yıllarında kapsamlı değişikliklere uğramış; 2015 değişikliği ile ABD vatandaşlarına uzay kaynaklarına mülkiyet hakkı tanınmıştır.", source: "Commercial Space Launch Act (1984), 51 U.S.C. Chapter 509" },
    { keywords: ["faa","asc","lisans","spaceport","firlatma"], q: "FAA Uzay Fırlatma Lisansı nedir?", content: "ABD'de SpaceX, Rocket Lab, Blue Origin gibi şirketler ticari fırlatma için FAA'nın Uzay Ticaret Ofisi (AST)'nden lisans almak zorundadır. Lisans başvurusu güvenlik değerlendirmesi, çevresel etki analizi ve mali sorumluluk sigortasını kapsar. Fırlatma sonrası olası üçüncü şahıs zararları için operatörün belirli miktarda sigorta yaptırması yasal zorunluluktur.", source: "FAA Office of Commercial Space Transportation, 14 CFR Part 460" },
    { keywords: ["spaceact","2015","kaynak","mulkiyet","asteroid"], q: "ABD SPACE Act 2015 — Kaynak Mülkiyeti nedir?", content: "2015 tarihli U.S. Commercial Space Launch Competitiveness Act'in 51303. Maddesi, bir ABD vatandaşı veya şirketinin uzaydan çıkardığı kaynağa sahip olabileceğini, bunu kullanabileceğini, satabiliceğini ve devredebileceğini hükme bağlamıştır. Yasa ayrıca bu düzenlemenin OST'yi ihlal etmediğini özellikle belirtmektedir. Bu düzenleme uluslararası arenada önemli tepkilere yol açmış; \"kaynak sahipliği meşrudur ama egemenlik yasağını aşmaz\" tartışmasını resmen başlatmıştır.", source: "51 U.S.C. § 51303, Commercial Space Launch Competitiveness Act (2015)" },
    { keywords: ["national","space","policy","uzay","politikasi"], q: "ABD Ulusal Uzay Politikası nedir?", content: "ABD, düzenli aralıklarla Ulusal Uzay Politikası belgesi yayımlamaktadır. 2020 tarihli belge, ABD'nin uzayda liderliğini sürdürme, ticari uzay sektörünü destekleme ve uydu altyapısını koruma önceliklerini belirlemiştir. 2022 tarihli Ulusal Uzay Güvenlik Stratejisi ise devlet uydularına yönelik tehditlerle mücadele mekanizmalarını ele almaktadır.", source: "White House National Space Policy (2020), NSSS (2022)" },
    { keywords: ["rusya","uzay","kanun","1993","faaliyetler"], q: "Rusya Uzay Faaliyetleri Kanunu (1993) nedir?", content: "1993 tarihli Rusya Federasyonu Uzay Faaliyetleri Kanunu, uzay operasyonlarının lisanslanmasını, devlet gözetimini ve uluslararası antlaşmalar kapsamındaki devlet sorumluluğunu düzenlemektedir. Özel şirketlerin faaliyetlerine izin vermekle birlikte Roscosmos'a güçlü bir denetim yetkisi tanımaktadır. 2014 ve 2016'da yapılan değişikliklerle ticari fırlatma lisanslama sistemi güncellenmiştir.", source: "Federal Law No. 5663-1 (1993, rev. 2016), Roscosmos" },
    { keywords: ["cin","cnsa","uzay","duzenlemeler","yonetmelik"], q: "Çin Uzay Faaliyetleri Düzenlemeleri nedir?", content: "Çin'de uzay faaliyetleri çeşitli yönetmeliklerle düzenlenmekte olup tek bir kapsamlı uzay yasası henüz mevcut değildir. 2001 tarihli Sivil Uzay Faaliyetleri Yönetimi Yönetmeliği, sivil uydu operatörlerini ve fırlatmaları kapsamaktadır. Çin, Uluslararası Ay Araştırma İstasyonu (ILRS) projesini Rusya ile birlikte yürütmekte ve Artemis Anlaşmaları'na alternatif bir çerçeve oluşturmayı hedeflemektedir.", source: "CNSA Civil Space Activities Regulation (2001), ILRS Roadmap (2021)" },
    { keywords: ["luksemburg","kaynak","kanun","2017","mülkiyet"], q: "Lüksemburg Uzay Kaynakları Kanunu (2017) nedir?", content: "2017 tarihli Lüksemburg \"SpaceResources\" Kanunu, uzaydan çıkarılan kaynakların mülkiyetini şirkete tanıyan Avrupa'daki ilk ulusal düzenlemedir. ABD'den farklı olarak Lüksemburg bu hakkı yalnızca kendi vatandaşlarıyla sınırlamamıştır. Aynı zamanda \"Space Resources Initiative\" çerçevesinde uluslararası şirketlere Lüksemburg'da lisans almayı teşvik etmektedir. Bu model AB ülkeleri arasında tartışma yaratmıştır.", source: "Luxembourg Law of 20 July 2017 on the Exploration and Use of Space Resources" },
    { keywords: ["stm","uzay","trafik","yonetimi","kural"], q: "Uzay Trafik Yönetimi (STM) Nedir?", content: "Uzay Trafik Yönetimi, yörüngedeki nesnelerin çarpışma riskini azaltmak için uygulanan teknik ve hukuki çerçeve bütünüdür. Henüz bağlayıcı bir uluslararası STM rejimi yoktur. ABD'de Uzay Kuvvetleri'ne bağlı 18. Uzay Kontrol Filosu tüm nesneleri izleyerek çarpışma uyarısı vermektedir. Avrupa Komisyonu da kendi SSA (Uzay Gözetleme ve İzleme) programını yürütmektedir.", source: "EU Space Surveillance and Tracking (SST), US SFOR 18th SCS, OECD STM Report (2020)" },
    { keywords: ["konjunksyon","uyari","carpısma","risk","manevra"], q: "Konjunksyon Uyarısı ve Çarpışma Kaçınma nedir?", content: "İki uzay nesnesi birbirine 1 km'nin altında yaklaşacağı tahmin edildiğinde \"konjunksyon\" uyarısı üretilir. Uyarı eşiğini aşan durumlarda operatörden kaçınma manevrası yapması beklenir, ancak bunu zorunlu kılan bağlayıcı bir uluslararası kural yoktur. 2009'daki Iridium 33 – Kosmos 2251 çarpışması, kaçınma manevrasının gerçekleşmemesinin yol açabileceği sonuçları somut biçimde ortaya koymuştur.", source: "NASA Orbital Debris Quarterly News, ESA Space Debris Office" },
    { keywords: ["paros","silahlanma","onleme","uzay","bm"], q: "PAROS — Uzayda Silahlanma Yarışının Önlenmesi nedir?", content: "PAROS (Prevention of an Arms Race in Outer Space), BM Silahsızlanma Konferansı'nda 1981'den bu yana gündemde olan bir müzakere başlığıdır. OST, yalnızca kitle imha silahlarının yörüngeye yerleştirilmesini yasaklamakta; konvansiyonel silahları ve çift kullanımlı sistemleri kapsam dışı bırakmaktadır. Rusya ve Çin'nin önerdiği PPWT antlaşması taslağı (2008, 2014) ABD tarafından denetim mekanizması yetersizliği gerekçesiyle reddedilmiştir.", source: "UN CD/1839, PPWT Draft Treaty (2014), UNIDIR" },
    { keywords: ["asat","test","enkaz","yasaklama","uzay"], q: "ASAT Testleri ve Uluslararası Hukuk nedir?", content: "Uydu karşıtı (ASAT) silahlar OST Madde IV'te doğrudan yasaklanmamaktadır. ABD (2008), Çin (2007), Hindistan (2019) ve Rusya (2021) ASAT testleri gerçekleştirmiştir. Her test büyük miktarda uzay enkazı üretmiştir. 2022'de ABD \"doğrudan çıkış ASAT testlerine\" yönelik tek taraflı moratoryum ilan etmiş ve diğer devletleri aynı taahhüde davet etmiştir. Bu adım bağlayıcı olmasa da norm oluşturma süreci açısından önemlidir.", source: "US ASAT Moratorium (2022), UN A/RES/77/41, UNIDIR" },
    { keywords: ["iss","iga","hukuku","1998","taraf"], q: "ISS Hükümetlerarası Anlaşması (IGA 1998) nedir?", content: "1998 tarihli ISS Hükümetlerarası Anlaşması, istasyonun işletimi için ABD, Rusya, Japonya, Kanada ve ESA üyesi Avrupa ülkelerini kapsayan çok taraflı hukuki çerçeveyi oluşturmaktadır. IGA, her modül üzerinde ilgili devletin yargı yetkisini belirlemiş; fikri mülkiyet hakları, vergi muafiyeti ve hukuki sorumluluk konularında özel hükümler içermektedir. Suç takibatında ise failin vatandaşı olduğu devlet yetkili kabul edilmiştir.", source: "ISS Intergovernmental Agreement (1998), NASA Legal Office" },
    { keywords: ["iss","ticari","faaliyet","reklam","turizm"], q: "ISS'de Ticari Faaliyetler nedir?", content: "NASA, 2019 yılında ISS'de ticari faaliyetlere kapsamlı biçimde izin vermiştir. Bu çerçevede özel sektör astronotları (Axiom Space misyonları), ticari üretim, Dünya görüntüleme ve hatta sınırlı reklam faaliyetlerine olanak tanınmıştır. Ticari faaliyetler NASA'nın ISS kullanım politikasına ve IGA çerçevesine uymak zorundadır. Axiom Space'in kendi ticari modülünü ISS'e eklemesi, ilerleyen süreçte özel uzay istasyonu hukukunun ilk pratik testini oluşturacaktır.", source: "NASA Commercial ISS Utilization Policy (2019), Axiom Space CDR" },
    { keywords: ["cospar","gezegensel","koruma","kategori","steril"], q: "COSPAR Gezegensel Koruma Politikası nedir?", content: "COSPAR (Uzay Araştırmaları Komitesi), gezegenler arası kontaminasyonu önlemek için beş kategorili bir politika belirlemiştir. Kategori I (Merkür gibi): özel gereksinim yok. Kategori IV ve V: Mars gibi gezegenler için biyolojik yük sınırları ve sterilizasyon zorunluluğu. Bu politika bağlayıcı değildir; ancak NASA, ESA ve JAXA gibi ajanslar büyük ölçüde uymaktadır. Özel ticari görevlerin bu politikaya uyum zorunluluğu ise tartışmalıdır.", source: "COSPAR Policy on Planetary Protection (2017 rev.), COSPAR/IAF" },
    { keywords: ["ileri","kirlenme","forward","kontaminasyon","mars"], q: "İleri Kirlenme (Forward Contamination) nedir?", content: "Dünya'dan başka bir gök cismine mikroorganizma taşınması \"ileri kirlenme\" olarak adlandırılır. Bu risk özellikle Mars'ta mevcut veya geçmişteki yaşam izlerinin tespit edilmesini imkânsız kılabileceğinden kritik önem taşır. OST Madde IX devletlerin zararlı kirlenmeyi önlemesi yükümlülüğünü öngörmektedir; ancak bu yükümlülüğün ticari aktörler için nasıl uygulanacağı belirsizliğini korumaktadır.", source: "COSPAR Category IV/V, OST Madde IX, NASA Office of Planetary Protection" },
    { keywords: ["geri","kirlenme","back","kontaminasyon","dunya"], q: "Geri Kirlenme (Back Contamination) nedir?", content: "Başka bir gök cisminden Dünya'ya getirilecek örneklerin bilinmeyen biyolojik ajanlar içerebilmesi riski \"geri kirlenme\" olarak adlandırılır. Bu nedenle Mars örnekleri için katı karantina önlemleri planlanmaktadır. NASA ve ESA'nın Mars Örnek Geri Dönüşü (MSR) programı, Dünya'da özel bir karantina tesisi inşasını gerektirmektedir. Apollo sonrası astronotlara uygulanan 21 günlük karantina pratikte bu kaygının ilk örneğidir.", source: "COSPAR Category V, ESA/NASA MSR Campaign (2024), NASA Curation" },
    { keywords: ["fikri","mulkiyet","uzay","patent","iga","modul"], q: "Uzayda Fikri Mülkiyet — ISS Patent Kuralı nedir?", content: "ISS IGA'nın 21. Maddesi, bir modülde gerçekleştirilen icadın patent uygulaması bakımından o modülün tescil devletinin topraklarında gerçekleşmiş sayılacağını öngörmektedir. Örneğin NASA'nın ABD modülünde yapılan bir icat ABD patent hukukuna, JAXA modülünde yapılan ise Japon patent hukukuna tabi olacaktır. Bu kural, çok uluslu mürettebatın birlikte çalıştığı projelerde karmaşık fikri mülkiyet sorunlarına yol açabilmektedir.", source: "ISS IGA Madde 21 (1998), WIPO Space IP Guide" },
    { keywords: ["wipo","uzay","telif","veri","bant"], q: "WIPO ve Uzaydan Elde Edilen Veriler nedir?", content: "WIPO (Dünya Fikri Mülkiyet Örgütü), uydu verilerinin telif hukuku kapsamında değerlendirilmesine ilişkin kapsamlı çalışmalar yürütmüştür. Ham uydu görüntüleri pek çok ülkede telif korumasından yararlanmamakla birlikte, bu verilere eklenen yorumlama, analiz veya metadata katmanları koruma kapsamına girebilmektedir. Uzayda üretilen verinin sahipliği ve erişim hakları, gelecekteki en önemli ticari hukuk tartışmalarından biri olmaya adaydır.", source: "WIPO Studies on Intellectual Property and Space Activities (2004, 2012)" },
    { keywords: ["uzay","turizmi","faa","katilimci","feragat"], q: "Uzay Turizmi Hukuku — FAA Çerçevesi nedir?", content: "ABD'de ticari uzay turizmi 14 CFR Part 460 ile düzenlenmektedir. Yolcular \"uzay uçuşu katılımcısı\" (space flight participant) olarak tanımlanmış ve astronot kapsamından çıkarılmıştır. Yolcuların uçuş öncesinde riskleri anlayan aydınlatılmış onay (informed consent) formu imzalaması zorunludur. Operatörün ağır kusuru veya kasıtlı haksız fiilini kapsayan zararlar için ise bu feragatname geçersiz sayılmaktadır.", source: "FAA 14 CFR Part 460, Commercial Space Launch Competitiveness Act Sec. 50905" },
    { keywords: ["uzay","otel","axiom","commercial","istasyon"], q: "Ticari Uzay İstasyonları — Axiom Space nedir?", content: "Axiom Space, önce ISS'e bağlı bir ticari modül ekleyen, ardından bağımsız bir ticari uzay istasyonu işleten ilk özel şirket olmayı hedeflemektedir. NASA, 2021'de Axiom'a ISS'e modül ekleme sözleşmesi vermiştir. Bağımsız bir ticari istasyonun uluslararası hukuki statüsü, tescil sözleşmesi kapsamındaki yükümlülükleri ve içindeki faaliyetlere hangi devletin hukukunun uygulanacağı henüz netleşmemiş sorular arasındadır.", source: "NASA Axiom Station NRA (2020), CASIS Utilization Agreement" },
    { keywords: ["siber","uzay","tallinn","3.0","uydu"], q: "Tallinn El Kitabı — Uzay Siber Operasyonları nedir?", content: "NATO Siber Savunma Mükemmellik Merkezi tarafından hazırlanan Tallinn El Kitabı (son güncelleme 2017), siber operasyonlara uygulanan uluslararası hukuk kurallarını yorumlamaktadır. Uzay varlıklarına yönelik siber saldırılar değerlendirme açısından zorluk doğurmaktadır: bir uyduyu geçici olarak işlevsiz kılmak \"kuvvet kullanma\" eşiğini aşar mı? Devre dışı bırakma ile imha arasındaki fark nasıl tanımlanır? Bu sorular uluslararası hukuk akademisyenleri tarafından aktif biçimde tartışılmaktadır.", source: "Tallinn Manual 2.0 (2017), NATO CCDCOE" },
    { keywords: ["uydu","siber","saldiri","kuvvet","kullanma","esik"], q: "Uyduya Siber Saldırı — Kuvvet Kullanma Eşiği nedir?", content: "Uluslararası hukukta bir uyduya yönelik siber saldırının \"silahlı saldırı\" (armed attack) sayılabilmesi için BM Şartı Madde 2/4 ve 51 çerçevesinde değerlendirilmesi gerekmektedir. Saldırının fiziksel hasar yaratıp yaratmadığı, can kayıplarına neden olup olmadığı ve altyapıya verdiği zarar düzeyi belirleyici faktörler olarak öne çıkmaktadır. 2022 Viasat saldırısı (Ukrayna-Rusya çatışması bağlamında) uluslararası hukukçuların bu soruyu somut bir olay üzerinden tartışmasına zemin hazırlamıştır.", source: "BM Şartı Madde 2/4 ve 51, Tallinn Manual 2.0, Viasat Incident Analysis (2022)" },
    { keywords: ["uzay","gunes","enerjisi","sbsp","mikrodalga"], q: "Uzay Tabanlı Güneş Enerjisi (SBSP) nedir?", content: "Uzay Tabanlı Güneş Enerjisi (Space-Based Solar Power), jeostasyoner yörüngede devasa güneş panelleri aracılığıyla enerji toplayarak bunu mikrodalga veya lazerle Dünya'ya iletmeyi öngören teknolojidir. ESA'nın SOLARIS programı ve Japonya'nın JAXA planları bu alandaki başlıca devlet projelerini oluşturmaktadır. Hukuki boyutu: iletim koridorları ITU frekans düzenlemelerine ve ICAO hava sahası kurallarına tabi olacaktır. Herhangi bir kazada sorumluluk ise Sorumluluk Sözleşmesi kapsamında değerlendirilecektir.", source: "ESA SOLARIS Initiative (2022), JAXA SBSP Roadmap, ITU Radio Regulations" },
