    { keywords: ["bae","emirates","uzay","hope"], q: "BAE Uzay Programı — Hope Mars Misyonu ve Yasal Çerçeve nedir?", content: "Birleşik Arap Emirlikleri 2014'te kurulan UAE Uzay Ajansı ile bölgenin en gelişkin uzay programına sahiptir. Hope Mars Sondası Şubat 2021'de Mars yörüngesine başarıyla girerek tüm Arap dünyasının ilk gezegenler arası misyonu olmuştur. BAE'nin 2019 tarihli Federal Uzay Ajansı Kanunu ticari faaliyetlerin lisanslanması, devletin uluslararası antlaşma sorumluluklarının yerine getirilmesi ve uzay teknoloji transferini düzenlemektedir. BAE aynı zamanda Artemis Anlaşmaları'nı imzalayan Orta Doğu'daki ilk ülkedir.", source: "UAE Federal Decree-Law No. 12 of 2019 on the UAE Space Agency, MBRSC Hope Probe Mission Report (2021), Artemis Accords Signatory List, UAE Space Economy Report (2023)" },
    { keywords: ["hindistan","isro","chandrayaan","uzay"], q: "Hindistan Uzay Programı ve Yasal Çerçeve nedir?", content: "ISRO 1969'da kurulan ve doğrudan Başbakanlık'a bağlı bir devlet kurumudur. Hindistan uzun süredir tartışılan Uzay Faaliyetleri Yasa Tasarısı'nı henüz yasalaştıramamıştır; bu boşluk özel sektörün lisanslama prosedürlerini belirsizleştirmektedir. 2023'te NewSpace India Limited aracılığıyla OneWeb uyduları Sriharikota'dan fırlatılmıştır. 23 Ağustos 2023'te Chandrayaan-3'ün Ay güney kutbuna yumuşak inişi gerçekleştirmesi, güney kutbuna inen ilk araç olma özelliği taşımakta ve bölgesel su buzu erişim tartışmalarını alevlendirmektedir.", source: "ISRO Act (1969), NSIL Articles of Association (2019), Space Activities Bill Draft (2017), Chandrayaan-3 Mission Report ISRO (2023)" },
    { keywords: ["global","commons","ortak","alan"], q: "Küresel Ortak Alanlar Hukuku ve Uzay Karşılaştırması nedir?", content: "Uluslararası hukukta dört küresel ortak alan bulunmaktadır: açık denizler UNCLOS, uluslararası hava sahası Chicago Konvansiyonu, Antarktika Antarktika Antlaşması 1959 ve dış uzay OST. Her biri farklı hukuki rejime tabidir. Antarktika'da hem egemenlik hem askeri faaliyetler donmuş durumdadır; derin deniz yatağı Uluslararası Deniz Yatağı Otoritesi tarafından ortak miras ilkesiyle yönetilmektedir. Uzay, ortak miras rejimini kabul eden Ay Anlaşması büyük güçlerce reddedildiğinden fiilen en az yönetilen küresel alan konumundadır.", source: "Antarctic Treaty (1959), UNCLOS Madde 136 (1982), Chicago Convention (1944), OST (1967), Keating The Four Global Commons (2013)" },
    { keywords: ["turkiye","uzay","mevzuat","bosluk"], q: "Türkiye'de Uzay Hukuku Mevzuatı Boşlukları nedir?", content: "Türkiye OST'yi 1968'de, Sorumluluk Sözleşmesi'ni 1975'te ve Tescil Sözleşmesi'ni 1977'de onaylamıştır. TUA'nın kuruluş kararnamesi Sayı 23, 2018 idari yapıyı belirlemektedir. Ancak Türkiye'nin henüz kapsamlı bir ulusal uzay kanunu bulunmamaktadır: ticari fırlatma lisanslama prosedürleri, üçüncü şahıs sorumluluk sigortası gereklilikleri, Türk uzay şirketlerinin yabancı ülkelerde tescil ettirdiği uydular üzerindeki denetim standartları ve ticari uzay madenciliği konularında yasal boşluklar mevcuttur. UK Space Industry Act 2018 ve Lüksemburg Space Resources Law model alınabilir.", source: "T.C. Resmi Gazete Cumhurbaskanligi Kararnamesi Sayi 23 (2018), UNOOSA Treaty Status, TUA Stratejik Plan, UK Space Industry Act 2018 karsilastirmali" },
    { keywords: ["turksat","6a","yerli","2024"], q: "Türksat 6A — Türkiye'nin İlk Yerli Haberleşme Uydusu nedir?", content: "Türksat 6A TÜRKSAT ve TUSAŞ tarafından yerli imkânlarla geliştirilen Türkiye'nin ilk milli haberleşme uydusudur. 8 Temmuz 2024'te SpaceX Falcon 9 roketi ile Cape Canaveral SLC-40'tan fırlatılmıştır. Yaklaşık 3.500 kg ağırlığında olup 42 doğu boylam yörünge pozisyonunda ITU kaydına sahiptir. Bu proje Türkiye'nin uydu platformu teknolojisinde dışa bağımlılığını azaltma ve uluslararası ticari uydu pazarına girme stratejisinin somut çıktısıdır.", source: "TURKSAT A.S. Resmi Aciklamasi (Temmuz 2024), TUA Resmi Bulteni, SpaceX Falcon 9 Mission Overview, ITU MIFR Registration" },
    { keywords: ["artemis","turkiye","imza","taahhut"], q: "Türkiye'nin Artemis Anlaşmaları'na Katılımı nedir?", content: "Türkiye Artemis Anlaşmaları'nı 2020 yılında imzalayan ilk 8 devlet arasında yer almaktadır. Bu imza Türkiye'nin ABD liderliğindeki Artemis programıyla uyumlu ilkeler benimsediğini uluslararası arenada tescil etmiştir. Taahhütler: barışçıl amaçlar, şeffaflık, birlikte çalışabilirlik, acil durum yardımı, uzay nesnelerinin kaydı, bilimsel verilerin yayımlanması, tarihi alanların korunması ve güvenlik bölgeleri. TUA'nın Axiom-3 misyon kapsamındaki sözleşmesi bu taahhütlerin pratiğe geçirilmesinin ilk örneğidir.", source: "NASA Artemis Accords Signatories (2020), TUA Resmi Aciklamalari, Artemis Accords Text (2020), ILRS Cooperation Documents" },
    { keywords: ["uzay","hukuku","gelecek","reform"], q: "Uzay Hukukunun Geleceği ve Reform Yolları nedir?", content: "1979'dan bu yana yeni bağlayıcı uzay antlaşması müzakere edilememiştir. Akademisyenler ve COPUOS içinde üç ana reform yolunu tartışmaktadır: (1) Mevcut antlaşmaların yorumunu COPUOS kılavuzları ve BM kararlarıyla güçlendirmek; (2) İkili ve çok taraflı uzlaşmalar — Artemis Anlaşmaları, ILRS çerçevesi gibi mini çoktaraflılık yaklaşımı; (3) Kapsamlı yeni BM antlaşması — ancak büyük güçler arası jeopolitik rekabet bu seçeneği kısa ve orta vadede neredeyse imkânsız kılmaktadır. IISL'nin 2023 kollokyumu uzay yönetişiminin parçalanması senaryosunu somut olarak tartışmıştır.", source: "IISL Colloquium Proceedings (2023), COPUOS Hukuki Alt Komite Son Raporlari, Marchetti Blount The Future of International Space Law (2021), Hobe Schmidt-Tedd Schrogl Cologne Commentary on Space Law Vol. 1-3" },
    { keywords: ["uzay","ekonomi","buyume","2040"], q: "Küresel Uzay Ekonomisi Büyüme Trendleri ve Hukuki Sonuçları nedir?", content: "Space Foundation'ın 2024 raporuna göre küresel uzay ekonomisi 2023'te 570 milyar dolara ulaşmıştır. Morgan Stanley 2040'a kadar 1 trilyon doları aşacağını tahmin etmektedir. Büyümenin başlıca kaynakları: alçak yörünge ticari uydu hizmetleri, uzay turizmi, uzay içi üretim ve gelecekte asteroid madenciliğidir. Bu büyüme hukuki reform baskısını artırmaktadır: yatırım garantileri, ticari uyuşmazlık çözümü, vergilendirme ve rekabet kuralları alanında ulusal ve uluslararası düzenlemelerin güncellenmesi gerekmektedir.", source: "Space Foundation Space Report 2024, Morgan Stanley Space Economy Forecast (2020), OECD The Space Economy in Figures (2022), Goldman Sachs Space Economy Report (2017)" },
    { keywords: ["sputnik","tarih","1957","baslangic"], q: "Sputnik'in Uzay Hukukunun Doğuşuna Etkisi nedir?", content: "4 Ekim 1957'de Sovyetler Birliği'nin fırlattığı Sputnik-1, yaklaşık 184 kg ağırlığında ve 90 dakikada bir Dünya'yı dolanan ilk yapay uyduydu. Sputnik'in tüm devletlerin hava sahasından geçmesine hiçbirinin itiraz etmemesi uzayın serbest geçişini örf-adet hukuku ilkesi olarak tesis eden ilk eylemdi. BM 1958'de Ad Hoc COPUOS'u kurdu; 1963'teki Uzay Prensipler Bildirisi Res. 1962 OST'nin müzakerelerine zemin oluşturdu.", source: "UN GA Resolution 1348 (XIII) 1958, UN GA Resolution 1721 (XVI) 1961, UN GA Resolution 1962 (XVIII) 1963, UNOOSA History of Space Law, McDougal Lasswell Vlasic Law and Public Order in Space (1963)" },

    // ── POLİTİK YAKLAŞIMLAR, ANTLAŞMALAR VE ÖNERİLER ──────────────────

    { keywords: ["dis","uzay","antlasma","ost","1967"], q: "Dış Uzay Antlaşması (OST) 1967 nedir?", content: "27 Ocak 1967'de imzalanan Dış Uzay Antlaşması (Outer Space Treaty - OST) uluslararası uzay hukukunun temel belgesidir. Temel ilkeleri: uzayın ve gök cisimlerinin herhangi bir devlet tarafından ulusal egemenlik iddiasıyla sahiplenilememesi (Madde II), uzayın tüm insanlığın çıkarına açık tutulması (Madde I), nükleer silahların ya da başka kitlesel imha silahlarının yörüngeye yerleştirilmesinin yasak olması (Madde IV), devletlerin kendi uzay faaliyetlerinden sorumlu olması (Madde VI). 113 ülke onaylamıştır. ABD, Rusya ve Çin başta olmak üzere tüm büyük uzay güçleri taraftır.", source: "Treaty on Principles Governing the Activities of States in the Exploration and Use of Outer Space (1967) UNTS 610" },

    { keywords: ["ay","antlasma","1979","moon","agreement"], q: "Ay Anlaşması 1979 nedir ve neden başarısız oldu?", content: "1979 tarihli Ay Anlaşması gök cisimlerindeki kaynakları 'insanlığın ortak mirası' olarak tanımlamış ve uluslararası bir yönetim rejimi kurulana kadar ticari kaynak çıkarımını yasaklamıştır. Ancak ABD, Rusya ve Çin onaylamamıştır; yalnızca 18 devlet taraftır. Başarısızlığının başlıca nedeni, ticari uzay madenciliği girişimlerinin önünü kapatacağı endişesidir. ABD'nin 2015 SPACE Act'i ve Lüksemburg'un 2017 uzay kaynakları yasası bu anlaşmayı açıkça reddeder niteliktedir.", source: "Agreement Governing the Activities of States on the Moon and Other Celestial Bodies (1979) UNTS 1363, Frans von der Dunk Handbook of Space Law (2015)" },

    { keywords: ["sorumluluk","uzlasma","1972","liability","convention"], q: "Uzay Sorumluluk Sözleşmesi 1972 nedir?", content: "1972 tarihli Uzay Sorumluluk Sözleşmesi, bir uzay nesnesinin yol açtığı zararların tazminatını düzenler. Yeryüzünde veya uçan bir hava aracında meydana gelen hasarlarda fırlatıcı devlet mutlak sorumluluk ilkesiyle yükümlüdür (Madde II). Uzayda gerçekleşen çarpışmalarda ise kusur sorumluluğu esas alınır (Madde III). Tek emsal: 1978'de Kanada'nın arktik bölgesine düşen Sovyet nükleer uydusundan kaynaklanan Cosmos 954 davası; Sovyetler Birliği 3 milyon Kanada doları tazminat ödemiştir.", source: "Convention on International Liability for Damage Caused by Space Objects (1972) UNTS 961, Cosmos 954 Claim Settlement 1981" },

    { keywords: ["tescil","sozlesme","1976","registration","convention"], q: "Uzay Tescil Sözleşmesi 1976 nedir?", content: "1976 tarihli Tescil Sözleşmesi, uzaya fırlatılan nesnelerin ulusal sicillere kaydedilerek BM Genel Sekreteri'ne bildirilmesini zorunlu kılar. Tescil devleti, o nesne üzerinde yargı yetkisi ve kontrolü uhdesinde tutar (OST Madde VIII ile uyumlu). Uygulamada ciddi boşluklar mevcuttur: özel uyduların bir kısmı gecikmeli ya da eksik kayıt edilmekte, bazı debris parçaları hiç bildirilmemektedir. Bu durum hesap verebilirliği zedelemektedir.", source: "Convention on Registration of Objects Launched into Outer Space (1976) UNTS 1023, UNOOSA Online Index of Objects Launched into Outer Space" },

    { keywords: ["kurtarma","antlasma","1968","rescue","agreement"], q: "Astronot Kurtarma ve İade Anlaşması 1968 nedir?", content: "1968 tarihli Kurtarma Anlaşması astronotların her koşulda kurtarılmasını ve ülkelerine teslim edilmesini zorunlu kılar. Herhangi bir devletin topraklarına ya da açık denize inen astronotların derhal yardım görmesi ve fırlatıcı devlete iade edilmesi gerekir. Uzay nesnelerinin bulunması halinde de fırlatıcı devlete iade yükümlülüğü mevcuttur. Astronotlar bu belgede 'insanlığın elçisi' olarak nitelendirilmiştir; bu ifade hukuki değil sembolik olup bağlayıcılığı tartışmalıdır.", source: "Agreement on the Rescue of Astronauts, the Return of Astronauts and the Return of Objects Launched into Outer Space (1968) UNTS 672" },

    { keywords: ["artemis","anlasma","abd","2020","uzlasma"], q: "Artemis Anlaşmaları nedir ve uluslararası etkisi nedir?", content: "ABD önderliğinde 2020'de başlatılan Artemis Anlaşmaları çok taraflı ancak OST dışında ikili anlaşmalar biçiminde işleyen bir uzay yönetişim girişimidir. 2025 itibarıyla 40'ı aşkın ülke imzalamıştır; Türkiye de katılan ülkeler arasındadır. Temel ilkeler: şeffaflık, birlikte çalışabilirlik, acil durum yardımı, uzay kaynaklarının kullanım hakkı ve 'güvenlik bölgesi' kavramı. Çin ve Rusya bu anlaşmaları OST'yi zayıflatan bir mekanizma olarak nitelendirerek imzalamamıştır. Güvenlik bölgesi kavramı de facto bölge tahsisi anlamına gelebileceği gerekçesiyle ciddi akademik eleştiri almaktadır.", source: "Artemis Accords (2020) NASA/ESA Framework, ESA Artemis Programme, Fabio Tronchetti Artemis Accords IISL 2021" },

    { keywords: ["abd","uzay","politika","abd","strateji"], q: "ABD'nin Uzay Politikası ve Stratejik Yaklaşımı nedir?", content: "ABD 1958'de NASA'yı ve 1967'de sivil-askeri koordinasyon için Ulusal Uzay Konseyi'ni kurmuştur. Obama döneminde (2010) ticari uzay sanayii teşvik edilmiş, SpaceX ve Boeing ISS ikmal görevleri üstlenmiştir. Trump döneminde (2017-2021) Uzay Kuvvetleri (Space Force) kurulmuş, direkt çıkışlı ASAT testleri ulusal güvenlik tehlikesi ilan edilmiştir. Biden döneminde Artemis Anlaşmaları genişletilmiş, sorumlu uzay davranışı vurgulanmıştır. ABD 2015 SPACE Act ile şirketlerin çıkardıkları uzay kaynaklarını sahiplenebileceğini yasayla güvence altına almıştır.", source: "NASA Authorization Act 2010, US Commercial Space Launch Competitiveness Act 2015, Space Policy Directive-1 (2017), Executive Order on Space Resources (2020), US Space Force Act 2019" },

    { keywords: ["rusya","sovyet","uzay","politika","strateji"], q: "Rusya'nın Uzay Politikası ve Yaklaşımı nedir?", content: "Sovyetler Birliği 1957 Sputnik ve 1961 Gagarin ile uzay çağını başlatmış; OST başta olmak üzere temel antlaşmaların mimarı olmuştur. Rusya, Artemis Anlaşmaları'nı ABD merkezli bir bloklaşma girişimi olarak reddedip Çin ile ortak Ay istasyonu (ILRS) projesini başlatmıştır. ASAT testleri: 2021'de Rusya Nudol füzesiyle kendi Kosmos 1408 uydusunu imha etmiş, 1500'den fazla debris parçası oluşturmuştur; bu eylem uluslararası kınama almıştır. Rusya, uzayın silahlandırılmaması konusunda Çin ile birlikte bağlayıcı PPWT antlaşma taslağı sunmuş ancak ABD bu taslağı doğrulama mekanizması eksikliği nedeniyle reddetmiştir.", source: "Russian Federal Space Program 2016-2025, Roscosmos Strategy Documents, PPWT Draft Treaty (Russia-China 2008/2014 revised), UN GGE PAROS Submissions" },

    { keywords: ["cin","uzay","politika","strateji","bri"], q: "Çin'in Uzay Politikası ve Küresel Stratejisi nedir?", content: "Çin, 2003'te Chang'e 3 programıyla Ay'a araç indiren üçüncü ülke olmuştur. 2021'de Mars yüzeyine Zhurong aracını başarıyla konuşlandırmıştır. Çin Uzay İstasyonu (Tiangong) 2022'de tamamlanmış olup Batılı astronotlara kapalıdır. Çin, Rusya ile birlikte Uluslararası Ay Araştırma İstasyonu (ILRS) projesini ilan etmiş; gelişmekte olan ülkeleri Çin Uzay Hedefleriyle Uyumlu Araştırma İşbirliği (CNSA işbirlikleri) çerçevesinde BRI'ye (Kuşak ve Yol) paralel biçimde yanına çekmeye çalışmaktadır. ABD, Çin'in askeri-sivil füzyon politikası nedeniyle NASA'nın Çin ile işbirliğini yasaklayan Wolf Amendment'ı (2011) sürdürmektedir.", source: "China's Space Program White Paper (2021), CNSA-Roscosmos ILRS MOU (2021), Wolf Amendment (2011 NASA Appropriations Act Sec. 1340), ESA China Cooperation Agreements" },

    { keywords: ["avrupa","esa","uzay","politika","ab"], q: "Avrupa'nın Uzay Politikası ve ESA'nın Rolü nedir?", content: "ESA 1975'te kurulmuş olup 22 üye devleti bulunan hükümetlerarası bir kuruluştur; AB kurumu değildir, ancak AB Uzay Programı Ajansı (EUSPA) ile yakın koordinasyon içindedir. Galileo (GPS'e alternatif konumlandırma sistemi) ve Copernicus (Dünya gözlem programı) AB'nin stratejik uzay bağımsızlığının iki temel sütununu oluşturmaktadır. Rusya'nın Ukrayna'yı işgalinin ardından Soyuz fırlatma araçlarından vazgeçilmiş, bu durum Ariane 6 programının gecikmesiyle birleşince Avrupa'nın bağımsız fırlatma kapasitesinde ciddi açık doğurmuştur. AB, ticari uzay madenciliği konusunda resmi bir yasal düzenleme henüz benimsememiştir.", source: "ESA Convention (1975), EU Space Programme Regulation (EU) 2021/696, Galileo Open Service SDD, Copernicus Regulation (EU) 2021/1159, Ariane 6 Development Programme" },

    { keywords: ["hindistan","isro","uzay","politika","chandrayaan"], q: "Hindistan'ın Uzay Politikası ve Stratejik Yaklaşımı nedir?", content: "Hindistan Uzay Araştırma Örgütü (ISRO) 1969'da kurulmuştur. Chandrayaan-3 (2023) Ay'ın güney kutbuna başarıyla inen ilk uzay aracı olmuştur; bu başarı Hindistan'ı hem bilimsel hem de prestij açısından öne çıkarmıştır. Hindistan 2024'te özel şirketlere uzay fırlatma lisansı veren yeni uzay politikasını yürürlüğe koymuştur. Artemis Anlaşmaları'nı imzalamış; aynı zamanda Rusya ile geleneksel savunma bağlarını sürdürmektedir. Bu denge politikası Hindistan'ı önemli bir diplomatik arabulucu konumuna taşımaktadır. 2023'teki G20 Liderler Zirvesi'nde uzay politikasını gündem maddesi yapmıştır.", source: "ISRO Annual Report 2023-24, Indian Space Policy 2023, Chandrayaan-3 Mission Overview ISRO, India-US Civil Space Joint Statement 2023" },

    { keywords: ["turk","tua","uzay","politika","strateji"], q: "Türkiye'nin Uzay Politikası ve TUA'nın Rolü nedir?", content: "Türkiye Uzay Ajansı (TUA) 2018 yılında kurulmuş; 2021'de ilk ulusal uzay programı kamuoyuyla paylaşılmıştır. 2033 hedefleri arasında Ay'a kontrollü iniş, düşük yörüngede uydu takımyıldızı ve yerli fırlatıcı geliştirme yer almaktadır. Türksat uyduları yörüngede faaliyet göstermektedir. Türkiye, Artemis Anlaşmaları'nı 2023'te imzalamıştır. Savunma sanayii odaklı uydu teknolojisi kapasitesi (ROKETSAN, ASELSAN) sivil uzay programıyla giderek entegre edilmektedir. ODTÜ ve İTÜ bünyesindeki uzay araştırma merkezleri akademik altyapıyı güçlendirmektedir.", source: "TUA Ulusal Uzay Programı 2021-2033, Türkiye'nin Artemis Anlaşmaları İmza Töreni 2023, Türksat A.Ş. Faaliyet Raporları, TÜBİTAK Uzay Araştırmaları Programı" },

    { keywords: ["ppwt","silahlanma","uzay","silah","yasak"], q: "Uzayın Silahsızlandırılması: PPWT Taslağı ve PAROS Girişimleri nedir?", content: "Çin ve Rusya 2008'de (2014'te revize ederek) BM Silahsızlanma Konferansı'na 'Uzayda Silahların Yerleştirilmesini Önleme Antlaşması' (PPWT) taslağını sunmuştur. ABD bu taslağı doğrulama mekanizmasının yetersizliği ve uzaydan fırlatılan silahları kapsam dışı bırakması nedeniyle reddetmiştir. BM'nin PAROS (Prevention of an Arms Race in Outer Space) gündem maddesi 1982'den bu yana her yıl oy kullanılmakta; 2022'de 181'e karşı 2 oyla kabul görmekte (ABD ve İsrail ret oyu kullanmaktadır). Bağlayıcı bir uzay silahsızlanma antlaşması henüz müzakere edilememektedir.", source: "PPWT Draft Treaty (China-Russia 2008, revised 2014 CD/1985), UN GA Resolution PAROS (annual), UNIDIR Space Security Index 2023, Henry Kissinger Center for Global Affairs Space Arms Control Brief (2022)" },

    { keywords: ["uydu","kesif","gozlem","hukuk","politika"], q: "Uydu Keşfi (Uzaktan Algılama) ve Uluslararası Hukuki Çerçeve nedir?", content: "BM Uzaktan Algılama İlkeleri (Res. 41/65, 1986) uydu gözlem faaliyetlerini yönetmek üzere kabul edilmiştir. İlkeler gözlemlenen devletin onayını zorunlu kılmamakta; verilerin makul koşullarda paylaşılmasını öngörmektedir. Askeri keşif uyduları OST Madde IV kapsamındaki 'barışçıl amaç' yorumu nedeniyle tartışma konusudur; süregelen uzlaşı bu tür uyduların yasaklanmadığı yönündedir. ABD'nin KH-9 ve KH-11, Rusya'nın Persona ve Çin'in Yaogan serisi askeri gözlem sistemleri bu çerçevede faaliyetini sürdürmektedir.", source: "UN GA Resolution 41/65 (1986) Remote Sensing Principles, OST Madde IV, US NRO Declassified KH-11 Programs, Bin Cheng General Principles of Law as Applied by International Courts and Tribunals (1994)" },

    { keywords: ["isletme","frekans","itu","uydu","spektrum"], q: "ITU Radyo Düzenlemeleri ve Uydu Yörünge Spektrum Hakları nedir?", content: "Uluslararası Telekomünikasyon Birliği (ITU) uydu yörüngesi ve radyo frekans spektrumunu küresel ölçekte koordine etmektedir. 'İlk gelen alır' (first-come, first-served) ilkesi küçük devletlerin ve gelişmekte olan ülkelerin tercihli yörünge konumlarına erişimini sınırlandırmaktadır. Starlink ve diğer mega-konstellasyonlar yüz binlerce frekans kaydı kuyruğunu kilitleyerek ITU koordinasyon sistemini fiilen zorlamaktadır. ITU Dünya Radyoiletişim Konferansı (WRC) bu düzenlemeleri güncelleme yetkisine sahiptir; WRC-27 büyük beklentilerle beklenmektedir.", source: "ITU Radio Regulations (2020 Edition) Appendix 30/30A/30B, ITU-R Recommendation S.1003, WRC-23 Final Acts, SpaceX FCC Starlink Frequency Filings" },

    { keywords: ["uzay","goruntusu","veri","acik","copernicus"], q: "Açık Erişim Uzay Verisi Politikaları nedir?", content: "AB Copernicus programı uydu gözlem verilerini ücretsiz ve tam erişimle kamuya sunmaktadır; bu politika iklim araştırması, afet yönetimi ve tarım gibi alanlarda dönüşümsel katkı sağlamaktadır. NASA'nın Landsat verilerini 2008'de ücretsiz açması benzer bir kırılma noktası oluşturmuştur. Buna karşın ticari yüksek çözünürlüklü görüntüler (Maxar, Planet Labs) lisanslı satılmakta ve ihracat kontrollerine tabi tutulmaktadır. Veri egemenliği tartışmaları açık erişim ile ulusal güvenlik menfaatleri arasındaki gerilimi giderek yoğunlaştırmaktadır.", source: "Copernicus Regulation (EU) 2021/1159 Art. 22, Landsat Free and Open Data Policy (USGS 2008), Maxar USG License Agreement, EO-1 Mission Data Policy Comparison Study" },

    { keywords: ["uzay","silah","asat","test","debris","kirlilik"], q: "Karşı-Uydu (ASAT) Silahları ve Uluslararası Hukuki Durum nedir?", content: "2007'de Çin'in Fengyun-1C uydusunu imha etmesi 3000'den fazla uzun ömürlü debris parçası üreterek uzay güvenliği gündemini belirlemiştir. 2019'da Hindistan'ın Mission Shakti ASAT testi daha alçak yörüngede gerçekleştirilmiş ve yaratılan debris görece kısa sürede atmosfere girmiştir. 2021'de Rusya'nın Nudol testiyle Kosmos 1408'i imha etmesi ISS'teki astronotları barınak prosedürüne sokmuştur. ABD 2022'de yıkıcı direkt çıkışlı ASAT testlerine unilateral moratoriyum ilan etmiştir. Bu testleri açıkça yasaklayan bağlayıcı uluslararası norm bulunmamaktadır.", source: "US ASAT Test Moratorium Statement (April 2022), ESA Space Debris Environment Statistics 2023, NASA OIG Report on Space Debris (2021), Secure World Foundation Space Security Index 2023" },

    { keywords: ["uzay","ticaret","blok","ulusal","lisans"], q: "Uzay Ekonomisinde Ulusal Lisanslama Rejimleri ve Ticaret Blokları nedir?", content: "Uzay ticaretinin özelleşmesiyle birlikte devletlerin ulusal lisanslama rejimleri arasındaki farklılıklar 'düzenleyici arbitraj' riskini beraberinde getirmektedir. ABD FAA/AST, AB EASA, UK CAA ve Avustralya ASRA farklı şeffaflık ve sorumluluk standartları uygulamaktadır. Artemis Anlaşmaları imzacı ülkeler ve ILRS ortakları giderek iki ayrı standart bloğu oluşturmaktadır. WTO'nun bu ikiliği ele alacak uzay hizmetleri müzakereleri başlatmamış olması yasal belirsizliği derinleştirmektedir.", source: "FAA Commercial Space Transportation Annual Compendium 2023, EASA Space Regulatory Framework 2023, UK CAA Space Licensing CAP 2252, Australian Space Agency Regulatory Approach (2023)" },

    { keywords: ["uzay","insanligin","miras","ortak","province"], q: "'İnsanlığın Ortak Mirası' İlkesi ve Uzay Hukukundaki Tartışmalar nedir?", content: "OST Madde I uzayı 'tüm insanlık adına' keşfedilecek alan olarak tanımlarken Ay Anlaşması Madde 11 gök cismi kaynaklarını açıkça 'insanlığın ortak mirası' (common heritage of mankind - CHM) ilan etmektedir. ABD, Lüksemburg ve Artemis imzacıları CHM ilkesinin kaynak kullanımını engellemediğini savunmakta; Çin ve bazı gelişmekte olan ülkeler ise kaynaklar üzerinde kolektif yönetim gerektirdiğini öne sürmektedir. Bu gerilim uzay madenciliği hukuku için en kritik felsefi ayrım noktasıdır.", source: "OST Madde I ve II (1967), Moon Agreement Madde 11 (1979), IISL/ECSL Position Paper on Space Resources (2015), Tronchetti CHM Principle in Space Law (2009)" },

// ── Türkçe normalize ──────────────────────────────────────────────────
function norm(s) {
    return (s || '').toLowerCase()
        .replace(/ğ/g,'g').replace(/ü/g,'u').replace(/ş/g,'s')
        .replace(/ı/g,'i').replace(/ö/g,'o').replace(/ç/g,'c')
        .replace(/[^a-z0-9\s]/g,' ').replace(/\s+/g,' ').trim();
}

// ── Akıllı puanlama ───────────────────────────────────────────────────
// Kelime kökünü basit şekilde çıkar (son 2 harfi kes)
function stem(w) { return w.length > 4 ? w.slice(0, -2) : w; }

function score(item, queryWords) {
    let pts = 0;
    const normKeys = item.keywords.map(k => norm(k));
    const normQ    = norm(item.q);
    const normC    = norm(item.content || '');

    queryWords.forEach(word => {
        if (word.length < 2) return;
        const wordStem = stem(word);

        normKeys.forEach(key => {
            if (key === word)                          pts += 100; // tam eşleşme keyword
            else if (key.startsWith(wordStem))         pts += 60;  // kök eşleşmesi keyword
            else if (key.includes(word) && word.length >= 4) pts += 40; // içerir
        });

        // Başlıkta geçiyorsa ekstra puan
        if (normQ.includes(word))                      pts += 35;
        else if (normQ.includes(wordStem))             pts += 20;

        // İçerikte geçiyorsa düşük puan
        if (normC.includes(word))                      pts += 10;
    });

    // Birden fazla sorgu kelimesi eşleşirse bonus
    const matchCount = queryWords.filter(w =>
        normKeys.some(k => k.includes(stem(w))) || normQ.includes(stem(w))
    ).length;
    if (matchCount >= 2) pts += matchCount * 25;
    if (matchCount >= 3) pts += 50;

    return pts;
}

function handleSearch() {
    const input = document.getElementById('questionInput');
    const resultArea = document.getElementById('resultArea');
    const raw = input.value.trim();
    if (!raw) { resultArea.innerHTML = ''; return; }

    lastQuery = raw;
    const queryWords = norm(raw).split(' ').filter(w => w.length >= 2);

    // Tüm kayıtları puanla
    const scored = MASTER_KNOWLEDGE.map(item => ({ item, pts: score(item, queryWords) }))
        .filter(x => x.pts >= 50)
        .sort((a, b) => b.pts - a.pts);

    lastResults = scored;
    renderSuggestions(scored, raw);
}

let currentPage = 0;
const PAGE_SIZE = 4;

function renderSuggestions(scored, rawQuery) {
    currentPage = 0;
    renderPage(scored, rawQuery);
}

function renderPage(scored, rawQuery) {
    const resultArea = document.getElementById('resultArea');

    if (scored.length === 0) {
        resultArea.innerHTML = `
        <div class="not-found">
            <div class="not-found-title">Sonuç bulunamadı</div>
            <div class="not-found-text">"${rawQuery}" için eşleşen kayıt yok.</div>
            <div class="not-found-tips">
                İpuçları:<br>
                · Daha kısa kelimeler deneyin (örn: "tua", "kurtarma", "maden")<br>
                · Türkçe kelimeler kullanın<br>
                · Yalnızca konuya ait anahtar kelimeyi yazın
            </div>
        </div>`;
        return;
    }

    const start = currentPage * PAGE_SIZE;
    const pageItems = scored.slice(start, start + PAGE_SIZE);
    const totalPages = Math.ceil(scored.length / PAGE_SIZE);
    const hasNext = (currentPage + 1) * PAGE_SIZE < scored.length;
    const hasPrev = currentPage > 0;

    const cards = pageItems.map((x, i) => {
        const globalIdx = start + i;
        const dimClass = i >= 2 && x.pts < pageItems[0].pts * 0.55 ? 'dim' : '';
        return `
        <div class="suggest-card ${dimClass}" onclick="showAnswer(${globalIdx})">
            <span class="suggest-q">${x.item.q}</span>
            <span class="suggest-meta">${x.item.source ? x.item.source.split(',')[0] : ''}</span>
            <span class="suggest-arrow">›</span>
        </div>`;
    }).join('');

    const pagination = (totalPages > 1) ? `
        <div style="display:flex;align-items:center;justify-content:center;gap:12px;margin-top:16px;">
            ${hasPrev ? `<button onclick="changePage(-1,'${rawQuery.replace(/'/g,"\'")}',event)" style="background:#0d2040;border:1px solid #1e4080;color:#4a9eff;padding:7px 18px;border-radius:8px;cursor:pointer;font-size:0.9em;">‹ Önceki</button>` : `<span style="width:80px"></span>`}
            <span style="color:#3a5060;font-size:0.85em;">${currentPage+1} / ${totalPages} (${scored.length} sonuç)</span>
            ${hasNext ? `<button onclick="changePage(1,'${rawQuery.replace(/'/g,"\'")}',event)" style="background:#0d2040;border:1px solid #1e4080;color:#4a9eff;padding:7px 18px;border-radius:8px;cursor:pointer;font-size:0.9em;">Sonraki ›</button>` : `<span style="width:80px"></span>`}
        </div>` : '';

    const headerText = scored.length === 0 ? '' :
        scored.length <= PAGE_SIZE
            ? `"<span>${rawQuery}</span>" için ${scored.length} sonuç bulundu — birini seçin:`
            : `"<span>${rawQuery}</span>" araması için bu konuyla ilgili olabilir:`;

    resultArea.innerHTML = `
        <div class="suggest-header">${headerText}</div>
        <div class="suggest-grid">${cards}</div>
        ${pagination}`;
}

function changePage(dir, rawQuery, e) {
    if(e) e.stopPropagation();
    currentPage += dir;
    renderPage(lastResults, rawQuery);
}

function showAnswer(idx) {
    const resultArea = document.getElementById('resultArea');
    const x = lastResults[idx];
    if (!x) return;

    resultArea.innerHTML = `
        <div class="answer-card">
            <div class="answer-title">${x.item.q}</div>
            <div class="answer-content">${x.item.content}</div>
            ${x.item.source ? `<div class="answer-source">Kaynak: ${x.item.source}</div>` : ''}
            <br>
            <button class="back-btn" onclick="renderSuggestions(lastResults, lastQuery)">‹ Sonuçlara dön</button>
        </div>`;
}

document.getElementById('questionInput').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') handleSearch();
});

function switchTab(tabId) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + tabId).classList.add('active');
    document.querySelectorAll('.tab-btn')[tabId === 'arama' ? 0 : 1].classList.add('active');
    if (tabId === 'oneri') renderPolCards('tumu');
}

        detay: "Mevcut ticari uzay turizmi bilet fiyatları: Blue Origin New Shepard kısa süreli uçuş yaklaşık 450.000 dolar, SpaceX Inspiration4 misyonu kişi başı tahminen 50-55 milyon dolar düzeyindedir. Bu eşitsizlik yeni bir sınıf ayrışmasını simgelemektedir. Tarihsel olarak havacılık yolcu vergilerinin önemli bir bölümü kalkınma fonlarına aktarılmıştır.\n\nÖnerilen mekanizma: (1) Her ticari uzay yolcusu bileti üzerine uluslararası uzay dayanışma vergisi (örn. yüzde 5-10), (2) verginin yüzde 50'sinin gelişmekte olan ülkelerdeki uzay STEM eğitimine, yüzde 50'sinin debris temizlemeye tahsis edilmesi, (3) devlet destekli halka açık çekiliş misyon programları (NASA misyon paydaşı modeli), (4) öğrenci uydularına ve küçük devletlere ücretsiz fırlatma kontenjanı.\n\nTemel engel: Ticari operatörler marjinal bir sektörde ek vergi yükünü taşıyamayacaklarını öne sürmektedir. Vergi gelirleri henüz anlamlı düzeyde değildir çünkü sektör küçüktür.",
        destekci: ["G77", "Küçük ada devletleri", "Sosyal adalet STK'ları"],
        muhalif: ["SpaceX", "Blue Origin", "Virgin Galactic", "ABD"],
        kaynaklar: "ICAO Aviation Development Fund (model) · Space Foundation Space Report 2024 · Blue Origin Pricing Analysis · Morgan Stanley Space Economy 2040"
    }
];

let aktifKategori = 'tumu';

function polFilter(kat, btn) {
    aktifKategori = kat;
    document.querySelectorAll('.pol-filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderPolCards(kat);
}

function renderPolCards(kat) {
    const container = document.getElementById('polCards');
    const filtered = kat === 'tumu' ? POLITIK_ONERILER : POLITIK_ONERILER.filter(p => p.kategori === kat);

    const tagInfo = {
        silah:    { cls: 'tag-silah',    label: '🔴 Silahsızlanma' },
        trafik:   { cls: 'tag-trafik',   label: '🔵 Uzay Trafiği' },
        antlasma: { cls: 'tag-antlasma', label: '🟡 Bağlayıcı Antlaşma' },
        kaynak:   { cls: 'tag-kaynak',   label: '🟢 Kaynak Paylaşımı' },
        genel:    { cls: 'tag-genel',    label: '🟣 Genel Sorunlar' }
    };

    container.innerHTML = filtered.map((p, i) => {
        const tag = tagInfo[p.kategori];
        const destBadges = p.destekci.map(d => `<span class="pol-meta-badge">✅ ${d}</span>`).join('');
        const muhBadges  = p.muhalif.map(d =>  `<span class="pol-meta-badge" style="background:rgba(255,80,80,0.06);border-color:rgba(255,80,80,0.15);color:#ff8080;">❌ ${d}</span>`).join('');
        return `
        <div class="pol-card" id="polc-${i}" onclick="togglePolCard(${i})">
            <div class="pol-card-header">
                <span class="pol-card-label ${tag.cls}">${tag.label}</span>
                <span class="pol-card-title">${p.baslik}</span>
                <span class="pol-card-arrow">›</span>
            </div>
            <div class="pol-card-body">
                <div class="pol-card-desc" style="margin-bottom:10px;color:#7a9aaa;font-size:0.95em;font-style:italic;">${p.ozet}</div>
                <div class="pol-card-desc">${p.detay}</div>
                <div class="pol-card-meta">${destBadges}${muhBadges}</div>
                <div class="pol-card-source">📚 ${p.kaynaklar}</div>
            </div>
        </div>`;
    }).join('');
}

function togglePolCard(i) {
    const card = document.getElementById('polc-' + i);
    card.classList.toggle('open');
}
</script>
